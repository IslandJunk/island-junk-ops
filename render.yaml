# Render Blueprint — Island Junk Ops (web service only).
#
# IMPORTANT: this intentionally does NOT define a `databases:` block. The Postgres instance
# already exists and is migrated + seeded — we must never risk provisioning a fresh, empty
# one. DATABASE_URL is set by hand in the dashboard (sync: false) from the existing DB's
# connection string. See DEPLOY.md for the full runbook.
services:
  - type: web
    name: island-junk-ops
    runtime: python
    plan: starter                     # Free works too; preDeployCommand needs Starter+ (see DEPLOY.md)
    branch: main
    healthCheckPath: /health          # pure liveness — no DB round-trip
    buildCommand: pip install -r requirements.txt
    # Auto-applies future migrations on Starter+ plans. The DB is already at head, so the
    # FIRST deploy needs nothing here. On the Free plan this key is ignored — run
    # `alembic -c alembic.ini upgrade head` from the Render Shell after shipping a migration.
    preDeployCommand: alembic -c alembic.ini upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Python version also pinned by .python-version (3.13); kept here as the single source
      # Render reads first. Bump when Render adds 3.14 if you want to match the dev machine.
      - key: PYTHON_VERSION
        value: "3.13"
      - key: ENVIRONMENT
        value: production
      # The Google service-account key is uploaded as a Render Secret File. Render's Secret
      # File names forbid hyphens, so we use an underscore name and point the app at it here
      # (the code default spike/service-account-key.json is for local dev, which keeps hyphens).
      - key: GOOGLE_SERVICE_ACCOUNT_FILE
        value: spike/service_account_key.json
      # Strong secret generated by Render — overrides the insecure in-code default.
      - key: SESSION_SECRET
        generateValue: true
      # ── set these by hand in the dashboard (values never live in git) ──
      - key: DATABASE_URL            # postgresql+psycopg://…  (existing seeded DB)
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_UPDATES_LINE     # +17789065865
        sync: false
      - key: TWILIO_VALIDATE_SIGNATURES  # start "false"; flip "true" once the webhook is set
        sync: false
    # The Google service-account JSON is a git-ignored FILE, not an env var — add it as a
    # Render Secret File mounted at spike/service-account-key.json (see DEPLOY.md §4).
