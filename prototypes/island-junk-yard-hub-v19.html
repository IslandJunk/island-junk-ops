<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Island Junk — Yard Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --orange:#F05014; --orange-d:#D2440F;
    --ink:#141414; --muted:#6E6E6E;
    --paper:#F4F3F1; --card:#FFFFFF; --line:#E5E3DF;
    --green:#3CA03C; --green-d:#2E7D2E;
    --stop:#C0392B; --grape:#6B4C9A; --steel:#5B6470; --amber:#C97A1E;
    --shadow:0 1px 2px rgba(0,0,0,.05),0 8px 24px rgba(20,20,20,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--paper);color:var(--ink);line-height:1.45;-webkit-font-smoothing:antialiased;padding-bottom:44px}
  .wrap{max-width:640px;margin:0 auto;padding:0 16px}

  header{background:radial-gradient(440px 150px at 50% 4%,rgba(240,80,20,.08),rgba(240,80,20,0) 72%),linear-gradient(180deg,#ffffff 0%,#fbf9f4 100%);border-bottom:3px solid var(--orange);box-shadow:0 12px 34px rgba(0,0,0,.5);padding:13px 0 12px;position:relative;z-index:5}
  .hd{display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center}
  .logo{width:100%;max-width:320px;height:auto;display:block;margin:0 auto;filter:drop-shadow(0 3px 7px rgba(0,0,0,.18))}
  .tool{font-family:"Anton",sans-serif;font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:#f4f1ec;line-height:1;display:inline-flex;align-items:center;gap:9px;background:#161616;border:1px solid rgba(240,80,20,.5);padding:7px 15px 6px;border-radius:999px;box-shadow:0 5px 14px rgba(0,0,0,.3)}
  .tool::before,.tool::after{content:"";width:13px;height:2px;background:var(--orange);display:inline-block;border-radius:2px}
  .crumb{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:2px}

  .snap{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-top:14px}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:12px;box-shadow:var(--shadow);text-align:center}
  .tile .n{font-family:"Anton";font-size:27px;line-height:1}
  .tile .l{font-size:10.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);font-weight:600;margin-top:4px}
  .tile.alert .n{color:var(--stop)}

  .sec{margin-top:20px}
  .sec-h{font-family:"Inter";font-weight:800;text-transform:uppercase;letter-spacing:.03em;font-size:14px;border-left:3px solid var(--orange);padding-left:9px;margin-bottom:11px;display:flex;align-items:center;gap:8px}
  .sec-h .add{margin-left:auto;font-size:12px;font-weight:700;color:var(--orange-d);cursor:pointer;background:none;border:none;text-transform:none;letter-spacing:0}

  .panel{background:#fff;border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow);overflow:hidden}

  .notecard{background:#fff;border:1px solid var(--line);border-left:5px solid var(--orange);border-radius:13px;padding:15px 16px;box-shadow:var(--shadow)}
  .notecard .nh{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;gap:10px}
  .notecard .nh-by{font-weight:800;font-size:14px}.notecard .nh-when{font-size:11.5px;color:var(--muted);flex:none}
  .notecard .nbody{font-size:14px;line-height:1.6;color:#2a2a2a}

  .alertcard{border:1.5px solid var(--stop);background:#FBEDEC;border-radius:13px;padding:15px;margin-top:13px}
  .alertcard.ok{border-color:#bfe0bf;background:#F4FBF4}
  .alertcard .at{font-weight:800;font-size:15px;display:flex;align-items:center;gap:8px}
  .alertcard .ad{font-size:13px;color:#5a5a5a;margin-top:6px;line-height:1.5}
  .dot{width:10px;height:10px;border-radius:50%;flex:none}.dot.r{background:var(--stop)}.dot.g{background:var(--green)}.dot.a{background:var(--amber)}
  .row-btns{display:flex;gap:9px;margin-top:12px}
  .row-btns button{flex:1;border-radius:10px;padding:11px;font-weight:700;font-size:13px;cursor:pointer;border:1.5px solid var(--line);background:#fff}
  .row-btns .pri{background:var(--green);border-color:var(--green);color:#fff}

  .crewrow{padding:13px 15px;border-bottom:1px solid var(--line)}
  .crewrow:last-child{border-bottom:none}
  .crewtop{display:flex;align-items:center;gap:10px}
  .crewtop .cn{font-weight:700;font-size:15px}
  .crewtop .cr{font-size:11px;color:var(--muted);font-weight:600}
  .statepill{font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:20px;margin-left:auto}
  .sp-work{background:#EAF6EA;color:var(--green-d)}.sp-break{background:#FFF3E0;color:var(--amber)}.sp-done{background:#EEE;color:var(--muted)}
  .crewmeta{font-size:12px;color:var(--muted);margin-top:4px}
  .crewbtns{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
  .crewbtns button{border:1.5px solid var(--line);background:#fff;border-radius:9px;padding:8px 12px;font-weight:700;font-size:12.5px;cursor:pointer}
  .crewbtns button.br{color:var(--amber);border-color:#e6cda0}
  .crewbtns button.bk{color:var(--green-d);border-color:#bfe0bf}
  .crewbtns button.fin{color:var(--muted)}
  .crewnote{width:100%;margin-top:9px;font-family:inherit;font-size:14px;border:1.5px solid var(--line);border-radius:9px;padding:9px 11px;min-height:40px;-webkit-appearance:none}
  .crewnote:focus{outline:none;border-color:var(--orange)}
  .clkrow{display:flex;align-items:center;gap:9px;margin-top:9px;padding:9px 11px;background:#F4F3F1;border:1px solid var(--line);border-radius:10px}
  .clkrow.inn{background:#E7F3E7;border-color:#bfe0bf}
  .clkrow.done{background:#fff}
  .clklbl{font-size:12px;font-weight:700;color:var(--muted)}
  .clkrow.inn .clklbl{color:var(--green-d,#2e7d32)}
  .clktime{font-weight:800;font-size:13px;color:var(--ink)}
  .clkbtn{margin-left:auto;border:1.5px solid var(--line);background:#fff;border-radius:9px;padding:8px 14px;font-weight:700;font-size:12.5px;cursor:pointer}
  .clkbtn.in{color:var(--green-d,#2e7d32);border-color:#bfe0bf}
  .clkbtn.out{color:#C0392B;border-color:#e2b3ab}
  .starttime{font-weight:700;color:var(--orange-d);cursor:pointer;text-decoration:underline dotted}

  .machine{display:flex;align-items:center;gap:12px;padding:13px 15px;border-bottom:1px solid var(--line)}
  .machine:last-child{border-bottom:none}
  .machine .mm{flex:1;min-width:0}
  .machine .mn{font-weight:700;font-size:14.5px}
  .machine .ms{font-size:12px;color:var(--muted);margin-top:2px}
  .machine .mbtn{flex:none;border:1.5px solid var(--line);background:#fff;border-radius:9px;padding:9px 12px;font-weight:700;font-size:12.5px;cursor:pointer;color:var(--muted)}
  .machine.due{background:#FFFBF4}
  .machine.due .mbtn{border-color:var(--amber);color:var(--amber)}
  .duetag{font-size:10px;font-weight:800;color:#fff;background:var(--amber);padding:1px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.03em;margin-left:6px}

  .reqpreset{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:11px}
  .reqpreset button{border:1.5px solid var(--line);background:#fff;border-radius:30px;padding:9px 13px;font-weight:600;font-size:13px;cursor:pointer}
  .reqitem{display:flex;align-items:center;gap:10px;font-size:13.5px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 12px;margin-bottom:7px}
  .reqitem .kind{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;padding:1px 7px;border-radius:20px;color:#fff;flex:none}
  .kind.part{background:var(--steel)}.kind.repair{background:var(--stop)}.kind.supply{background:var(--green)}
  .reqitem .rx{margin-left:auto;color:var(--muted);cursor:pointer;font-size:18px;background:none;border:none}

  .proclink{display:flex;align-items:center;gap:12px;background:#141414;color:#fff;border-radius:13px;padding:15px;margin-top:13px;cursor:pointer}
  .proclink .pl{flex:1}.proclink .pt{font-weight:700;font-size:15px}.proclink .pd{font-size:12px;color:#bdbdbd;margin-top:2px}
  .proclink .pn{font-family:"Anton";font-size:24px}

  .footer-rec{font-size:12px;color:var(--muted);margin-top:20px;text-align:center;line-height:1.5;border-top:1px solid var(--line);padding-top:14px}

  .signin-h1{font-family:"Anton";font-size:28px;line-height:1.1;margin:26px 0 6px}
  .signin-h1 .o{color:var(--orange-d)}
  .signin-lead{font-size:14px;color:var(--muted);margin-bottom:18px;line-height:1.5}
  .si-panel{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow)}
  .si-fld{display:block;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:7px}
  .si-pin{width:100%;font-size:22px;letter-spacing:.4em;font-weight:700;text-align:center;border:1.5px solid var(--line);border-radius:11px;padding:13px;min-height:52px;-webkit-appearance:none;font-family:inherit}
  .si-pin:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px rgba(240,80,20,.15)}
  .si-link{display:inline-block;margin-top:14px;color:var(--orange-d);font-weight:700;font-size:14px;cursor:pointer;background:none;border:none;padding:0}
  .si-btn{width:100%;margin-top:18px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-size:16px;padding:16px;border-radius:13px;border:none;cursor:pointer;color:#fff;background:var(--orange);font-family:inherit}
  .si-warn{color:var(--stop);font-size:13px;font-weight:600;text-align:center;margin-top:10px;min-height:18px}
  .si-note{font-size:11.5px;color:var(--muted);text-align:center;margin-top:8px;line-height:1.5}

  .modal{position:fixed;inset:0;background:rgba(20,20,22,.55);z-index:50;display:none;align-items:flex-end;justify-content:center}
  .modal.show{display:flex}
  .sheet{background:#fff;width:100%;max-width:640px;border-radius:18px 18px 0 0;max-height:80vh;overflow:auto;padding:18px 18px calc(20px + env(safe-area-inset-bottom))}
  .sheet h2{font-weight:600;text-transform:uppercase;letter-spacing:.04em;font-size:17px;margin-bottom:12px}
  .rosterbtn{width:100%;text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:11px;padding:13px 14px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:8px}
  .rosterbtn:active{border-color:var(--orange);background:var(--paper)}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#141414;color:#fff;font-size:13px;font-weight:600;padding:11px 18px;border-radius:30px;z-index:60;opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}

/* break logging */
.brkcfg{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#F4F7F4;border:1px solid #DDE9DD;border-radius:12px;padding:10px 12px;margin-bottom:12px;flex-wrap:wrap}
.brkcfg-row{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:#3a5a3a}
.brkdur{width:54px;padding:7px 8px;border:1.5px solid #cfe0cf;border-radius:8px;font-size:15px;font-weight:700;text-align:center}
.brkcfg-u{color:#6f8a6f;font-weight:700;font-size:12.5px}
.brkalarm{border:1.5px solid #cfe0cf;background:#fff;color:#777;border-radius:9px;padding:8px 12px;font-weight:800;font-size:12.5px;cursor:pointer}
.brkalarm.on{background:#3CA03C;border-color:#3CA03C;color:#fff}
.bkclockwrap{display:flex;align-items:baseline;gap:9px;background:#FFF3E0;border:1px solid #F2D9A8;border-radius:10px;padding:8px 12px;margin:8px 0}
.bkclock{font-family:"Anton",sans-serif;font-size:26px;line-height:1;color:#b9791a;font-variant-numeric:tabular-nums}
.bklbl{font-size:11.5px;color:#9a7426;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.bkclockwrap.over{background:#FBE4DD;border-color:#EBB6A8;animation:bkpulse 1s infinite}
.bkclockwrap.over .bkclock{color:#c8401f}
.bkclockwrap.over .bklbl{color:#b4351f}
@keyframes bkpulse{0%,100%{opacity:1}50%{opacity:.55}}
.brkmanual{width:100%;background:none;border:1.5px dashed #c3d3c3;color:#5e7a5e;border-radius:11px;padding:11px;font-weight:700;font-size:12.5px;cursor:pointer;margin-top:4px}
.brklog{margin-top:14px;background:#FAFBFA;border:1px solid #E7EEE7;border-radius:12px;padding:11px 13px}
.brklog-h{font-size:11.5px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:#8a958a;margin-bottom:8px}
.brklog-empty{font-size:12.5px;color:#9aa39a}
.brklog-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid #eef2ee;font-size:13px}
.brklog-row:first-of-type{border-top:none}
.bln{font-weight:700;color:#2c3a2c;min-width:74px}
.blm{font-weight:700;color:#3a5a3a}
.bmtag{font-size:10px;font-weight:800;letter-spacing:.3px;border-radius:5px;padding:2px 6px;text-transform:uppercase}
.bmtag.tim{background:#E4F2E4;color:#2c7a2c}
.bmtag.man{background:#FBEFD6;color:#8a5e08}
.blt{margin-left:auto;font-size:11.5px;color:#9aa39a}
.mbnote{color:#888;font-size:13px;margin:0 0 12px;line-height:1.45}
.mlbl{display:block;font-size:11.5px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:#8a958a;margin:10px 0 5px}
.mbsel{width:100%;padding:11px;border:1.5px solid #d9e0d9;border-radius:10px;font-size:16px;background:#fff}
.mbgo{width:100%;margin-top:14px;background:#3CA03C;color:#fff;border:none;border-radius:11px;padding:13px;font-weight:800;font-size:14px;cursor:pointer}

  .ytk-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin:4px 0 14px}
  .ytk{position:relative;background:#fff;border:1.5px solid var(--line,#E5E3DF);border-radius:12px;padding:12px 8px;font-weight:800;color:var(--ink,#141414);cursor:pointer;text-align:center}
  .ytk.sel{border-color:var(--orange-d,#D2440F);background:#FFF4EE}
  .ytk-n{display:block;font-size:17px}
  .ytk-l{display:block;font-size:11px;font-weight:600;color:var(--muted,#6E6E6E);margin-top:2px}
  .ychk{background:#fff;border:1px solid var(--line,#E5E3DF);border-radius:14px;padding:13px 14px;margin-bottom:9px;text-align:left}
  .yct{font-size:15px;font-weight:700;color:var(--ink,#141414)}
  .ycd{font-size:12.5px;color:var(--muted,#6E6E6E);margin:2px 0 9px;line-height:1.4}
  .yseg{display:flex;gap:8px}
  .yseg button{flex:1;border-radius:10px;padding:10px;font-size:13.5px;font-weight:700;border:1.5px solid var(--line,#E5E3DF);background:#fff;color:var(--muted,#6E6E6E);cursor:pointer}
  .yok.sel{border-color:#3CA03C;background:#F1F9F1;color:#2E7D2E}
  .yflag.sel{border-color:#C0392B;background:#FBEDEA;color:#C0392B}
  .yflagnote{display:none;margin-top:9px}
  .yflagnote.show{display:block}
  .yflagnote textarea,.ychk.issuebox textarea{width:100%;border:1.5px solid var(--line,#E5E3DF);border-radius:10px;padding:9px;font:inherit;font-size:14px;min-height:54px;resize:vertical;box-sizing:border-box}
  .yflagnote textarea{border-color:#C0392B}
  .ychk.issuebox textarea{margin-top:9px}
  .swingbar{background:#fff;border:1.5px solid var(--line,#E5E3DF);border-radius:14px;padding:13px 14px;margin-bottom:14px}
  .swingbar.on{border-color:#3CA03C;background:#F1F9F1;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .sb-l{font-size:15px;font-weight:800;color:var(--ink,#141414);display:flex;align-items:center;gap:8px}
  .sb-s{font-size:12.5px;color:var(--muted,#6E6E6E);margin:3px 0 0;line-height:1.4}
  .sb-dot{width:9px;height:9px;border-radius:50%;background:#3CA03C;display:inline-block;flex:none}
  .sb-btn{margin-top:10px;border:1.5px solid var(--line,#E5E3DF);background:#fff;color:var(--ink,#141414);font-weight:800;border-radius:10px;padding:9px 14px;cursor:pointer;font-size:13.5px}
  .swingbar.on .sb-btn{margin-top:0;flex:none}
  .sb-btn.go{background:var(--orange-d,#D2440F);border-color:var(--orange-d,#D2440F);color:#fff;width:100%}
  .ypbtn{display:flex;align-items:center;gap:12px;text-decoration:none;background:#fff;border:1.5px solid var(--line,#E5E3DF);border-left:4px solid var(--steel,#5B6470);border-radius:14px;padding:13px 14px;margin-bottom:14px}
  .yp-ic{font-size:22px;flex:none}
  .yp-tx{flex:1;min-width:0}
  .yp-t{display:block;font-size:15px;font-weight:800;color:var(--ink,#141414)}
  .yp-s{display:block;font-size:12px;color:var(--muted,#6E6E6E);margin-top:2px;line-height:1.35}
  .yp-go{font-size:18px;color:var(--steel,#5B6470);font-weight:800;flex:none}
  /* ===== Part-2 rework: nav bar, repair alerts, manager notepad ===== */
  .cnav{position:sticky;top:0;z-index:36;display:flex;gap:8px;max-width:640px;margin:0 auto;background:var(--paper);padding:8px 16px;border-bottom:1px solid var(--line)}
  .cnav-b{flex:1;border:none;border-radius:9px;padding:10px 8px;font-family:"Inter",system-ui,sans-serif;font-weight:700;font-size:13px;cursor:pointer;color:#fff;background:var(--ink);display:flex;align-items:center;justify-content:center;gap:6px;line-height:1}
  .cnav-b:active{opacity:.85}
  .sec-h .c{display:inline-block;min-width:18px;padding:1px 7px;border-radius:999px;background:var(--orange);color:#fff;font-size:12px;font-weight:800;text-align:center;margin-left:6px}
  .emptyline{font-size:12.5px;color:var(--muted);padding:6px 2px}
  .fixgroup{margin-bottom:12px}
  .fixgroup:last-child{margin-bottom:0}
  .fixtruck{font-family:"Anton",sans-serif;font-size:14px;letter-spacing:.02em;color:var(--ink);margin:0 0 7px;text-transform:uppercase}
  .fixrow{display:flex;align-items:flex-start;gap:10px;background:#FBE9E4;border:1px solid #EBB6A8;border-radius:11px;padding:11px 12px;margin-bottom:7px}
  .fixrow:last-child{margin-bottom:0}
  .fixmain{flex:1;min-width:0}
  .fixitem{font-size:14.5px;font-weight:700;color:var(--ink)}
  .fixnote{font-size:13px;color:#7a3a2a;margin-top:2px;line-height:1.4}
  .fixmeta{font-size:11.5px;color:var(--muted);margin-top:4px}
  .fixclear{flex:none;border:none;border-radius:8px;padding:8px 12px;font-weight:700;font-size:12.5px;cursor:pointer;color:#fff;background:var(--green)}
  .fixclear:active{opacity:.85}
  .mgrnote{width:100%;min-height:88px;border:1.5px solid var(--line);border-radius:11px;padding:11px 12px;font-family:inherit;font-size:14px;color:var(--ink);background:var(--card);resize:vertical;-webkit-appearance:none;margin-top:10px;line-height:1.45}
  .mgrnote:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px rgba(240,80,20,.12)}
  .mgrnote-hint{font-size:11.5px;color:var(--muted);margin-top:6px}
  /* ===== v13: collapsible sections + brightened breaks ===== */
  .sec.coll .sec-h{cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none}
  .sec.coll .chev{margin-left:auto;display:inline-block;font-size:13px;color:var(--muted);transition:transform .15s}
  .sec.coll:not(.collapsed) .chev{transform:rotate(90deg)}
  .sec.coll.collapsed .sec-body{display:none}
  /* bin triage (yard-hub gate → bin record) */
  .tri-card{background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:13px 14px;margin-bottom:10px}
  .tri-top{display:flex;align-items:center;gap:11px}
  .tri-code{font-family:"Anton",sans-serif;font-size:19px;min-width:58px}
  .tri-mid{flex:1;min-width:0;display:flex;flex-direction:column}
  .tri-cust{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tri-sub{font-size:12px;color:var(--muted);margin-top:1px}
  .tri-tag{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;padding:2px 8px;border-radius:20px;flex:none;background:#eef0f3;color:var(--steel)}
  .tri-btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:11px}
  .tri-btns button{flex:1;min-width:92px;border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:11px 6px;font-family:inherit;font-weight:700;font-size:12.5px;cursor:pointer;color:var(--ink);line-height:1.15}
  .tri-btns button.sort{border-color:var(--steel);color:var(--steel)}
  .tri-btns button.clear{border-color:var(--orange);color:var(--orange-d)}
  .tri-btns button.ready{border-color:var(--green);color:var(--green-d)}
  .tri-btns button:active{filter:brightness(.96)}
  .tri-empty{color:var(--muted);font-size:13.5px;padding:8px 2px}
  .tri-wait{font-size:12.5px;color:var(--muted);margin-top:6px;padding:0 2px}
  .breaks-sec{background:linear-gradient(180deg,#FFF7EE,#FFFDFA);border:1.5px solid #F4C79F;border-radius:16px;padding:14px 13px 16px;box-shadow:0 2px 10px rgba(240,80,20,.06)}
  .bk-list{display:flex;flex-direction:column;gap:11px;margin:12px 0}
  .bk-card{background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:13px 13px 12px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
  .bk-card.onbreak{border-color:#F2C200;background:#FFFBEC}
  .bk-top{display:flex;align-items:center;gap:9px;margin-bottom:3px}
  .bk-name{font-family:"Anton",sans-serif;font-size:19px;letter-spacing:.01em;color:var(--ink)}
  .bk-pill{margin-left:auto;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:4px 10px;border-radius:999px}
  .bk-pill.working{background:#E7F6E7;color:#2E7D2E}
  .bk-pill.onbreak{background:#FFE6A0;color:#8a6d00}
  .bk-meta{font-size:12.5px;color:var(--muted);margin-bottom:10px}
  .bk-timer{display:flex;align-items:baseline;gap:8px;background:#FFF3D6;border:1px solid #F2D98C;border-radius:10px;padding:7px 12px;margin-bottom:11px}
  .bk-timer.over{background:#FBE4DD;border-color:#EBB6A8;animation:bkpulse 1s infinite}
  .bk-time{font-family:"Anton",sans-serif;font-size:24px;color:#8a6d00;font-variant-numeric:tabular-nums;line-height:1}
  .bk-timer.over .bk-time{color:#c8401f}
  .bk-tlbl{font-size:11.5px;color:var(--muted)}
  .bk-actions{margin-bottom:10px}
  .bk-big{width:100%;border:none;border-radius:12px;padding:15px;font-family:"Anton",sans-serif;text-transform:uppercase;letter-spacing:.03em;font-size:17px;cursor:pointer;color:#fff}
  .bk-big.start{background:var(--orange)}
  .bk-big.back{background:var(--green)}
  .bk-big:active{opacity:.9}
  .bk-note{width:100%;min-height:42px;border:1.5px solid var(--line);border-radius:10px;padding:9px 11px;font-family:inherit;font-size:13.5px;color:var(--ink);background:#fff;resize:vertical;-webkit-appearance:none}
  .bk-note:focus{outline:none;border-color:var(--orange)}
/* ---- Desktop / tablet responsive (phone layout above is the base) ---- */
@media (min-width:768px){
  .wrap{max-width:900px}
  .snap{grid-template-columns:repeat(4,1fr)}
}
</style>

var _audio=null;
function ensureAudio(){try{if(!_audio)_audio=new (window.AudioContext||window.webkitAudioContext)();if(_audio.state==="suspended")_audio.resume();}catch(e){}}
function beep(){try{ensureAudio();if(!_audio)return;var ctx=_audio;[0,0.25,0.5].forEach(function(t){var o=ctx.createOscillator();var g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type="sine";o.frequency.value=880;var st=ctx.currentTime+t;g.gain.setValueAtTime(0.0001,st);g.gain.exponentialRampToValueAtTime(0.35,st+0.02);g.gain.exponentialRampToValueAtTime(0.0001,st+0.2);o.start(st);o.stop(st+0.22);});}catch(e){}}
function brkTick(){var a=activeBreaks();var keys=Object.keys(a);if(!keys.length)return;var cfg=brkCfg();var changed=false;keys.forEach(function(name){var b=a[name];var remain=b.dur*60000-(Date.now()-b.start);if(remain<=0&&!b.alarmed){b.alarmed=true;changed=true;if(cfg.alarm)beep();}var bc=document.getElementById("bc-"+cssName(name));if(bc)bc.textContent=fmtRemain(remain);var bw=document.getElementById("bw-"+cssName(name));if(bw&&remain<0)bw.classList.add("over");});if(changed)saveActive(a);}

 {id:"demo-6-brakes", truck:"6", item:"Brakes & park brake", note:"Park brake slips on the yard incline", who:"Zack Zeinstra", date:"today", source:"walk-around", open:true},
 {id:"demo-6-leak",   truck:"6", item:"Leaks", note:"Small hydraulic drip under the hooklift", who:"Zack Zeinstra", date:"today", source:"walk-around", open:true},
 {id:"demo-3-lights", truck:"3", item:"Lights & signals", note:"Driver-side brake light out", who:"Dylan Sparrow", date:"yesterday", source:"walk-around", open:true}
];
function renderRepairs(){
  var el=$("#repairAlerts");if(!el)return;
  var fx=(lsGet("ij_fixes_v1")||[]).filter(function(x){return x&&x.open;});
  if(!fx.length)fx=REPAIR_DEMO;
  var cb=$("#repairCount");if(cb)cb.textContent=fx.length?fx.length:"";
  if(!fx.length){el.innerHTML='<p class="emptyline">No open truck or mechanic repairs flagged.</p>';return;}
  var byTruck={};fx.forEach(function(f){var t=f.truck||"\u2014";(byTruck[t]=byTruck[t]||[]).push(f);});
  el.innerHTML=Object.keys(byTruck).sort().map(function(t){
    var rows=byTruck[t].map(function(f){
      return '<div class="fixrow"><div class="fixmain"><div class="fixitem">'+esc(f.item)+'</div>'
        +(f.note?'<div class="fixnote">'+esc(f.note)+'</div>':'')
        +'<div class="fixmeta">'+esc(f.who||"crew")+' \u00b7 '+esc(f.date||"")+(f.source?' \u00b7 '+esc(f.source):'')+'</div></div>'
        +'<button class="fixclear" onclick="clearFix(\''+esc(f.id)+'\')">Fixed</button></div>';
    }).join("");
    return '<div class="fixgroup"><div class="fixtruck">Truck #'+esc(t)+'</div>'+rows+'</div>';
  }).join("");
}
window.clearFix=function(id){
  var fx=lsGet("ij_fixes_v1")||[];var found=false;
  for(var i=0;i<fx.length;i++){if(fx[i].id===id){fx[i].open=false;found=true;break;}}
  if(found)lsSet("ij_fixes_v1",fx);else REPAIR_DEMO=REPAIR_DEMO.filter(function(x){return x.id!==id;});
  render();toast("Cleared \u2014 logged as fixed");
};

/* ===== Part-2: yard manager's own notepad (separate from the office morning note) ===== */
function mgrNoteKey(){return todayISO();}
function getMgrNote(){var all=lsGet("ij_yard_mgr_notes_v1")||{};return all[mgrNoteKey()]||"";}
function saveMgrNote(v){var all=lsGet("ij_yard_mgr_notes_v1")||{};all[mgrNoteKey()]=v;lsSet("ij_yard_mgr_notes_v1",all);}
function renderMgrNotes(){
  var el=$("#mgrNotes");if(!el)return;
  el.innerHTML='<textarea id="mgrNoteBox" class="mgrnote" placeholder="Your notes for the yard today \u2014 reminders, things to hand off, issues to track\u2026">'+esc(getMgrNote())+'</textarea><div class="mgrnote-hint">Saved as you type \u00b7 just for the yard manager</div>';
  var box=document.getElementById("mgrNoteBox");
  if(box)box.addEventListener("input",function(){saveMgrNote(box.value);});
}

/* ===== bin record (shared source of truth — yard hub triages into it; swing board + day board read/write it) ===== */
var BIN_DEST={ roofing:"Hartland landfill", concrete:"McNutts" };
function seedBins(){
  if(lsGet("ij_bins_v1"))return;
  lsSet("ij_bins_v1",[
    {code:"16-22",size:16,type:"Mixed waste",state:"to_sort",job:{customer:"Harris cleanout",address:"Fernwood"},yardAt:"09:05"},
    {code:"08-04",size:8,type:"Concrete",state:"ready_dump",job:{customer:"Westshore Paving",address:"Colwood"},yardAt:"08:40"},
    {code:"20-18",size:20,type:"Roofing",state:"ready_dump",job:{customer:"Summit Roofing",address:"Saanich"},yardAt:"08:20",cleared:{time:"15",by:"Yard crew"}},
    {code:"16-08",size:16,type:"Roofing",state:"clearing",job:{customer:"Smith Roofing",address:"Gladstone Ave"},yardAt:"09:30"},
    {code:"20-31",size:20,type:"Mixed waste",state:"returned",job:{customer:"Oak Bay estate",address:"Beach Dr"},yardAt:"09:50"},
    {code:"20-12",size:20,type:"Construction / wood",state:"out",job:{customer:"Langford reno",address:"Goldstream"}},
    {code:"12-01",size:12,type:"",state:"idle",job:null},
    {code:"20-05",size:20,type:"",state:"idle",job:null}
  ]);
}
function binsAll(){ return lsGet("ij_bins_v1")||[]; }
function getBinR(code){ var a=binsAll(); for(var i=0;i<a.length;i++){ if(a[i].code===code)return a[i]; } return null; }
function saveBinR(code,patch){ var a=binsAll(); for(var i=0;i<a.length;i++){ if(a[i].code===code){ for(var k in patch)a[i][k]=patch[k]; break; } } lsSet("ij_bins_v1",a); }
function binKind(b){ var t=(b.type||"").toLowerCase(); if(t.indexOf("roof")>=0)return "roof"; if(t.indexOf("concrete")>=0||t.indexOf("rubble")>=0)return "conc"; return "mix"; }
function renderTriage(){
  var el=$("#triage"); if(!el)return;
  var all=binsAll();
  var pend=all.filter(function(b){return b.state==="returned";});
  var clearing=all.filter(function(b){return b.state==="clearing";}).length;
  var c=$("#triageCount");
  if(!pend.length){
    el.innerHTML='<div class="tri-empty">Nothing waiting to triage \u2014 every bin that\u2019s back has been marked.</div>'
      +(clearing?'<div class="tri-wait">'+clearing+' '+(clearing===1?'bin is':'bins are')+' with the crew clearing the top.</div>':'');
    if(c)c.textContent="";
    return;
  }
  el.innerHTML=pend.map(function(b){
    var tagTxt=b.type||"Bin";
    var btns='<button class="sort" onclick="binTriage(\''+b.code+'\',\'to_sort\')">Dump to sort</button>'
      +'<button class="clear" onclick="binTriage(\''+b.code+'\',\'clearing\')">Clear the top</button>'
      +'<button class="ready" onclick="binTriage(\''+b.code+'\',\'ready_dump\')">Ready to dump</button>';
    return '<div class="tri-card"><div class="tri-top"><span class="tri-code">'+esc(b.code)+'</span>'
      +'<span class="tri-mid"><span class="tri-cust">'+esc((b.job&&b.job.customer)||"\u2014")+'</span>'
      +'<span class="tri-sub">'+esc(b.size?b.size+" yd":"")+(b.yardAt?(b.size?" \u00b7 ":"")+"in "+esc(b.yardAt):"")+'</span></span>'
      +'<span class="tri-tag">'+esc(tagTxt)+'</span></div>'
      +'<div class="tri-btns">'+btns+'</div></div>';
  }).join("")
    +(clearing?'<div class="tri-wait">'+clearing+' more with the crew clearing the top.</div>':'');
  if(c)c.textContent=pend.length;
}
window.binTriage=function(code,state){
  if(!getBinR(code))return;
  saveBinR(code,{state:state, triagedAt:nowT(), triagedBy:(typeof Y!=="undefined"&&Y.mgr)||""});
  toast(code+" "+(state==="to_sort"?"\u2192 dump to sort":(state==="clearing"?"\u2192 crew clears the top":"\u2192 ready to dump")));
  render();
};

function render(){
  const inYard=yardWorkers().length;
  const openFixes=(lsGet("ij_fixes_v1")||[]).filter(x=>x&&x.open).length||REPAIR_DEMO.length;
  const alerts=MACHINES.filter(m=>m.due).length+(SCALE_OFF.active?1:0)+openFixes;
  $("#tIn").textContent=inYard;
  seedBins();
  $("#tProc").textContent=binsAll().filter(function(b){return b.state==="returned"||b.state==="clearing";}).length;
  renderTriage();
  $("#tAlert").textContent=alerts;

  const n=YARD_NOTES;
  var _yb=officeNoteToday('yard');var _yl=new Date().toLocaleDateString('en-CA',{weekday:'long',month:'short',day:'numeric'});$("#notes").innerHTML=`<div class="notecard"><div class="nh"><span class="nh-by">From the office</span><span class="nh-when">For ${esc(_yl)}</span></div><div class="nbody"${_yb?'':' style="color:#8a8a8a"'}>${_yb?esc(_yb).replace(/\n/g,'<br>'):'Nothing from the office today.'}</div></div>`;

  // scale-off alert
  if(SCALE_OFF.active){
    $("#scaleAlert").innerHTML=`<div class="alertcard"><div class="at"><span class="dot r"></span>Scale reading off — ${esc(SCALE_OFF.combo)}</div>
      <div class="ad">${esc(SCALE_OFF.detail)} Don't trust today's net weights until it's checked.</div>
      <div class="row-btns"><button class="pri" onclick="ackScale()">Checked / recalibrated</button><button onclick="toast('Flagged — will remind you')">Remind me later</button></div></div>`;
  }else $("#scaleAlert").innerHTML="";

  // crew
  $("#breaks").innerHTML=renderBreaks();
  applyColl();


  // machines
  $("#machines").innerHTML=MACHINES.map(m=>`<div class="machine ${m.due?"due":""}">
    <div class="mm"><div class="mn">${esc(m.name)}${m.due?`<span class="duetag">due</span>`:""}</div>
      <div class="ms">${esc(m.task)} · every ${esc(m.every)} · last ${esc(m.last)}</div></div>
    <button class="mbtn" onclick="serviced('${m.id}')">${m.due?"Mark done":"Re-log"}</button></div>`).join("");

  // requests
  renderRepairs();
  renderMgrNotes();

  $("#rec").textContent=`Signed in: ${Y.mgr} · ${Y.signedAt} · access logged to the Management Hub · ${CREW.filter(c=>c.state!=="done").length} in the yard · ${MACHINES.filter(m=>m.due).length} maintenance due · ${new Date().toLocaleDateString(undefined,{month:"short",day:"numeric"})}`;
}

/* ===== Actions ===== */
/* setBreak replaced by timer-based startBreak / endBreak */
window.finishCrew=i=>{CREW[i].state="done";CREW[i].finished=nowT();render();toast(CREW[i].name+" done for the day");};
window.reopenCrew=i=>{CREW[i].state="work";CREW[i].finished=null;render();};
window.serviced=id=>{const m=MACHINES.find(x=>x.id===id);if(!m)return;m.last=new Date().toLocaleDateString(undefined,{month:"short",day:"numeric"});m.due=false;render();toast(m.name+" logged serviced");};
window.ackScale=()=>{SCALE_OFF.active=false;const sc=MACHINES.find(m=>m.id==="scale");if(sc){sc.last=new Date().toLocaleDateString(undefined,{month:"short",day:"numeric"});sc.due=false;}render();toast("Scale logged as checked");};
window.addReq=(item,kind)=>{if(item==="Other"){const v=prompt("What do you need?");if(!v||!v.trim())return;REQUESTS.push({item:v.trim(),note:"",kind:"supply"});}else if(!REQUESTS.some(r=>r.item===item))REQUESTS.push({item,note:"",kind});render();};
window.rmReq=i=>{REQUESTS.splice(i,1);render();};

window.openAddCrew=()=>{
  var here=yardWorkers();
  var avail=ROSTER.filter(function(n){return here.indexOf(n)<0;});
  $("#sheet").innerHTML='<h2>Add to the yard</h2>'+(avail.length?avail.map(function(n){return '<button class="rosterbtn" onclick="addCrew(\''+jsName(n)+'\')">'+esc(n)+'</button>';}).join(""):'<p style="color:var(--muted)">Everyone\u2019s already in.</p>');
  $("#modal").classList.add("show");
};
window.addCrew=n=>{var iso=todayISO();var store=lsGet("ij_yard_workers_v1")||{};store[iso]=store[iso]||[];if(store[iso].indexOf(n)<0)store[iso].push(n);lsSet("ij_yard_workers_v1",store);$("#modal").classList.remove("show");render();toast(n+" added to the yard");};
$("#modal").addEventListener("click",e=>{if(e.target===$("#modal"))$("#modal").classList.remove("show");});
window.addEventListener("click",e=>{if(e.target&&e.target.id==="startEdit"){const v=prompt("Yard start time",START);if(v&&v.trim()){START=v.trim();render();}}});

let toastT;window.toast=m=>{const el=$("#toast");el.textContent=m;el.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove("show"),1600);};

try{var _ss=JSON.parse(localStorage.getItem("ij_session_v1"));if(_ss&&_ss.name)Y.mgr=_ss.name;}catch(e){}Y.signedAt=nowT();yardEnterDash();
</script>
</body>
