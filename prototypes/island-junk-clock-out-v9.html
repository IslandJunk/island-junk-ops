<div class="wrap">

  <!-- viewing-as (prototype switch so you can see crew vs manager) -->
  <div class="bar">
    <div class="barlbl">Viewing as (prototype)</div>
    <div class="people" id="people"></div>
  </div>

<script>
/* ---------- stores (shared with the rest of the app) ---------- */
function lsGet(k){try{var r=localStorage.getItem(k);return r?JSON.parse(r):null;}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"})[c];});}

/* roster: same source of truth + same demo seed as Employee Hours */
var EMP_SEED=[
  {name:"Wes Roberts",role:"Owner",clockOthers:true,tracked:false},
  {name:"Paul Garside",role:"Main manager",clockOthers:true,tracked:false},
  {name:"Jesse Patno",role:"Truck manager",clockOthers:true,tracked:true},
  {name:"Brody Ingram-Johnson",role:"Yard manager",clockOthers:true,tracked:true},
  {name:"Zack Zeinstra",role:"Truck crew",tracked:true},
  {name:"Dylan Sparrow",role:"Truck crew",tracked:true},
  {name:"Ashton Reid",role:"Truck crew",tracked:true},
  {name:"Spencer Smith",role:"Truck crew",tracked:true},
  {name:"Michael Opikokew",role:"Truck crew",tracked:true},
  {name:"Tyler Kowalczyk",role:"Truck crew",tracked:true},
  {name:"Troy Moore",role:"Bin truck driver",tracked:true},
  {name:"Chris Barkhouse",role:"Yard crew",tracked:true},
  {name:"Cody Sutton",role:"Crew",tracked:true},
  {name:"Taryn Tuckwell",role:"Yard / bin crew",tracked:true}
];
function roster(){var e=lsGet("ij_employees_v1");var l=(Array.isArray(e)&&e.length)?e:EMP_SEED;return l.filter(function(p){return p&&p.active!==false;});}
function isManager(p){return /manager|owner/i.test((p&&p.role)||"");}

/* ---------- date / time ---------- */
function d2(n){return (n<10?"0":"")+n;}
function todayIso(){var d=new Date();return d.getFullYear()+"-"+d2(d.getMonth()+1)+"-"+d2(d.getDate());}
function nowClock(){var d=new Date();var h=d.getHours(),mi=d.getMinutes();var ap=h>=12?"pm":"am";var hh=h%12||12;return hh+":"+d2(mi)+ap;}
function nowMin(){var d=new Date();return d.getHours()*60+d.getMinutes();}
function clockToMin(str){
  if(str==null)return null;
  var m=String(str).trim().toLowerCase().match(/^(\d{1,2}):(\d{2})\s*(am|pm)?$/);
  if(!m)return null;
  var h=parseInt(m[1],10),mi=parseInt(m[2],10),ap=m[3];
  if(mi>59)return null;
  if(ap){if(h<1||h>12)return null;if(ap==="pm"&&h!==12)h+=12;if(ap==="am"&&h===12)h=0;}
  return h*60+mi;
}
function fmtDur(min){if(min==null||min<=0)return "0m";var h=Math.floor(min/60),mi=min%60;var s="";if(h)s+=h+"h";if(mi)s+=(s?" ":"")+mi+"m";return s||"0m";}
function minToClock(min){min=((Math.round(min)%1440)+1440)%1440;var h=Math.floor(min/60),mi=min%60;var ap=h>=12?"pm":"am";var hh=h%12||12;return hh+":"+d2(mi)+ap;}
function hhmmToClock(v){var m=String(v).match(/^(\d{1,2}):(\d{2})$/);if(!m)return null;var h=+m[1],mi=+m[2];if(h>23||mi>59)return null;return minToClock(h*60+mi);}
/* parse a plain typed number into a clock string. 230->2:30pm, 1230->12:30pm, 430->4:30pm, 1130->11:30am.
   no colon / no am-pm needed: for a clock-OUT, 7-11 = am and 12 + 1-6 = pm (the workday never overlaps). */
function looseToClock(str){
  if(str==null)return null;
  var s=String(str).trim().toLowerCase();
  if(!s)return null;
  var ap=/p/.test(s)?"pm":(/a/.test(s)?"am":null);
  var hadColon=s.indexOf(":")>=0;
  var digits=s.replace(/[^0-9]/g,"");
  if(!digits)return null;
  var h,mi;
  if(hadColon){var p=s.replace(/[^0-9:]/g,"").split(":");h=parseInt(p[0],10);mi=parseInt(p[1]||"0",10);}
  else if(digits.length<=2){h=parseInt(digits,10);mi=0;}
  else if(digits.length===3){h=parseInt(digits.slice(0,1),10);mi=parseInt(digits.slice(1),10);}
  else if(digits.length===4){h=parseInt(digits.slice(0,2),10);mi=parseInt(digits.slice(2),10);}
  else return null;
  if(isNaN(h)||isNaN(mi)||mi>59)return null;
  if(h>=13&&h<=23){ap=h>=12?"pm":"am";h=h-12;}
  else if(h===0||h===24){h=12;if(!ap)ap="am";}
  if(h<1||h>12)return null;
  if(!ap)ap=(h>=7&&h<=11)?"am":"pm";
  var H=h%12;if(ap==="pm")H+=12;
  return minToClock(H*60+mi);
}
function cssId(s){return String(s).replace(/[^A-Za-z0-9]/g,"_");}

/* ---------- punch log (ij_clock_log) — the layer Employee Hours reads ----------
   entry = {name, at:"<ISO datetime>", inTime:"7:30am", outTime:null|"3:42pm", doneAt:null|"3:10pm"}
   doneAt = end-of-day checklist finished (set by the truck/bin hubs); gap = outTime - doneAt */
function clog(){var l=lsGet("ij_clock_log");return Array.isArray(l)?l:[];}
function setClog(l){lsSet("ij_clock_log",l);}
function openEntry(name){
  var iso=todayIso(),l=clog(),found=null;
  l.forEach(function(e){if(e&&e.name===name&&String(e.at).slice(0,10)===iso&&e.inTime&&!e.outTime)found=e;});
  return found;
}
function doneEntry(name){
  var iso=todayIso(),l=clog(),found=null;
  l.forEach(function(e){if(e&&e.name===name&&String(e.at).slice(0,10)===iso&&e.outTime)found=e;});
  return found;
}
function onClock(name){return !!openEntry(name);}
function clockOut(name){
  var iso=todayIso(),l=clog(),out=nowClock();
  for(var i=l.length-1;i>=0;i--){var e=l[i];
    if(e&&e.name===name&&String(e.at).slice(0,10)===iso&&e.inTime&&!e.outTime){e.outTime=out;setClog(l);return out;}
  }
  return null;
}
/* manual clock-out — for when someone forgot and is entering the time after the fact */
function clockOutAt(name,clockStr){
  var iso=todayIso(),l=clog();
  for(var i=l.length-1;i>=0;i--){var e=l[i];
    if(e&&e.name===name&&String(e.at).slice(0,10)===iso&&e.inTime&&!e.outTime){e.outTime=clockStr;setClog(l);return clockStr;}
  }
  return null;
}

/* In production the hub-pick at sign-in creates the clock-in. The prototype has no
   live login, so seed today's clock-ins once so there's someone to clock out. */
function seedToday(){
  var iso=todayIso(),l=clog(),changed=false;
  roster().forEach(function(p){
    if(p.tracked===false)return;
    var has=l.some(function(e){return e&&e.name===p.name&&String(e.at).slice(0,10)===iso;});
    if(!has){var hm=setTimeFor(p.name);l.push({name:p.name,at:iso+"T"+hm+":00",inTime:hhmmToClock(hm)||"7:30am",outTime:null,doneAt:null});changed=true;}
  });
  /* demo: show the "done on the truck -> clocked out" gap before the hubs are wired.
     doneAt = the moment the end-of-day checklist is finished; outTime = the actual clock-out. */
  var r=roster().filter(function(p){return p.tracked!==false;});
  function entryFor(nm){var f=null;l.forEach(function(e){if(e&&e.name===nm&&String(e.at).slice(0,10)===iso)f=e;});return f;}
  if(r[1]){var e1=entryFor(r[1].name);          /* finished the truck, still hasn't clocked out -> live lag */
    if(e1&&!e1.outTime&&!e1.doneAt){var dm=Math.max(clockToMin(e1.inTime)+5,nowMin()-22);e1.doneAt=minToClock(dm);changed=true;}}
  if(r[2]){var e2=entryFor(r[2].name);          /* finished AND clocked out -> a completed gap */
    if(e2&&!e2.outTime){e2.doneAt="2:52pm";e2.outTime="3:25pm";changed=true;}}
  if(changed)setClog(l);
}
function resetDemo(){
  var iso=todayIso();
  setClog(clog().filter(function(e){return !(e&&String(e.at).slice(0,10)===iso);}));
  seedToday();render();toast("Demo reset \u2014 crew back on the clock");
}

/* ---------- who am I (prototype) ---------- */
var VIEW_NAME=null;
function me(){
  var r=roster();
  if(VIEW_NAME){for(var i=0;i<r.length;i++){if(r[i].name===VIEW_NAME)return r[i];}}
  for(var j=0;j<r.length;j++){if(r[j].clockOthers)return r[j];}   /* default to someone who can clock others out */
  return r[0]||{name:"Crew",role:""};
}

/* ---------- render ---------- */
var app=document.getElementById("app");
function toast(t){var el=document.getElementById("toast");el.textContent=t;el.classList.add("show");clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove("show");},2400);}

/* ---------- overdue clock-out alert (cutoff set in Owner Hub) ---------- */
function overdueCfg(){var c=lsGet("ij_overdue_alert_v1");if(!c||typeof c!=="object")c={};return {on:c.on!==false,cutoff:(typeof c.cutoff==="string"&&/^\d{2}:\d{2}$/.test(c.cutoff))?c.cutoff:"16:30"};}
function cutoffMin(hhmm){var p=String(hhmm).split(":");return (+p[0])*60+(+p[1]);}
function fmt12hm(s){var p=String(s).split(":");var h=+p[0],m=p[1];var ap=h>=12?"pm":"am";var hh=h%12||12;return hh+":"+m+ap;}
function overdueNow(){
  var c=overdueCfg();if(!c.on)return null;
  if(!me().clockOthers)return null;            /* the alert is a manager job: only people who can clock others out get it */
  if(nowMin()<cutoffMin(c.cutoff))return null;
  var on=roster().filter(function(p){return onClock(p.name);});
  if(!on.length)return null;
  return {cutoff:c.cutoff,names:on.map(function(p){return p.name;})};
}
function overdueBanner(od){
  var who=od.names.map(function(n){return esc(n);}).join(", ");
  return '<div class="alert"><div class="al-top"><span class="al-ic">\u26A0\uFE0F</span>'
    +'<div class="al-tx"><div class="al-h">Still on the clock past '+esc(fmt12hm(od.cutoff))+'</div><div class="al-s">'+who+'</div></div>'
    +'<button class="al-snd" onclick="beep()">\uD83D\uDD14 Sound</button></div>'
    +'<div class="al-note">In the live app this texts the manager\u2019s phone.</div></div>';
}
var _actx=null,alertBeeped=false;
function beep(){
  try{
    if(!_actx)_actx=new (window.AudioContext||window.webkitAudioContext)();
    if(_actx.state==="suspended")_actx.resume();
    var t=_actx.currentTime;
    [0,0.2].forEach(function(off){
      var o=_actx.createOscillator(),g=_actx.createGain();
      o.type="sine";o.frequency.value=880;
      o.connect(g);g.connect(_actx.destination);
      g.gain.setValueAtTime(0.0001,t+off);
      g.gain.exponentialRampToValueAtTime(0.28,t+off+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,t+off+0.16);
      o.start(t+off);o.stop(t+off+0.17);
    });
  }catch(e){}
}

/* ---------- clock-IN side: each person's set start + early-start request ---------- */
function schedGet(){var s=lsGet("ij_clock_schedule_v1");return (s&&s.positions)?s:{positions:{"Yard crew":"07:00","Truck crew":"07:30","Bin truck":"07:30"},people:{}};}
function roleToCrew(role){role=String(role||"").toLowerCase();if(/yard/.test(role))return "Yard crew";if(/bin/.test(role))return "Bin truck";return "Truck crew";}
function crewOf(p){var s=schedGet();var c=(s.people[p&&p.name]&&s.people[p.name].crew);if(c&&s.positions[c])return c;return roleToCrew(p&&p.role);}
function setTimeFor(name){var s=schedGet();var p=null,r=roster();for(var i=0;i<r.length;i++){if(r[i].name===name){p=r[i];break;}}if(!p)p={name:name,role:""};var crew=crewOf(p);var ov=(s.people[name]&&s.people[name].override)||"";return ov||s.positions[crew]||"07:30";}
function earlyDB(){var x=lsGet("ij_early_clockin_v1");return (x&&typeof x==="object")?x:{};}
function saveEarly(x){lsSet("ij_early_clockin_v1",x);}
function myEarly(name){var iso=todayIso(),db=earlyDB();return (db[iso]&&db[iso][name])||null;}
function submitEarly(name,clk){var iso=todayIso(),db=earlyDB();db[iso]=db[iso]||{};db[iso][name]={requested:clk,status:"pending",at:new Date().toISOString()};saveEarly(db);}
function looseToClockMorning(str){
  if(str==null)return null;var s=String(str).trim().toLowerCase();if(!s)return null;
  var pm=/p/.test(s);var hadColon=s.indexOf(":")>=0;var digits=s.replace(/[^0-9]/g,"");if(!digits)return null;
  var h,mi;
  if(hadColon){var pr=s.replace(/[^0-9:]/g,"").split(":");h=parseInt(pr[0],10);mi=parseInt(pr[1]||"0",10);}
  else if(digits.length<=2){h=parseInt(digits,10);mi=0;}
  else if(digits.length===3){h=parseInt(digits.slice(0,1),10);mi=parseInt(digits.slice(1),10);}
  else if(digits.length===4){h=parseInt(digits.slice(0,2),10);mi=parseInt(digits.slice(2),10);}
  else return null;
  if(mi>59)return null;var ap=pm?"pm":"am";
  if(h===0){h=12;ap="am";} if(h<1||h>12)return null;
  var H=h%12;if(ap==="pm")H+=12;return minToClock(H*60+mi);
}
function clockInCard(p){
  if(!p)return "";
  if(p.tracked===false)return '<div class="cin"><div class="cin-h">Today\u2019s start</div><div class="cin-note">Your hours aren\u2019t tracked.</div></div>';
  var setHM=setTimeFor(p.name), setClk=hhmmToClock(setHM)||"7:30am";
  var er=myEarly(p.name);
  var h='<div class="cin"><div class="cin-h">Today\u2019s start</div>';
  if(er&&er.status==="approved"){
    h+='<div class="cin-time"><span class="cin-clk ok">'+esc(er.requested)+'</span><span class="cin-tag">early start OK\u2019d \u2713</span></div>';
  }else{
    h+='<div class="cin-time"><span class="cin-clk">'+esc(setClk)+'</span><span class="cin-sub">set start \u00b7 '+esc(crewOf(p))+'</span></div>';
    if(er&&er.status==="pending"){h+='<div class="cin-pend">\u23F3 Early start of '+esc(er.requested)+' \u2014 waiting for a manager to OK it</div>';}
    else if(er&&er.status==="denied"){h+='<div class="cin-deny">Early start wasn\u2019t approved \u2014 your set '+esc(setClk)+' stands</div>';}
  }
  if(!er||er.status==="denied"){
    h+='<button class="cin-eb" onclick="toggleEarly()">I started early today</button>';
    h+='<div class="cin-ef" id="earlyForm" style="display:none"><div class="outrow"><input type="text" inputmode="numeric" id="earlyIn" class="tin" placeholder="630" maxlength="5"><button class="cbtn" onclick="submitEarlyMe()">Send to manager</button></div><div class="mhint">Type the time you started \u2014 630, 645. A manager OKs it; otherwise your set time stands.</div></div>';
  }
  h+='</div>';return h;
}
window.toggleEarly=function(){var f=document.getElementById("earlyForm");if(f)f.style.display=(f.style.display==="none"?"block":"none");};
window.submitEarlyMe=function(){var v=document.getElementById("earlyIn");if(!v||!v.value.trim()){toast("Type the time you started");return;}var c=looseToClockMorning(v.value);if(!c){toast("Type the time like 630");return;}var setClk=hhmmToClock(setTimeFor(me().name));if(clockToMin(c)!=null&&clockToMin(setClk)!=null&&clockToMin(c)>=clockToMin(setClk)){toast("That\u2019s not earlier than your "+setClk+" start");return;}submitEarly(me().name,c);render();toast("Sent \u2014 a manager will OK your "+c+" start");};

function meCard(){
  var p=me(),html="";
  var oe=openEntry(p.name), de=doneEntry(p.name);
  html+='<div class="me"><div class="nm">'+esc(p.name)+'</div><div class="ro">'+esc(p.role||"")+'</div>';
  if(oe){
    var el=fmtDur(nowMin()-clockToMin(oe.inTime));
    html+='<div class="statline"><span class="dot on"></span>On the clock since '+esc(oe.inTime)+'<span class="elapsed">'+el+'</span></div>';
    if(oe.doneAt&&clockToMin(oe.doneAt)!=null&&clockToMin(oe.doneAt)>=clockToMin(oe.inTime)&&nowMin()>=clockToMin(oe.doneAt)){
      html+='<div class="lagline">Done on the truck at '+esc(oe.doneAt)+' &middot; <b>still on the clock &mdash; '+fmtDur(nowMin()-clockToMin(oe.doneAt))+'</b></div>';
    }
    html+='<div class="outrow"><input type="text" inputmode="numeric" id="meOut" class="tin" placeholder="330" maxlength="5"><button class="cbtn" onclick="clockOutMeSmart()">Clock out</button></div>';
    html+='<div class="mhint">Type your out time as a number &mdash; 230, 1230, 430 &mdash; or leave it blank to clock out now.</div>';
  } else if(de){
    var tot=fmtDur(clockToMin(de.outTime)-clockToMin(de.inTime));
    html+='<div class="statline"><span class="dot off"></span>Clocked out at '+esc(de.outTime)+'<span class="elapsed">'+tot+' today</span></div>';
    if(de.doneAt&&clockToMin(de.doneAt)!=null&&clockToMin(de.outTime)!=null){
      var g=clockToMin(de.outTime)-clockToMin(de.doneAt);
      html+='<div class="gapline">Done on the truck '+esc(de.doneAt)+' &rarr; clocked out '+esc(de.outTime)+' &middot; <b>'+fmtDur(g<0?0:g)+' gap</b></div>';
    }
    html+='<button class="cbtn done">Clocked out &#10003;</button>';
  } else {
    html+='<div class="statline"><span class="dot off"></span>Not on the clock today</div>';
  }
  html+='</div>';
  return html;
}

/* ---------- truck handoff: lead lands here after finishing the checklist, with the "also clock out the crew?" prompt ---------- */
function handoffCard(){
  if(!HANDOFF)return meCard();
  var lead=HANDOFF.mgr, truck=HANDOFF.truck;
  var crew=(HANDOFF.crew||[]).filter(function(n){return n&&n!==lead;});
  var crewOpen=crew.filter(function(n){return openEntry(n);});
  var leadOpen=openEntry(lead), leadDone=doneEntry(lead);
  var h='<div class="me handoff">';
  h+=HANDOFF.yard?'<div class="ho-flag">Yard &middot; done for the day</div>':('<div class="ho-flag">Truck #'+esc(truck)+' &middot; finished on the truck</div>');
  h+='<div class="nm">'+esc(lead)+'</div><div class="ro">You &middot; clock yourself out</div>';
  if(leadOpen){
    h+='<div class="outrow"><input type="text" inputmode="numeric" id="hoLead" class="tin" placeholder="330" maxlength="5"><button class="cbtn" onclick="hoClockLead()">Clock out</button></div>';
    h+='<div class="mhint">Type your out time as a number, or leave blank for now.</div>';
  } else if(leadDone){
    h+='<div class="statline"><span class="dot off"></span>You clocked out at '+esc(leadDone.outTime)+'</div>';
  } else {
    h+='<div class="statline"><span class="dot off"></span>Not on the clock today</div>';
  }
  if(crew.length){
    h+='<div class="ho-div"></div>';
    h+='<div class="ho-ask">Also clock out your crew?<span class="ho-note">If someone jumped to another truck, leave them &mdash; that truck clocks them out.</span></div>';
    if(crewOpen.length){
      crewOpen.forEach(function(n){
        h+='<div class="ho-row"><div class="ho-who">'+esc(n)+'</div><div class="rowact"><input type="text" inputmode="numeric" id="ho_'+cssId(n)+'" class="tin sm" placeholder="330" maxlength="5"><button class="rowbtn" onclick="hoClockCrew(\''+esc(n)+'\')">Clock out</button></div></div>';
      });
    } else {
      h+='<div class="ho-allout">Your crew is already clocked out &#10003;</div>';
    }
  }
  h+='</div>';
  return h;
}
function hoClockLead(){var v=document.getElementById("hoLead"),t;if(v&&v.value.trim()){var c=looseToClock(v.value);if(!c){toast("Type the time like 330");return;}t=clockOutAt(HANDOFF.mgr,c);}else t=clockOut(HANDOFF.mgr);render();toast(t?("You\u2019re clocked out \u2014 "+t):"Already clocked out");}
function hoClockCrew(n){var v=document.getElementById("ho_"+cssId(n)),t;if(v&&v.value.trim()){var c=looseToClock(v.value);if(!c){toast("Type the time like 330");return;}t=clockOutAt(n,c);}else t=clockOut(n);render();toast(t?(n+" clocked out \u2014 "+t):(n+" already clocked out"));}

function crewList(){
  if(!me().clockOthers)return "";
  var meName=me().name, r=roster();
  var onList=[], outList=[];
  r.forEach(function(p){
    if(p.name===meName)return;            /* your own card is above */
    if(onClock(p.name))onList.push(p);
    else if(doneEntry(p.name))outList.push(p);
  });
  var h='<div class="seclbl">Clock out a crew member</div>';
  h+='<div class="secsub">'+esc(me().name)+' can clock crew out &mdash; a per-person setting in Owner Hub &rarr; access (<b>Clock-out powers</b>).</div>';
  if(!onList.length){
    h+='<div class="empty">Everyone\u2019s clocked out.</div>';
  } else {
    onList.forEach(function(p){
      var oe=openEntry(p.name), el=fmtDur(nowMin()-clockToMin(oe.inTime));
      var lagNote='';
      if(oe.doneAt&&clockToMin(oe.doneAt)!=null&&clockToMin(oe.doneAt)>=clockToMin(oe.inTime)&&nowMin()>=clockToMin(oe.doneAt)){
        lagNote=' &middot; <span class="lag">done '+esc(oe.doneAt)+', out pending '+fmtDur(nowMin()-clockToMin(oe.doneAt))+'</span>';
      }
      h+='<div class="crow"><div class="who"><div class="n">'+esc(p.name)+'</div>'
        +'<div class="s">'+esc(p.role||"")+' &middot; <b>on since '+esc(oe.inTime)+'</b> &middot; '+el+lagNote+'</div></div>'
        +'<div class="rowact"><input type="text" inputmode="numeric" id="out_'+cssId(p.name)+'" class="tin sm" placeholder="330" maxlength="5"><button class="rowbtn" onclick="clockOutPersonSmart(\''+esc(p.name)+'\')">Clock out</button></div></div>';
    });
  }
  if(outList.length){
    h+='<div class="seclbl" style="margin-top:18px">Clocked out today</div>';
    outList.forEach(function(p){
      var de=doneEntry(p.name);
      var gap='';
      if(de.doneAt&&clockToMin(de.doneAt)!=null&&clockToMin(de.outTime)!=null){
        var g=clockToMin(de.outTime)-clockToMin(de.doneAt);gap=' &middot; '+fmtDur(g<0?0:g)+' gap';
      }
      h+='<div class="crow out"><div class="who"><div class="n">'+esc(p.name)+'</div>'
        +'<div class="s">'+esc(p.role||"")+(de.doneAt?(' &middot; done '+esc(de.doneAt)):'')+gap+'</div></div>'
        +'<span class="outtag">'+esc(de.outTime)+'</span></div>';
    });
  }
  return h;
}

function render(){
  var od=overdueNow();
  if(HANDOFF){
    app.innerHTML=handoffCard();
  } else {
    app.innerHTML=(od?overdueBanner(od):"")+clockInCard(me())+meCard()+crewList();
  }
  document.getElementById("foot").innerHTML=
    'Clock-in is automatic at each person\u2019s <b>set start time</b> (Clock-in times, in the Manager &amp; Owner Hub). Started before that? Send the time and a manager OKs it \u2014 otherwise the set time stands. This screen is also the <b>clock out</b>. '
    +'Tapping it stamps the time into the same record <b>Employee Hours</b> reads, so the day fills in there. '
    +'The <b>overdue alert</b> shows only to people who can clock others out, when someone\u2019s still on the clock past the cutoff (set in <b>Owner Hub &rarr; access</b>) &mdash; the live app texts the manager, here it\u2019s a banner + demo tone (tap <b>Sound</b>). '
    +'Forgot to clock out? Type the time as a plain number (230, 1230, 430) instead of tapping &mdash; it stamps that time. '
    +'When a truck crew finishes the end-of-day checklist it records <b>done on the truck</b>; the difference between that and the actual clock-out is the <b>gap</b> shown here. '
    +'On a personal phone, clocking out just stops the clock; on a shared tablet it returns to login. '
    +'Crew names, times and the alert are prototype demo data. '
    +'<span class="reset" onclick="resetDemo()">Reset demo</span>';
  if(od && !alertBeeped && !HANDOFF){alertBeeped=true;beep();}
  if(!od)alertBeeped=false;
}

function renderPeople(){
  var cur=me().name;
  document.getElementById("people").innerHTML=roster().map(function(p){
    return '<button class="pchip'+(p.name===cur?" on":"")+'" onclick="setPerson(\''+esc(p.name)+'\')">'+esc(p.name)+(p.clockOthers?' <span class="pk">+crew</span>':'')+'</button>';
  }).join("");
}
function setPerson(n){VIEW_NAME=n;renderPeople();render();}
function clockOutMeSmart(){
  var v=document.getElementById("meOut"),t;
  if(v&&v.value.trim()){var c=looseToClock(v.value);if(!c){toast("Type the time like 330");return;}t=clockOutAt(me().name,c);}
  else t=clockOut(me().name);
  render();toast(t?("You\u2019re clocked out \u2014 "+t):"Already clocked out");
}
function clockOutPersonSmart(n){
  var v=document.getElementById("out_"+cssId(n)),t;
  if(v&&v.value.trim()){var c=looseToClock(v.value);if(!c){toast("Type the time like 330");return;}t=clockOutAt(n,c);}
  else t=clockOut(n);
  render();toast(t?(n+" clocked out \u2014 "+t):(n+" already clocked out"));
}

/* ---------- boot ---------- */
var HANDOFF=null;
(function(){
  try{
    var q=new URLSearchParams(location.search);
    var from=q.get("from");
    if(from==="truck"){
      var crew=(q.get("crew")||"").split(",").map(function(s){return s.trim();}).filter(Boolean);
      HANDOFF={mgr:q.get("mgr")||crew[0]||"",truck:q.get("truck")||"",crew:crew};
      VIEW_NAME=HANDOFF.mgr;
    } else if(from==="yard"){
      HANDOFF={yard:true,mgr:q.get("name")||"",truck:"",crew:[]};
      VIEW_NAME=HANDOFF.mgr;
    }
    if(HANDOFF){
      var pe=document.getElementById("people");if(pe)pe.style.display="none";
      var ph=document.getElementById("peopleHint");if(ph)ph.style.display="none";
    }
  }catch(e){}
})();
seedToday();
renderPeople();
render();
setInterval(render,60000);   /* keep the "elapsed" times fresh */
</script>
