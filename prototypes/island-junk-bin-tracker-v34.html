<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Island Junk — Bin Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --orange:#F05014; --orange-d:#D2440F;
    --asphalt:#141414; --ink:#141414; --muted:#6E6E6E;
    --paper:#F4F3F1; --card:#FFFFFF; --line:#E5E3DF;
    --green:#3CA03C; --green-d:#2E7D2E;
    --stop:#C0392B; --grape:#6B4C9A; --steel:#5B6470;
    --shadow:0 1px 2px rgba(0,0,0,.05),0 8px 24px rgba(20,20,20,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:var(--paper);color:var(--ink);line-height:1.45;-webkit-font-smoothing:antialiased;padding-bottom:40px}
  .cnav{position:sticky;top:0;z-index:36;display:flex;gap:8px;max-width:640px;margin:0 auto;background:var(--paper,#F4F3F1);padding:8px 16px;border-bottom:1px solid var(--line,#E5E3DF)}
  .cnav-b{flex:1;border:none;border-radius:9px;padding:9px 8px;font-family:"Inter",system-ui,sans-serif;font-weight:700;font-size:12.5px;cursor:pointer;color:#fff;background:#141414;display:flex;align-items:center;justify-content:center;gap:5px;line-height:1}
  .cnav-b.inc{background:#C0392B}
  .cnav-b:active{filter:brightness(.9)}

  .wrap{max-width:620px;margin:0 auto;padding:0 16px}

  header{background:radial-gradient(440px 150px at 50% 4%,rgba(240,80,20,.08),rgba(240,80,20,0) 72%),linear-gradient(180deg,#ffffff 0%,#fbf9f4 100%);border-bottom:3px solid var(--orange);box-shadow:0 12px 34px rgba(0,0,0,.5);padding:13px 0 12px;position:relative;z-index:5}
  .hd{display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center}
  .logo{width:100%;max-width:320px;height:auto;display:block;margin:0 auto;filter:drop-shadow(0 3px 7px rgba(0,0,0,.18))}
  .tool{font-family:"Anton",sans-serif;font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:#f4f1ec;line-height:1;display:inline-flex;align-items:center;gap:9px;background:#161616;border:1px solid rgba(240,80,20,.5);padding:7px 15px 6px;border-radius:999px;box-shadow:0 5px 14px rgba(0,0,0,.3)}
  .tool::before,.tool::after{content:"";width:13px;height:2px;background:var(--orange);display:inline-block;border-radius:2px}

  /* summary strip */
  .summary{display:flex;gap:8px;margin-top:16px}
  .sum{flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 8px;text-align:center;box-shadow:var(--shadow)}
  .sum .n{font-family:"Anton";font-size:26px;line-height:1}
  .sum .l{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600;margin-top:3px}
  .sum.yard .n{color:var(--green-d)} .sum.out .n{color:var(--orange-d)} .sum.ret .n{color:var(--stop)} .sum.leased .n{color:var(--steel)} .sum.station .n{color:#2E7D8A}

  /* actions */
  .acts{display:flex;flex-wrap:wrap;gap:9px;margin-top:14px}
  .acts button{flex:1 1 calc(50% - 5px);font-family:"Inter";font-weight:600;text-transform:uppercase;letter-spacing:.04em;font-size:14px;padding:14px 6px;border-radius:11px;border:none;cursor:pointer;color:#fff;line-height:1.1}
  .acts .dump{background:#2E7D8A} .acts .dump:active{filter:brightness(.9)}
  .acts .drop{background:var(--orange)} .acts .drop:active{background:var(--orange-d)}
  .acts .pick{background:var(--stop)} .acts .pick:active{filter:brightness(.9)}
  .acts .swap{background:var(--steel)} .acts .swap:active{filter:brightness(.9)}

  /* tabs */
  .tabs{display:flex;gap:6px;margin-top:16px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
  .tabs button{flex:none;background:#fff;border:1.5px solid var(--line);border-radius:20px;padding:8px 14px;font-family:inherit;font-weight:600;font-size:13px;color:var(--muted);cursor:pointer;white-space:nowrap}
  .tabs button.on{background:var(--asphalt);border-color:var(--asphalt);color:#fff}

  /* bin cards */
  .list{margin-top:12px;display:flex;flex-direction:column;gap:9px}
  .bin{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 14px;box-shadow:var(--shadow);cursor:pointer;display:flex;align-items:center;gap:13px}
  .bin .code{font-family:"Anton";font-size:22px;letter-spacing:.01em;min-width:62px}
  .bin .mid{flex:1;min-width:0}
  .bin .line1{font-weight:600;font-size:14px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .bin .line2{font-size:12.5px;color:var(--muted);margin-top:2px}
  .chip{font-family:"Inter";font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em;padding:2px 8px;border-radius:20px;color:#fff;flex:none}
  .chip.yard{background:var(--green)} .chip.out{background:var(--orange)} .chip.ret{background:var(--stop)} .chip.maint{background:var(--steel)} .chip.leased{background:var(--grape)} .chip.station{background:#2E7D8A}
  .lid-chip{font-family:"Inter";font-weight:600;font-size:10.5px;background:#EAF3F4;color:#206673;border:1px solid #BFDDE0;padding:1px 7px;border-radius:20px;flex:none}
  .bin .chev{color:var(--line);font-size:22px;flex:none}
  .empty{text-align:center;color:var(--muted);font-size:14px;padding:30px 10px}
  .empty.sm{padding:14px 6px;font-size:13px}

  /* size-group accordion */
  .expand-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:14px}
  .expand-bar .eb-count{font-size:12.5px;color:var(--muted);font-weight:600}
  .eb-btn{flex:none;background:#fff;border:1.5px solid var(--line);border-radius:20px;padding:7px 14px;font-family:inherit;font-weight:700;font-size:12.5px;color:var(--asphalt);cursor:pointer}
  .eb-btn:hover{border-color:var(--orange);color:var(--orange-d)}
  .grp{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--card);box-shadow:var(--shadow)}
  .grp-head{width:100%;display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fff;border:0;border-left:4px solid var(--orange);font-family:inherit;cursor:pointer;text-align:left}
  .grp-head:disabled{cursor:default;opacity:.5;border-left-color:var(--line)}
  .grp-title{font-family:"Anton";font-size:18px;letter-spacing:.01em;flex:none}
  .grp-stats{flex:1;display:flex;flex-wrap:wrap;gap:2px 9px;font-family:"Inter";font-size:11px;font-weight:600;color:var(--muted);line-height:1.25;padding-left:3px}
  .grp-stats .st{white-space:nowrap}
  .grp-stats .st b{font-weight:800;font-size:12.5px}
  .grp-stats .st.yard b{color:var(--green-d)} .grp-stats .st.out b{color:var(--orange-d)} .grp-stats .st.proc b{color:var(--stop)}
  .grp.empty-grp .grp-stats{opacity:.5}
  .grp-count{flex:none;margin-left:auto;background:var(--asphalt);color:#fff;font-weight:700;font-size:12px;min-width:26px;text-align:center;padding:2px 9px;border-radius:20px}
  .grp.empty-grp .grp-count{background:var(--line);color:var(--muted)}
  .grp-chev{flex:none;font-size:22px;color:var(--muted);transition:transform .18s}
  .grp.open .grp-chev{transform:rotate(90deg)}
  .grp.collapsed .grp-body{display:none}
  .grp-body{display:flex;flex-direction:column;gap:9px;padding:10px 10px 12px}

  /* maintenance / issues panel (stands in for the Manager Hub checklist) */
  #issues:empty{display:none}
  #issues{margin-top:14px}
  .issue-banner{background:#FFF1EE;border:1.5px solid var(--orange);border-radius:12px;overflow:hidden}
  .issue-head{display:flex;align-items:center;gap:9px;padding:12px 14px;cursor:pointer;user-select:none}
  .issue-head .ic{font-size:18px}
  .issue-head .it{font-weight:700;color:var(--orange-d);flex:1;font-size:14px}
  .issue-head .ib{flex:none;background:var(--orange);color:#fff;font-weight:700;font-size:12px;min-width:24px;text-align:center;padding:2px 9px;border-radius:20px}
  .issue-head .ichev{color:var(--orange);font-size:20px;transition:transform .18s}
  .issue-banner.open .issue-head .ichev{transform:rotate(90deg)}
  .issue-banner.open .issue-list{display:block}
  .issue-list{display:none;padding:0 12px 12px}
  .issue-row{background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 12px;margin-top:8px}
  .issue-row .ir1{font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:8px}
  .issue-row .ir-code{font-family:"Anton";font-size:17px}
  .issue-row .ir-kind{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#fff;background:var(--steel);padding:2px 7px;border-radius:20px}
  .issue-row .ir-note{font-size:13.5px;color:var(--ink);margin:6px 0 2px;line-height:1.4}
  .issue-row .ir-meta{font-size:11.5px;color:var(--muted)}
  .issue-actions{display:flex;gap:7px;margin-top:9px}
  .issue-actions button{flex:1;border-radius:9px;padding:9px;font-family:inherit;font-weight:700;font-size:12.5px;cursor:pointer;border:1.5px solid var(--line);background:#fff;color:var(--asphalt)}
  .issue-actions .fix{background:var(--green);border-color:var(--green);color:#fff}
  .issue-actions .rep{background:var(--asphalt);border-color:var(--asphalt);color:#fff}
  .issue-foot{font-size:11px;color:var(--muted);padding:8px 2px 0;line-height:1.45}

  /* maintenance note shown in the main list, right of the bin # */
  .bin.flagged{border-color:var(--orange);box-shadow:inset 0 0 0 1px var(--orange),var(--shadow)}
  .bin .maint-note{color:var(--orange-d);font-weight:600;font-size:12.5px;margin-top:3px;display:flex;gap:5px;align-items:flex-start;line-height:1.35}

  /* maintenance form / current-issue card in the detail sheet */
  .maint-box{border:1.5px dashed var(--line);border-radius:11px;padding:12px;margin-top:4px}
  .maint-box textarea{width:100%;border:1.5px solid var(--line);border-radius:9px;background:#fff;font-family:inherit;font-size:15px;padding:10px 11px;color:var(--ink);min-height:58px;resize:vertical;line-height:1.4}
  .maint-box textarea:focus{outline:none;border-color:var(--orange);background:#FFF7F2}
  .maint-box .mb-send{width:100%;margin-top:9px;background:var(--steel);color:#fff;border:0;border-radius:10px;padding:13px;font-family:inherit;font-weight:700;font-size:15px;cursor:pointer}
  .maint-box .mb-send:active{filter:brightness(.92)}
  .maint-box .mb-hint{font-size:11.5px;color:var(--muted);margin-top:8px;line-height:1.45}
  .maint-cur{background:#FFF1EE;border:1.5px solid var(--orange);border-radius:11px;padding:12px;margin-top:4px}
  .maint-cur .mc-h{font-weight:700;color:var(--orange-d);font-size:13px;display:flex;align-items:center;gap:6px}
  .maint-cur .mc-note{font-weight:600;color:var(--ink);font-size:14.5px;margin:6px 0 3px;line-height:1.4}
  .maint-cur .mc-meta{font-size:11.5px;color:var(--muted)}
  .readnote{font-size:13.5px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:9px;padding:10px 11px;line-height:1.4;margin-top:2px}
  .bin .maint-note.done{color:var(--muted)}
  .maint-cur.done{background:#F4F1EC;border-color:var(--line)}
  .maint-cur.done .mc-h{color:var(--muted)}
  .ghost.danger{color:var(--stop);border-color:#E6B8B0}

  /* bins-out-too-long watch list (also lives on the Manager Hub) */
  #binsout:empty{display:none}
  #binsout{margin-top:14px}
  .out-banner{background:#FFF8EC;border:1.5px solid #E0A100;border-radius:12px;overflow:hidden}
  .out-head{display:flex;align-items:center;gap:9px;padding:12px 14px;cursor:pointer;user-select:none}
  .out-head .ic{font-size:18px}
  .out-head .it{font-weight:700;color:#9A6B00;flex:1;font-size:14px}
  .out-head .ib{flex:none;background:#E0A100;color:#fff;font-weight:700;font-size:12px;min-width:24px;text-align:center;padding:2px 9px;border-radius:20px}
  .out-head .ichev{color:#E0A100;font-size:20px;transition:transform .18s}
  .out-banner.open .out-head .ichev{transform:rotate(90deg)}
  .out-banner.open .out-list{display:block}
  .out-list{display:none;padding:0 12px 12px}
  .out-row{background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 12px;margin-top:8px}
  .out-row .or-top{display:flex;align-items:center;gap:11px;cursor:pointer}
  .out-row .or-contact{display:flex;align-items:center;justify-content:space-between;gap:9px;margin-top:9px;padding-top:9px;border-top:1px dashed var(--line)}
  .out-row .or-log{flex:1;min-width:0;font-size:12px;color:var(--muted);line-height:1.35}
  .out-row .or-log.has{color:var(--green-d);font-weight:600}
  .or-btn{flex:none;background:#fff;border:1.5px solid var(--green);color:var(--green-d);border-radius:9px;padding:7px 12px;font-family:inherit;font-weight:700;font-size:12px;cursor:pointer}
  .or-btn:active{background:#EAF6EA}
  .timefield{display:flex;gap:6px;align-items:stretch}
  .timefield input{flex:1}
  .now-btn{flex:none;background:var(--asphalt);color:#fff;border:none;border-radius:9px;padding:0 16px;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;white-space:nowrap}
  .now-btn:active{filter:brightness(1.4)}
  .clog{font-size:13px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-top:6px;line-height:1.4}
  .out-row .or-code{font-family:"Anton";font-size:17px;min-width:54px}
  .out-row .or-mid{flex:1;min-width:0}
  .out-row .or-cust{font-weight:700;font-size:13.5px}
  .out-row .or-sub{font-size:12px;color:var(--muted);margin-top:2px}
  .out-row .or-wk{flex:none;font-weight:700;font-size:12px;color:#fff;padding:4px 11px;border-radius:20px;text-align:center;white-space:nowrap}
  .or-wk.lvl1{background:#E0A100} .or-wk.lvl2{background:var(--orange)} .or-wk.lvl3{background:var(--stop)}
  .out-foot{font-size:11px;color:var(--muted);padding:8px 2px 0;line-height:1.45}

  /* modal / sheet */
  .modal{position:fixed;inset:0;background:rgba(20,20,22,.55);z-index:50;display:none;align-items:flex-end;justify-content:center}
  .modal.show{display:flex}
  .sheet{background:#fff;width:100%;max-width:620px;border-radius:18px 18px 0 0;max-height:92vh;overflow:auto;
    padding:18px 18px calc(20px + env(safe-area-inset-bottom))}
  .sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .sheet-head h2{font-family:"Inter";font-weight:600;text-transform:uppercase;letter-spacing:.05em;font-size:18px}
  .x{background:var(--paper);border:none;width:34px;height:34px;border-radius:50%;font-size:18px;color:var(--muted);cursor:pointer;line-height:1}

  .f-lab{font-family:"Inter";font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:14px 0 6px}
  .f-lab:first-child{margin-top:0}
  select,input[type=text],input[type=date],input[type=time],textarea{
    width:100%;font-family:inherit;font-size:16px;color:var(--ink);background:#fff;
    border:1.5px solid var(--line);border-radius:10px;padding:12px 13px;min-height:46px;-webkit-appearance:none;appearance:none}
  select:focus,input:focus,textarea:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px rgba(237,80,24,.16)}
  textarea{min-height:64px;resize:vertical}
  .f-note{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.4}
  .f-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:14px;padding:12px 13px;background:var(--paper);border-radius:10px}
  .f-row .t-lab{font-weight:600;font-size:14px}
  .f-row .t-sub{font-size:12px;color:var(--muted)}
  .two{display:flex;gap:10px}.two>div{flex:1}
  .sw{position:relative;width:52px;height:30px;flex:none}
  .sw input{position:absolute;opacity:0;width:100%;height:100%;margin:0;cursor:pointer}
  .sw .track{position:absolute;inset:0;background:#CFC9BF;border-radius:30px;transition:background .15s}
  .sw .knob{position:absolute;top:3px;left:3px;width:24px;height:24px;background:#fff;border-radius:50%;transition:transform .15s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
  .sw input:checked~.track{background:var(--orange)} .sw input:checked~.knob{transform:translateX(22px)}

  .readout{margin-top:14px;padding:13px;background:#FFF7ED;border:1px solid #F6C99B;border-radius:11px;font-size:14px;line-height:1.55}
  .readout .big{font-family:"Inter";font-weight:700;font-size:22px;color:var(--orange-d)}
  .readout.calc{background:var(--paper);border-color:var(--line)}
  .readout b{color:var(--orange-d)}
  .readout .free{color:var(--green-d);font-weight:600}
  .tpick{display:flex;gap:8px;flex-wrap:wrap}
  .tbtn{flex:none;min-width:46px;border:1.5px solid var(--line);background:#fff;border-radius:10px;font-family:"Inter";font-weight:700;font-size:16px;color:var(--ink);padding:11px 6px;cursor:pointer;line-height:1;text-align:center}
  .tbtn.on{border-color:var(--orange);background:#FFF7ED;color:var(--orange-d)}
  .tbtn small{display:block;font-size:8.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
  .tbtn.on small{color:var(--orange-d)}
  .ferr{color:var(--stop);font-weight:600;font-size:12.5px;margin-top:10px;display:none}
  .ferr.show{display:block}

  .primary{width:100%;margin-top:18px;font-family:"Inter";font-weight:600;text-transform:uppercase;letter-spacing:.05em;font-size:17px;padding:15px;border-radius:12px;border:none;cursor:pointer;color:#fff;background:var(--orange)}
  .primary:active{background:var(--orange-d)}
  .primary.ret{background:var(--stop)} .primary.green{background:var(--green)}
  .ghost{width:100%;margin-top:10px;background:#fff;border:1.5px solid var(--line);color:var(--ink);font-family:inherit;font-weight:600;font-size:14px;padding:13px;border-radius:11px;cursor:pointer}

  .det dl{display:grid;grid-template-columns:auto 1fr;gap:6px 14px;font-size:14px;margin:0}
  .det dt{color:var(--muted)} .det dd{text-align:right;font-weight:600}
  .det .seg-h{font-family:"Inter";font-weight:600;text-transform:uppercase;letter-spacing:.05em;font-size:12px;color:var(--muted);margin:16px 0 8px;padding-top:14px;border-top:1px solid var(--line)}
  .pill{display:inline-block;background:var(--grape);color:#fff;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;padding:2px 8px;border-radius:20px}
  .hide{display:none}
  .photo-add{display:flex;align-items:center;justify-content:center;gap:8px;border:1.5px dashed var(--line);background:#fff;border-radius:11px;padding:13px;font-weight:600;color:var(--muted);cursor:pointer;font-size:15px;margin-top:4px}
  .thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-top:9px}
  .thumb{position:relative;width:74px;height:74px;border-radius:10px;overflow:hidden;border:1px solid var(--line)}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .thumb .rm{position:absolute;top:2px;right:2px;width:22px;height:22px;border:none;border-radius:50%;background:rgba(20,20,22,.72);color:#fff;font-size:12px;line-height:1;cursor:pointer;padding:0}
  .role-h{font-family:"Inter";font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-size:11px;color:var(--muted);margin:16px 0 6px;display:flex;align-items:center;gap:7px}
  .role-h::after{content:"";flex:1;height:1px;background:var(--line)}
  .ck2{display:flex;gap:10px;align-items:flex-start;background:#FFF7F2;border:1.5px solid #f0c9b4;border-radius:11px;padding:12px;margin-top:12px;font-weight:600;cursor:pointer}
  .ck2 input{width:20px;height:20px;flex:none;margin-top:1px}
  .sched{margin:2px 0 16px}
  .sched-h{font-family:"Inter";font-weight:800;text-transform:uppercase;letter-spacing:.03em;font-size:14px;color:var(--ink);margin:2px 0 10px;display:flex;align-items:center;gap:8px;border-left:3px solid var(--orange);padding-left:9px}
  .rflag{margin-top:16px;border-top:1px solid var(--line);padding-top:12px}
  .rflag-head{display:flex;align-items:center;gap:9px;font-size:13.5px;font-weight:600;color:var(--muted);cursor:pointer;user-select:none}
  .rflag-head input{width:17px;height:17px;flex:none;accent-color:var(--orange);cursor:pointer}
  .rflag-head .wr{font-size:14px}
  .rflag-body{margin-top:10px}
  .rflag-body.hide{display:none}

function wireTruckPick(getCur,setCur){
  const box=$("#__tp"); if(!box)return;
  box.querySelectorAll(".tbtn").forEach(btn=>btn.addEventListener("click",()=>{

// BC statutory holidays 2026 — free days (real build computes these per year)
const HOLIDAYS=new Set(["2026-01-01","2026-02-16","2026-04-03","2026-05-18","2026-07-01","2026-08-03","2026-09-07","2026-09-30","2026-10-12","2026-11-11","2026-12-25","2026-12-26"]);

/* ===== Date helpers ===== */
function todayIso(){return dateToIso(new Date());}
function dateToIso(dt){return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");}
function isoToDate(iso){const p=iso.split("-").map(Number);return new Date(p[0],p[1]-1,p[2]);}
function isWeekend(dt){const d=dt.getDay();return d===0||d===6;}
function isHoliday(dt){return HOLIDAYS.has(dateToIso(dt));}
function daysBetween(aIso,bIso){return Math.round((isoToDate(bIso)-isoToDate(aIso))/86400000);}
// billable weekdays strictly between drop & pickup, minus the 3 included
function extraWeekdays(dropIso,pickIso){
  if(!dropIso||!pickIso)return 0;
  let n=0, cur=isoToDate(dropIso); const end=isoToDate(pickIso);
  cur.setDate(cur.getDate()+1);                 // day after drop (drop day free)
  while(cur<end){                               // up to but not incl pickup day (pickup free)
    if(!isWeekend(cur)&&!isHoliday(cur))n++;
    cur.setDate(cur.getDate()+1);
  }
  return Math.max(0,n-INCLUDED_DAYS);
}

/* ===== Fleet ===== */
function mk(size,n,lidded){return {code:size+"-"+String(n).padStart(2,"0"),size,lidded:!!lidded,leased:false,stationed:false,customLid:false,status:"in_yard",
  customer:"",address:"",town:"",roofing:false,base:0,surcharge:null,truck:"",
  dropDate:"",dropTime:"",pickDate:"",hqTime:"",scheduledPickup:"",lastDumped:"",gross:"",grossF:"",grossR:"",tare:"",tareF:"",tareR:"",wasteClass:"",extraTime:"",pickupBy:"",dumpBy:"",dumpFee:"",sortJunk:"",sortMetal:"",sortTime:"",noSort:false,notes:"",photos:[],contactLog:[]};}
function seed(){
  const b=[];
  for(let n=1;n<=4;n++)b.push(mk(8,n,false));
  for(let n=1;n<=16;n++)b.push(mk(12,n,true));
  for(let n=1;n<=11;n++)b.push(mk(16,n,false));
  for(let n=1;n<=44;n++)b.push(mk(20,n,false));
  const leased=new Set(["20-10","20-11","20-14","20-22","20-29","20-41","20-44","16-05","16-06","12-03","12-04"]);
  b.forEach(x=>{if(leased.has(x.code))x.leased=true;});
  // Sample bins currently out on rental (so Pickups due + roofing flow are visible).
  const now=new Date(), isoD=d=>d.toISOString().slice(0,10);
  const dAgo=n=>{const d=new Date(now);d.setDate(d.getDate()-n);return isoD(d);};

    </div>`;
  pd.innerHTML=pdHtml;
  const ocH=$("#oncallHead"); if(ocH)ocH.addEventListener("click",()=>{onCallOpen=!onCallOpen;render();});
  pd.querySelectorAll(".jcard").forEach(el=>el.addEventListener("click",()=>openPickup(el.dataset.pick)));

  $("#tabs").innerHTML=TABS.map(([k,l])=>`<button data-tab="${k}" class="${k===tab?'on':''}">${l}</button>`).join("");
  document.querySelectorAll('#tabs button').forEach(btn=>btn.addEventListener("click",()=>{
    tab=btn.dataset.tab;
    if(tab==="all")openSizes.clear();                                  // browse mode → dropdowns closed
    else openSizes=new Set(rowsForTab(tab).map(b=>b.size));            // filter mode → auto-open sizes with results
    render();
  }));

  let rows=rowsForTab(tab);
  rows.sort(numSort);

  const list=$("#list");
  const SIZES=[8,12,16,20];
  const bySize={}; SIZES.forEach(s=>bySize[s]=[]);
  rows.forEach(b=>{ if(bySize[b.size]) bySize[b.size].push(b); });
  const nonEmpty=SIZES.filter(s=>bySize[s].length>0);
  const allExpanded=nonEmpty.length>0 && nonEmpty.every(s=>openSizes.has(s));

  // expand-all / collapse-all toolbar
  const eb=$("#expandBar");
  eb.innerHTML = rows.length
    ? `<span class="eb-count">${rows.length} bin${rows.length===1?"":"s"} in this view</span>
       <button class="eb-btn" id="expandAll">${allExpanded?"Collapse all":"Expand all"}</button>`
    : "";
  const ea=$("#expandAll");
  if(ea)ea.addEventListener("click",()=>{ if(allExpanded)openSizes.clear(); else nonEmpty.forEach(s=>openSizes.add(s)); render(); });

  if(!rows.length){list.innerHTML='<div class="empty">No bins in this view.</div>';return;}

  // one collapsible dropdown per size
  list.innerHTML=SIZES.map(s=>{
    const arr=bySize[s], n=arr.length, open=n>0&&openSizes.has(s);
    // fleet-wide availability for this size (independent of the active tab)
    const yN=bins.filter(b=>b.size===s&&b.status==="in_yard"&&!b.leased).length;
    const oN=bins.filter(b=>b.size===s&&b.status==="dropped").length;
    const pN=bins.filter(b=>b.size===s&&b.status==="returning").length;
    return `<div class="grp ${open?'open':'collapsed'} ${n===0?'empty-grp':''}">
      <button class="grp-head" data-gsize="${s}" ${n===0?'disabled':''}>
        <span class="grp-title">${s} yard</span>
        <span class="grp-stats">
          <span class="st yard"><b>${yN}</b> in yard</span>
          <span class="st out"><b>${oN}</b> out</span>
          <span class="st proc"><b>${pN}</b> to process</span>
        </span>
        <span class="grp-count">${n}</span>
        <span class="grp-chev">›</span>
      </button>
      <div class="grp-body">${n?arr.map(binCard).join(""):'<div class="empty sm">None in this view.</div>'}</div>
    </div>`;
  }).join("");
  document.querySelectorAll('#list .grp-head:not([disabled])').forEach(h=>h.addEventListener("click",()=>{
    const s=+h.dataset.gsize; openSizes.has(s)?openSizes.delete(s):openSizes.add(s); render();
  }));
  document.querySelectorAll('#list .bin').forEach(el=>el.addEventListener("click",()=>openDetail(el.dataset.code)));
}

/* ===== Sheet ===== */
function openSheet(title,html){$("#sheetTitle").textContent=title;$("#sheetBody").innerHTML=html;$("#modal").classList.add("show");}
function closeSheet(){$("#modal").classList.remove("show");}
$("#sheetX").addEventListener("click",closeSheet);
$("#modal").addEventListener("click",e=>{if(e.target===$("#modal"))closeSheet();});

function townOptions(sel){return TOWNS.map(t=>`<option ${t.name===sel?"selected":""}>${t.name}</option>`).join("");}

/* ---- per-bin photos (tracked to that bin only) ---- */
function photoBlock(tag,label){
  return `<div class="f-lab">${label}</div>
    <label class="photo-add" for="ph_${tag}">＋ Add photos</label>
    <input type="file" id="ph_${tag}" accept="image/*" multiple capture="environment" class="hide">
    <div class="thumbs" id="thumbs_${tag}"></div>`;
}
function wirePhotos(b,tag){
  const inp=$("#ph_"+tag); if(!inp) return;
  b.photos=b.photos||[];
  const draw=()=>{
    const box=$("#thumbs_"+tag); if(!box) return;
    box.innerHTML=b.photos.filter(p=>p.tag===tag).map(p=>`<div class="thumb"><img src="${p.url}"><button class="rm" data-u="${p.url}">✕</button></div>`).join("");
    box.querySelectorAll(".rm").forEach(btn=>btn.addEventListener("click",()=>{b.photos=b.photos.filter(p=>p.url!==btn.dataset.u);draw();}));
  };
  inp.addEventListener("change",e=>{[...e.target.files].forEach(f=>b.photos.push({url:URL.createObjectURL(f),tag,when:todayIso()}));e.target.value="";draw();});
  draw();
}
function photoGallery(b){
  if(!b.photos||!b.photos.length) return "";
  const lab={placement:"Placement",overload:"Overload",yard:"Yard",hands:"Job",note:"Added"};
  return `<div class="seg-h">Photos (${b.photos.length})</div><div class="thumbs">`+
    b.photos.map(p=>`<div class="thumb" title="${lab[p.tag]||p.tag}"><img src="${p.url}"></div>`).join("")+`</div>`;
}

let PEND=[];
function wirePend(tag){
  const inp=$("#ph_"+tag); if(!inp) return;
  const draw=()=>{const box=$("#thumbs_"+tag);if(!box)return;
    box.innerHTML=PEND.filter(p=>p.tag===tag).map(p=>`<div class="thumb"><img src="${p.url}"><button class="rm" data-u="${p.url}">✕</button></div>`).join("");
    box.querySelectorAll(".rm").forEach(btn=>btn.addEventListener("click",()=>{PEND=PEND.filter(p=>p.url!==btn.dataset.u);draw();}));};
  inp.addEventListener("change",e=>{[...e.target.files].forEach(f=>PEND.push({url:URL.createObjectURL(f),tag,when:todayIso()}));e.target.value="";draw();});
  draw();
}

/* ---- Drop ---- */
function nowHM(){const d=new Date();return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
function timeFieldHtml(id,label,req){
  return `<div class="f-lab">${label}${req?' <span style="color:var(--stop)">*</span>':''}</div>
    <div class="timefield"><input type="time" id="${id}"><button type="button" class="now-btn" data-now="${id}">Now</button></div>`;
}
function openDrop(presetCode,jobId){
  const jobById=id=>DROP_JOBS.find(j=>j.id===id);
  const openJobs=DROP_JOBS.filter(j=>!j.binCode);
  const anyBin=bins.filter(b=>b.status==="in_yard"&&!b.leased);
  if(!anyBin.length){openSheet("Drop a bin",`<div class="empty">No bins available in the yard right now.</div>`);return;}
  let defaultSel;
  if(jobId&&jobById(jobId)&&!jobById(jobId).binCode)defaultSel=jobId;
  else if(presetCode)defaultSel="manual";
  else if(openJobs.length)defaultSel=openJobs[0].id;
  else defaultSel="manual";
  const jobOpts=openJobs.map(j=>`<option value="${j.id}" ${j.id===defaultSel?"selected":""}>${j.customer} — ${j.address.split(",")[0]} (${j.size} yd)</option>`).join("")+`<option value="manual" ${defaultSel==="manual"?"selected":""}>— No booking · enter manually —</option>`;
  openSheet("Drop a bin",`
    <div class="f-lab">Which job are you at?</div>
    <select id="dJob">${jobOpts}</select>
    <div id="dJobInfo"></div>
    <div id="dManual" class="hide">
      <div class="f-row"><div><div class="t-lab">Roofing job?</div><div class="t-sub">Marks this as a roofing bin/job</div></div>
        <label class="sw"><input type="checkbox" id="dRoof"><span class="track"></span><span class="knob"></span></label></div>
      <div class="f-lab">Customer</div><input type="text" id="dCust" placeholder="Name or company">
      <div class="f-lab">Service address</div><input type="text" id="dAddr" placeholder="Street address">
      <div class="f-lab">Area</div><select id="dTown">${townOptions()}</select>
      <div class="f-note">Ad-hoc drop with no booking — area is detected from the address in the live app.</div>
    </div>
    <div class="f-lab">Which bin are you dropping?</div>
    <select id="dBin"></select>
    <div class="f-note" id="dBinNote"></div>
    <div class="two"><div><div class="f-lab">Drop date</div><input type="date" id="dDate" value="${todayIso()}"></div>
      <div>${timeFieldHtml("dTime","Drop time","")}</div></div>
    <div class="f-lab">Notes <span style="color:var(--muted);font-weight:500;text-transform:none;letter-spacing:0">· pickup info for the other driver / reminders</span></div>
    <textarea id="dNotes" placeholder="e.g. gate code 1234 · bin behind the house · call before pickup"></textarea>
    ${photoBlock("placement","Photo of where you set the bin (optional)")}
    ${repairFieldHtml("This bin needs repair")}
    <button class="primary" id="dGo">Confirm drop</button>`);
  const curJob=()=>{const v=$("#dJob").value;return v==="manual"?null:jobById(v);};
  function jobSummaryHtml(j){
    const flex=(j.roofing||j.size>=20)?' <span style="color:var(--muted)">(16 or 20 ok)</span>':'';
    return `<div class="summ"><b>${j.customer}</b>${j.roofing?'<span class="roofflag">Roofing</span>':''}<br>${j.address}<br>Area: ${j.town} · Bin: <b>${j.size} yd</b>${flex}${j.contact?`<br>${j.contact}`:""}${j.scope?`<br><span style="color:var(--muted)">${j.scope}</span>`:""}</div>
      <div class="f-note">Pulled from the booking — customer, area &amp; roofing are already set. The manager doesn't pre-pick the bin: just drop whatever you took and log its number here.</div>`;
  }
  function renderBinOpts(){
    const j=curJob();
    let pool=bins.filter(b=>b.status==="in_yard"&&!b.leased),note="";
    if(j){
      const elig = j.roofing ? [16,20] : (j.size>=20 ? [20,16] : [j.size]);
      const sized=pool.filter(b=>elig.includes(b.size));
      if(sized.length){
        pool=sized;
        note = elig.length>1 ? `Booked ${j.size} yd — drop the ${elig.join(" or ")} yd you actually took.` : `Booked size: ${j.size} yd.`;
      } else { note=`No ${elig.join("/")} yd bin in the yard — showing all sizes.`; }
      pool.sort((a,b)=>{const pa=a.size===j.size?0:1,pb=b.size===j.size?0:1;return pa-pb||numSort(a,b);});
    } else { pool.sort(numSort); }
    $("#dBin").innerHTML=pool.length?pool.map(b=>`<option value="${b.code}" ${b.code===presetCode?"selected":""}>${b.code} (${b.size} yd${b.lidded?", lidded":""})</option>`).join(""):`<option value="">No bins available</option>`;
    $("#dBinNote").textContent=pool.length?note:"No bins available in the yard.";
  }
  function onJobChange(){const j=curJob();$("#dJobInfo").innerHTML=j?jobSummaryHtml(j):"";$("#dManual").classList.toggle("hide",!!j);renderBinOpts();}
  $("#dJob").addEventListener("change",onJobChange);
  onJobChange();
  PEND=[]; wirePend("placement"); wireRepairField();
  $("#dGo").addEventListener("click",()=>{
    const code=$("#dBin").value;if(!code)return;
    const b=get(code),j=curJob();
    if(j){b.roofing=j.roofing;b.customer=j.customer;b.address=j.address;b.town=j.town;b.jobId=j.id;j.binCode=b.code;}
    else{b.roofing=$("#dRoof").checked;b.customer=$("#dCust").value.trim();b.address=$("#dAddr").value.trim();b.town=$("#dTown").value;}
    b.status="dropped";b.dropDate=$("#dDate").value;b.dropTime=$("#dTime").value;
    const tr=townRec(b.town);b.surcharge=tr?(b.roofing?tr.roof:tr.std):null;b.base=b.roofing?BASE_ROOF:BASE_STD;
    b.notes=$("#dNotes").value.trim();
    b.pickDate="";b.hqTime="";b.gross="";b.grossF="";b.grossR="";b.tare="";b.tareF="";b.tareR="";b.wasteClass="";
    b.photos=PEND.slice();
    applyRepairField(b);
    try{bdMarkStopDone($("#dJob").value);}catch(_){}closeSheet();render();
  });
}

/* ---- Pickup (with dump-direct close-out) ---- */
function openPickup(presetCode,dumpDirect){
  const out=bins.filter(b=>b.status==="dropped").sort(numSort);
  if(!out.length){openSheet("Pick up a bin",`<div class="empty">No bins are currently out on rental.</div>`);return;}
  const opts=out.map(b=>`<option value="${b.code}" ${b.code===presetCode?"selected":""}>${b.code} — ${b.customer||"—"} (${b.town||"—"})</option>`).join("");
  const b=out.find(x=>x.code===presetCode)||out[0];
  openSheet("Pick up a bin",`
    <div class="f-lab">Which bin are you picking up?</div><select id="pBin">${opts}</select>
    <div id="pInfo"></div>
    <div class="two"><div><div class="f-lab">HQ return date</div><input type="date" id="pDate" value="${todayIso()}"></div>
      <div>${timeFieldHtml("pTime","HQ time",true)}</div></div>
    <div class="f-lab">Your name *</div><input type="text" id="pBy" placeholder="Driver picking up">
    ${truckPickHtml("")}
    <div class="f-note">The truck picking up — also the truck for the empty (tare) weigh-off.</div>
    <div class="f-lab">Billable extra time <span style="color:var(--muted);font-weight:500;text-transform:none;letter-spacing:0">· optional — waiting, securing the load, etc.</span></div>
    <input type="text" id="pExtra" placeholder="e.g. 20 min waiting for a vehicle to move">
    ${photoBlock("overload","Overload / over-the-top photos (if any)")}
    <label class="ck2"><input type="checkbox" id="pDirect" ${dumpDirect?"checked":""}>
      <span>🚛 I'm dumping this load directly — skip the yard, I'll log the weights now</span></label>
    <div id="pYard" class="hide">
      <div class="role-h">Yard close-out (you're doing it)</div>
      <div class="f-lab">Gross (kg) — front + rear axle</div>
      <div class="two"><div><input type="text" inputmode="numeric" id="pGF" placeholder="Front axle"></div>
        <div><input type="text" inputmode="numeric" id="pGR" placeholder="Rear axle"></div></div>
      <div class="f-lab" style="margin-top:12px">Tare (kg) — front + rear axle</div>
      <div class="two"><div><input type="text" inputmode="numeric" id="pTF" placeholder="Front axle"></div>
        <div><input type="text" inputmode="numeric" id="pTR" placeholder="Rear axle"></div></div>
      <div class="readout calc" id="pNet">Weigh each axle — totals add up here.</div>
      <div class="f-note">Empty (tare) is logged as this truck + bin for the truck&nbsp;+&nbsp;bin weight log.</div>
      <div class="f-lab" style="margin-top:14px">Waste class</div>
      <select id="pC"><option value="">Select…</option>${WASTE_CLASSES.map(c=>`<option>${c}</option>`).join("")}</select>
      <div class="f-lab" style="margin-top:14px">Dump fee charged to us ($) <span style="color:var(--muted);font-weight:500;text-transform:none;letter-spacing:0">&middot; what you paid at the scale, if any</span></div>
      <input type="text" inputmode="decimal" id="pFee" placeholder="e.g. 165.00" value="${b.dumpFee||""}">
      <label class="ck2" style="margin-top:10px"><input type="checkbox" id="pSplitOn">
        <span>This load had more than one job\'s material \u2014 split the fee</span></label>
      <div id="pSplitBox" class="hide"></div>
      ${photoBlock("yard","Yard / dump photos")}
    </div>
    ${repairFieldHtml("This bin needs repair")}
    <div class="ferr" id="pErr">Enter your name, pick the truck, and enter the HQ time first.</div>
    <button class="primary ret" id="pGo">Confirm pickup → returning to yard</button>`);
  function pInfoHtml(b){
    const tot=daysBetween(b.dropDate,todayIso());
    return `<div class="summ"><b>${b.customer||"—"}</b>${b.roofing?'<span class="roofflag">Roofing</span>':''}<br>${b.address||"—"}<br>Area: ${b.town||"—"} · ${b.size} yd · out ${tot} day${tot===1?"":"s"}${b.notes?`<br><span style="color:var(--orange-d);font-weight:600">📝 Drop notes: ${b.notes}</span>`:""}</div>
      <div class="f-note">Customer &amp; address came from the drop — just confirm the truck and HQ time below.</div>`;
  }
  const refreshSel=()=>{$("#pInfo").innerHTML=pInfoHtml(get($("#pBin").value));};
  const net=()=>{const gt=(parseFloat($("#pGF").value)||0)+(parseFloat($("#pGR").value)||0),tt=(parseFloat($("#pTF").value)||0)+(parseFloat($("#pTR").value)||0),n=gt-tt;$("#pNet").innerHTML=`Gross <b>${gt>0?gt+" kg":"—"}</b> · Tare <b>${tt>0?tt+" kg":"—"}</b> · Net <b>${n>0?n+" kg":"—"}</b>`;};
  const toggleDirect=()=>{
    const on=$("#pDirect").checked;
    $("#pYard").classList.toggle("hide",!on);
    $("#pGo").textContent = on ? "Confirm + close out (dumped direct)" : "Confirm pickup → returning to yard";
    $("#pGo").classList.toggle("green",on);
  };
  $("#pBin").addEventListener("change",refreshSel); refreshSel();
  ["#pGF","#pGR","#pTF","#pTR"].forEach(s=>$(s).addEventListener("input",net));
  $("#pDirect").addEventListener("change",toggleDirect); toggleDirect();
  /* ---- dump-fee split across jobs (capture-only; rides on the bin record for invoicing) ---- */
  let splits=[];
  const splitTally=()=>{
    const el=$("#pSplitTally"); if(!el)return;
    const fee=parseFloat($("#pFee").value)||0;
    const sum=splits.reduce((a,x)=>a+(parseFloat(x.amt)||0),0);
    const left=Math.round((fee-sum)*100)/100;
    el.innerHTML = fee<=0 ? "Enter the dump fee above first \u2014 then split it here."
      : (left===0 ? "\u2713 Splits $"+sum.toFixed(2)+" of $"+fee.toFixed(2)+" \u2014 fully assigned."
      : "Splits $"+sum.toFixed(2)+" of $"+fee.toFixed(2)+" \u2014 <b>$"+left.toFixed(2)+" unassigned</b>.");
    el.style.color=(fee>0&&left===0)?"var(--green)":"#E8A317";
  };
  const paintSplits=()=>{
    $("#pSplitBox").innerHTML = splits.map((x,i)=>'<div class="two" style="margin-top:8px"><div><input type="text" data-sj="'+i+'" placeholder="Job / customer" value="'+String(x.job||"").replace(/"/g,"&quot;")+'"></div><div><input type="text" inputmode="decimal" data-sa="'+i+'" placeholder="$ share" value="'+(x.amt||"")+'"></div></div>').join("")
     +'<button type="button" id="pSplitAdd" style="margin-top:9px;background:#fff;border:1.5px dashed var(--line);border-radius:10px;padding:10px 13px;font-weight:700;color:var(--muted);width:100%">+ Add another job</button>'
     +'<div class="f-note" id="pSplitTally" style="margin-top:8px"></div>';
    splitTally();
  };
  $("#pSplitOn").addEventListener("change",function(){
    $("#pSplitBox").classList.toggle("hide",!this.checked);
    if(this.checked&&!splits.length){
      const cb=get($("#pBin").value);
      splits=[{job:(cb&&cb.customer)||"",amt:""},{job:"",amt:""}];
    }
    if(this.checked)paintSplits();
  });
  $("#pSplitBox").addEventListener("input",function(e){
    const t=e.target;
    if(t.dataset.sj!=null)splits[+t.dataset.sj].job=t.value;
    if(t.dataset.sa!=null)splits[+t.dataset.sa].amt=t.value;
    splitTally();
  });
  $("#pSplitBox").addEventListener("click",function(e){
    if(e.target&&e.target.id==="pSplitAdd"){splits.push({job:"",amt:""});paintSplits();}
  });
  $("#pFee").addEventListener("input",splitTally);
  PEND=[]; wirePend("overload"); wirePend("yard"); wireRepairField();
  let selPickTruck="";
  const okClear=()=>{if($("#pBy").value.trim()&&selPickTruck&&$("#pTime").value)$("#pErr").classList.remove("show");};
  wireTruckPick(()=>selPickTruck,v=>{selPickTruck=v;okClear();});
  ["#pBy","#pTime"].forEach(s=>$(s).addEventListener("input",okClear));
  $("#pGo").addEventListener("click",()=>{
    const b=get($("#pBin").value);
    if(!$("#pBy").value.trim()||!selPickTruck||!$("#pTime").value){$("#pErr").classList.add("show");return;}
    const gt=(parseFloat($("#pGF").value)||0)+(parseFloat($("#pGR").value)||0),tt=(parseFloat($("#pTF").value)||0)+(parseFloat($("#pTR").value)||0);
    b.pickDate=$("#pDate").value;b.hqTime=$("#pTime").value;b.truck=selPickTruck;b.pickupBy=$("#pBy").value.trim();b.extraTime=$("#pExtra").value.trim();
    b.photos=(b.photos||[]).concat(PEND);
    if($("#pDirect").checked){            // driver is the end of the road
      b.grossF=$("#pGF").value;b.grossR=$("#pGR").value;b.tareF=$("#pTF").value;b.tareR=$("#pTR").value;
      b.gross=gt>0?String(gt):"";b.tare=tt>0?String(tt):"";
      b.wasteClass=$("#pC").value;b.dumpFee=$("#pFee").value.trim();
      b.feeSplit=($("#pSplitOn")&&$("#pSplitOn").checked)?splits.filter(x=>String(x.job||"").trim()&&parseFloat(x.amt)>0).map(x=>({job:String(x.job).trim(),amt:Math.round(parseFloat(x.amt)*100)/100})):null;
      b.status="in_yard";b.scheduledPickup="";b.dumpedDirect=true;
    } else {
      b.status="returning";b.scheduledPickup="";
    }
    applyRepairField(b);
    try{bdMarkStopDoneByCode($("#pBin").value,"pickup");}catch(_){}closeSheet();render();
  });
}

/* ---- Swap (drop fresh + pick full, same job) ---- */
function openSwap(presetOld){
  const avail=bins.filter(b=>b.status==="in_yard"&&!b.leased).sort(numSort);
  const out=bins.filter(b=>b.status==="dropped").sort(numSort);
  if(!avail.length||!out.length){openSheet("Swap",`<div class="empty">Need at least one bin in the yard and one out on rental to swap.</div>`);return;}
  openSheet("Swap — drop fresh, pick full",`
    <div class="f-lab">Full bin being picked up</div>
    <select id="sOld">${out.map(b=>`<option value="${b.code}" ${b.code===presetOld?"selected":""}>${b.code} — ${b.customer||"—"} (${b.town||"—"})</option>`).join("")}</select>
    <div class="f-lab">Fresh bin being dropped</div>
    <select id="sNew">${avail.map(b=>`<option value="${b.code}">${b.code} (${b.size} yd)</option>`).join("")}</select>
    <div class="f-note">The fresh bin inherits the same customer, address, area &amp; roofing setting as the one it replaces.</div>
    <div class="two"><div><div class="f-lab">HQ return (full bin)</div><input type="date" id="sDate" value="${todayIso()}"></div>
      <div>${timeFieldHtml("sTime","HQ time",false)}</div></div>
    <div class="readout calc" id="sCalc"></div>
    ${repairFieldHtml("The bin you're picking up needs repair")}
    <button class="primary" id="sGo">Confirm swap</button>`);
  const upd=()=>{const b=get($("#sOld").value);
    $("#sCalc").innerHTML=`Full bin <b>${b.code}</b> → returning to yard.<br>Fresh bin → dropped today at <b>${b.customer||"the same address"}</b>.`;};
  ["#sOld","#sDate"].forEach(s=>$(s).addEventListener("change",upd)); upd();
  wireRepairField();
  $("#sGo").addEventListener("click",()=>{
    const oldB=get($("#sOld").value), newB=get($("#sNew").value);

  ["#drG","#drT"].forEach(s=>$(s).addEventListener("input",net)); net();

function openDetail(code){
  const b=get(code);
  let info=`<div class="det"><dl>
    <dt>Size</dt><dd>${b.size} yd${b.customLid?" · custom lid":(b.lidded?" · lidded":"")}</dd>
    <dt>Status</dt><dd>${statusMeta(b).label}</dd>`;
  if(b.stationed){
    info+=`<dt>Site</dt><dd>${b.customer||"—"}</dd>
      <dt>Address</dt><dd>${b.address||"—"}</dd>
      <dt>Area</dt><dd>${b.town||"—"}</dd>
      <dt>Placement</dt><dd>Long-term on site${b.customLid?" · permanent lid":""}${b.dropDate?` · since ${b.dropDate}`:""}</dd>
      ${b.lastDumped?`<dt>Last dump &amp; return</dt><dd>${b.lastDumped}</dd>`:""}`;
  } else if(b.status!=="in_yard"&&b.status!=="maintenance"){
    info+=`<dt>Customer</dt><dd>${b.customer||"—"}</dd>
      <dt>Address</dt><dd>${b.address||"—"}</dd>
      <dt>Area</dt><dd>${b.town||"—"}${b.roofing?' · roofing':''}</dd>
      <dt>Dropped</dt><dd>${b.dropDate||"—"}${b.dropTime?(" "+b.dropTime):""}</dd>`;
    if(b.pickDate)info+=`<dt>Picked up</dt><dd>${b.pickDate} ${b.hqTime||""}${b.pickupBy?(" · "+b.pickupBy):""}</dd>`;
    if(b.extraTime)info+=`<dt>Extra time</dt><dd>${b.extraTime}</dd>`;
  }
  info+=`</dl>`;
  if(b.gross||b.tare||b.truck){const net=(parseFloat(b.gross)||0)-(parseFloat(b.tare)||0);
    info+=`<div class="seg-h">Weigh</div><dl>
      ${b.truck?`<dt>Truck</dt><dd>#${b.truck}${b.truck==="12"?" (Hino)":" (Isuzu)"}</dd>`:""}
      <dt>Gross</dt><dd>${b.gross||"—"} kg</dd>
      ${(b.grossF||b.grossR)?`<dt>Gross axles</dt><dd>F ${b.grossF||"0"} / R ${b.grossR||"0"}</dd>`:""}
      <dt>Tare</dt><dd>${b.tare||"—"} kg</dd>
      ${(b.tareF||b.tareR)?`<dt>Tare axles</dt><dd>F ${b.tareF||"0"} / R ${b.tareR||"0"}</dd>`:""}
      <dt>Net</dt><dd>${net?net+" kg":"—"}</dd><dt>Class</dt><dd>${b.wasteClass||"—"}</dd></dl>`;}
  if(b.roofing&&(b.dumpBy||b.dumpFee||b.sortJunk||b.sortMetal||b.noSort)){
    info+=`<div class="seg-h">Roofing</div><dl>`;
    info+=b.noSort?`<dt>Sort</dt><dd>No sorting needed</dd>`:`<dt>Junk off top</dt><dd>${b.sortJunk||"—"}</dd><dt>Metal</dt><dd>${b.sortMetal||"—"}</dd><dt>Sort time</dt><dd>${b.sortTime||"—"}</dd>`;
    info+=`<dt>Dumped by</dt><dd>${b.dumpBy||"—"}</dd><dt>Dump fee</dt><dd>${b.dumpFee?money(parseFloat(b.dumpFee)):"—"}</dd></dl>`;
  }
  info+=`</div>`;
  if(b.notes)info+=`<div class="f-lab">Notes</div><div class="readnote">${escHtml(b.notes)}</div>`;
  if(b.contactLog&&b.contactLog.length)info+=`<div class="seg-h">Contact log</div>`+b.contactLog.slice().reverse().map(c=>`<div class="clog"><b>${c.date}</b> — ${escHtml(c.note)}</div>`).join("");
  info+=photoGallery(b);
  info+=photoBlock("note","Add a photo to this bin");

  // role-grouped links — anyone can tap any link (a driver dumping direct opens the yard one)
  let driver="", yard="", office="";
  if(b.status==="in_yard"&&!b.leased)driver+=`<button class="primary" id="xDrop">Drop this bin</button>`;
  if(b.stationed){
    driver+=`<button class="primary green" id="xDumpRet">🔄 Dump &amp; return → back on site</button>`;
  }
  if(b.status==="dropped"){driver+=`<button class="primary ret" id="xPick">Pick up / haul back</button>`;
    driver+=`<button class="ghost" id="xDumpRet">🔄 Dump &amp; return (same bin back here)</button>`;
    driver+=`<button class="ghost" id="xDirect">🚛 Pick up + dump it direct (close out)</button>`;
    driver+=`<button class="ghost" id="xSched">${b.scheduledPickup?("Pickup scheduled "+b.scheduledPickup+" — change"):"Schedule pickup (on call)"}</button>`;}
  if(b.status==="returning"){if(b.roofing)yard+=`<button class="primary green" id="xRoof">Roofing close-out (sort + landfill)</button>`;else yard+=`<button class="primary green" id="xWeigh">Record weigh → back in yard</button>`;}
  if(b.status==="returning"||b.gross)yard+=`<button class="ghost" id="xTicket">📄 Scale ticket</button>`;
  // --- repair note: rides on the bin, independent of whether it's in service ---
  if(b.repairNote){
    office+=`<div class="maint-cur${b.repairOpen?"":" done"}">
        <div class="mc-h">🔧 ${b.repairOpen?"Flagged for the manager":"Repair note (known)"}</div>
        <div class="mc-note">${escHtml(b.repairNote)}</div>
        <div class="mc-meta">${b.repairAt?("Flagged "+b.repairAt):""}${b.repairOpen?" · waiting on the manager":" · notification cleared · note kept"}</div>
      </div>`;
    if(b.repairOpen)office+=`<button class="primary green" id="xFix">Mark fixed → clear the notification</button>`;
    else office+=`<button class="ghost" id="xReflag">Re-flag for the manager</button>`;
    office+=`<button class="ghost" id="xClearNote">Clear repair note</button>`;
  } else if(!b.leased && (b.status==="in_yard"||b.status==="maintenance"||b.stationed)){
    office+=`<div class="maint-box">
        <div class="f-lab" style="margin-bottom:6px">Flag a problem (notify the manager)</div>
        <textarea id="xRepairNote" placeholder="What needs fixing? e.g. back door latch bent, side panel cracked, needs welding…"></textarea>
        <div class="ferr" id="xFlagErr">Tell the manager what needs fixing first — this box can't be blank.</div>
        <button class="mb-send" id="xFlag">Flag for repair → notify manager ▸</button>
        <div class="mb-hint">Pings the manager's hub and tags this bin with the note. The bin keeps working — you decide separately whether to pull it from service.</div>
      </div>`;
  }
  // --- service + leasing controls (the manager decides whether to pull a bin) ---
  if(b.status==="in_yard"){
    office+=`<button class="ghost" id="xLease">${b.leased?"Unmark leased (return to Victoria pool)":"Mark leased to Nanaimo"}</button>`;
    if(!b.leased)office+=`<button class="ghost danger" id="xPull">Take out of service</button>`;
  }
  if(b.status==="maintenance"){
    office+=`<button class="primary green" id="xReturn">Return to service → back in yard</button>`;
  }
  if(b.stationed){
    office+=`<button class="ghost danger" id="xUnstation">End placement → bring back to the yard</button>`;
  }
  let actions="";
  if(driver)actions+=`<div class="role-h">Bin driver</div>`+driver;
  if(yard)actions+=`<div class="role-h">Yard crew</div>`+yard;
  if(office)actions+=`<div class="role-h">Yard / office</div>`+office;

  openSheet(`Bin ${b.code}${b.leased?' <span class="pill">leased</span>':''}`, info+actions);
  wirePhotos(b,"note");

  const wire=(id,fn)=>{const el=$(id);if(el)el.addEventListener("click",fn);};
  wire("#xDrop",()=>{openDrop(b.code);});
  wire("#xPick",()=>{openPickup(b.code);});
  wire("#xDirect",()=>{openPickup(b.code,true);});
  wire("#xSched",()=>{const d=prompt("Tentative pickup date (YYYY-MM-DD) — leave blank to clear:",b.scheduledPickup||todayIso());if(d!==null){b.scheduledPickup=d.trim();}render();openDetail(code);});
  wire("#xWeigh",()=>{openWeigh(b.code);});
  wire("#xRoof",()=>{openRoof(b.code);});
  wire("#xTicket",()=>{openTicket(b.code);});
  wire("#xLease",()=>{b.leased=!b.leased;closeSheet();render();});
  wire("#xDumpRet",()=>{openDumpReturn(b.code);});
  wire("#xUnstation",()=>{if(confirm("End the long-term placement and bring "+b.code+" back to the yard pool?")){b.stationed=false;b.status="in_yard";b.customer="";b.address="";b.town="";b.dropDate="";b.scheduledPickup="";closeSheet();render();}});
  wire("#xFlag",()=>{const el=$("#xRepairNote");const note=el?el.value.trim():"";if(!note){const e=$("#xFlagErr");if(e)e.classList.add("show");if(el)el.focus();return;}b.repairNote=note;b.repairOpen=true;b.repairAt=todayIso();closeSheet();render();});
  const rnEl=$("#xRepairNote");if(rnEl)rnEl.addEventListener("input",()=>{const e=$("#xFlagErr");if(e&&rnEl.value.trim())e.classList.remove("show");});
  wire("#xFix",()=>{b.repairOpen=false;closeSheet();render();});
  wire("#xReflag",()=>{b.repairOpen=true;b.repairAt=todayIso();closeSheet();render();});
  wire("#xClearNote",()=>{b.repairNote="";b.repairOpen=false;b.repairAt="";closeSheet();render();});
  wire("#xPull",()=>{b.status="maintenance";closeSheet();render();});
  wire("#xReturn",()=>{b.status="in_yard";closeSheet();render();});
}

  const b=get(code);

    <div class="f-lab">Gross weight (kg) — front + rear axle</div>
    <div class="two"><div><input type="text" inputmode="numeric" id="wGF" placeholder="Front axle" value="${b.grossF||""}"></div>
      <div><input type="text" inputmode="numeric" id="wGR" placeholder="Rear axle" value="${b.grossR||""}"></div></div>
    <div class="f-lab" style="margin-top:12px">Tare weight (kg) — front + rear axle</div>
    <div class="two"><div><input type="text" inputmode="numeric" id="wTF" placeholder="Front axle" value="${b.tareF||""}"></div>
      <div><input type="text" inputmode="numeric" id="wTR" placeholder="Rear axle" value="${b.tareR||""}"></div></div>
    <div class="readout calc" id="wNet">Weigh each axle — front + rear totals add up here.</div>
    ${truckPickHtml(b.truck||"")}
    <div class="f-note">Empty (tare) is logged as <b>this truck + ${b.code}</b> for the truck&nbsp;+&nbsp;bin weight log, so net junk can be worked out once we've got the empties built up.</div>
    <div class="f-lab" style="margin-top:14px">Waste class</div>

    <div class="f-note">Gross, tare &amp; waste class are recorded here — disposal totals get figured in QuickBooks when you transfer the data over.</div>
    ${photoBlock("yard","Yard / sort photos (extras found, contamination, etc.)")}
    <div class="ferr" id="wErr">Pick the truck this bin was weighed with — needed for the empty weight.</div>
    <button class="primary green" id="wGo">Save weigh → bin back in yard</button>`);
  let selTruck=b.truck||"";
  wireTruckPick(()=>selTruck,v=>{selTruck=v;$("#wErr").classList.remove("show");});
  const upd=()=>{const gt=(parseFloat($("#wGF").value)||0)+(parseFloat($("#wGR").value)||0),tt=(parseFloat($("#wTF").value)||0)+(parseFloat($("#wTR").value)||0),net=gt-tt;
    $("#wNet").innerHTML=`Gross <b>${gt>0?gt+" kg":"—"}</b> · Tare <b>${tt>0?tt+" kg":"—"}</b> · Net <b>${net>0?net+" kg":"—"}</b>`;};
  ["#wGF","#wGR","#wTF","#wTR"].forEach(s=>$(s).addEventListener("input",upd)); upd();
  PEND=[]; wirePend("yard");
  $("#wGo").addEventListener("click",()=>{
    const gt=(parseFloat($("#wGF").value)||0)+(parseFloat($("#wGR").value)||0),tt=(parseFloat($("#wTF").value)||0)+(parseFloat($("#wTR").value)||0);
    const hasWeight=($("#wGF").value.trim()||$("#wGR").value.trim()||$("#wTF").value.trim()||$("#wTR").value.trim());
    if(hasWeight&&!selTruck){$("#wErr").classList.add("show");return;}
    b.grossF=$("#wGF").value;b.grossR=$("#wGR").value;b.tareF=$("#wTF").value;b.tareR=$("#wTR").value;
    b.gross=gt>0?String(gt):"";b.tare=tt>0?String(tt):"";
    b.wasteClass=$("#wC").value;b.truck=selTruck;
    b.photos=(b.photos||[]).concat(PEND);
    b.status="in_yard";b.scheduledPickup="";
    closeSheet();render();
  });
}
