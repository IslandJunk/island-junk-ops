        <div class="trow"><div class="tk">Time Out</div><div class="tv"><input id="tkTimeOut" value="${e(v.timeOut)}" placeholder="10:31 am"></div></div>
      </div>
      <div class="trow"><div class="tk">Extras</div><div class="tv"><textarea id="tkExtras" class="textras" placeholder="Anything found in the bin">${String(v.extras).replace(/</g,"&lt;")}</textarea></div></div>
    </div>
    <div class="f-note" style="margin-top:10px">Gross is padded <b>+45 kg</b> for scale variance — edit if needed. Dates default to the return day; bump to the next day if it was weighed later.</div>
    <button class="primary" id="tkPrint">🖨 Print ticket</button>
    <button class="ghost" id="tkClose">Save &amp; close</button>`);
  $("#tkLogo").src=document.querySelector("header .logo").src;
  const bind=(id,key)=>{const el=$(id);el.addEventListener("input",()=>{b[key]=el.value;});};
  bind("#tkTruck","truck");bind("#tkFrom","address");bind("#tkComm","commodity");
  bind("#tkGross","tkGross");bind("#tkTare","tkTare");
  bind("#tkDateIn","dateIn");bind("#tkTimeIn","timeIn");bind("#tkDateOut","dateOut");bind("#tkTimeOut","timeOut");bind("#tkExtras","extras");
  $("#tkPrint").addEventListener("click",()=>window.print());
  $("#tkClose").addEventListener("click",()=>{closeSheet();render();});
}

$("#aDrop").addEventListener("click",()=>openDrop());
$("#aPick").addEventListener("click",()=>openPickup());
$("#aSwap").addEventListener("click",()=>openSwap());
$("#aDump").addEventListener("click",()=>openDumpReturnPick());
document.addEventListener("click",e=>{const btn=e.target.closest&&e.target.closest(".now-btn");if(!btn)return;const t=$("#"+btn.dataset.now);if(t){t.value=nowHM();t.dispatchEvent(new Event("input",{bubbles:true}));t.dispatchEvent(new Event("change",{bubbles:true}));}});
render();
</script>
<script>
/* ============================================================
   BIN TRUCK — DAY SHELL (startup + clock-in/out)   v16
   Wraps the bin board with the hands-on Truck Hub flow:
   sign in -> truck pre-check -> tools+odometer -> job check ->
   clock in -> work the board (weigh/empty always available) ->
   clock out behind a mandatory checklist.
   Punches share ij_clock_log + ij_punches_v1 (same as hands-on).
   ============================================================ */

function bdGet(k){try{var r=localStorage.getItem(k);return r?JSON.parse(r):null;}catch(e){return null;}}
function bdSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function bdNow(){var d=new Date(),h=d.getHours(),m=d.getMinutes(),ap=h>=12?"pm":"am";h=h%12||12;return h+":"+String(m).padStart(2,"0")+ap;}

var BD_FLEET_SEED={"3":{mgr:"Sam"},"4":{mgr:"Marcus"},"5":{mgr:"Cole"},"6":{mgr:"Zack"},"7":{mgr:"Theo"},"12":{mgr:"Dev"}};
function bdFleet(){var s=bdGet("ij_fleet_v1");var o=(s&&typeof s==="object"&&Object.keys(s).length)?s:BD_FLEET_SEED;return Object.keys(o).map(function(n){return {num:n,mgr:(o[n]&&o[n].mgr)||""};});}
function bdDrivers(){
  var emp=bdGet("ij_employees_v1");
  if(Array.isArray(emp)&&emp.length){
    var list=emp.filter(function(e){return e&&e.active!==false&&Array.isArray(e.access)&&e.access.indexOf("bin")>=0;}).map(function(e){return e.name;});
    if(list.length)return list;
  }
  return ["Cole","Dev","Dylan"];
}

var BD_PRECHECK=[
 {id:"tires", t:"Tires & wheels", d:"Pressures look right, no damage or low tires"},
 {id:"lights",t:"Lights & signals", d:"Headlights, brake, turn signals, beacon"},
 {id:"fluids",t:"Fluids", d:"Oil, coolant, washer \u2014 topped up, no warning lights"},
 {id:"brakes",t:"Brakes & park brake", d:"Firm pedal, park brake holds"},
 {id:"glass", t:"Mirrors, glass & wipers", d:"Clean, no cracks, wipers work"},
 {id:"horn",  t:"Horn & backup alarm", d:""},
 {id:"hooklift", t:"Hooklift (HIAB XR5)", d:"Hook, arm & locking pins \u2014 operates smoothly, no damage"},
 {id:"hydraulics", t:"Hydraulic hoses & rams", d:"No leaks, weeping or chafing on lines or cylinders"},
 {id:"body",  t:"Body & damage", d:"Walk around \u2014 any new dents or damage?"},
 {id:"leaks", t:"Leaks", d:"Anything dripping under the truck?"}
];
function bdOnboard(){var s=bdGet("ij_toolkit_bin_v1");return (Array.isArray(s)&&s.length)?s:["Broom","Dustpan & shovel","First aid kit"];}

/* odometer — shared ij_maint_v2, same shape the hands-on hub writes */
function bdMaintUnit(t){var db=bdGet("ij_maint_v2");return (db&&db.m)?db.m["truck:"+t]:null;}
function bdOdoDue(t){var u=bdMaintUnit(t);if(!u||!u.readingOn)return true;return (Date.now()-new Date(u.readingOn).getTime())>=7*86400000;}
function bdOdoOn(t){var a=bdGet("ij_truck_alerts_v1")||{};var x=a[t];return !(x&&x.odo===false);}  // owner can switch the manual odometer off per-truck (same store as the weigh-in toggle); Motive feeds it automatically in production
window.bdLogOdo=function(){
  var el=document.getElementById("bdOdoIn");var v=parseInt(((el&&el.value)||"").replace(/[^0-9]/g,""),10);if(!v){return;}
  BD.odo=v;
  try{var db=bdGet("ij_maint_v2")||{order:[],m:{}};var key="truck:"+BD.truck;if(!db.m[key])db.m[key]={};if(db.order.indexOf(key)<0)db.order.push(key);db.m[key].reading=v;db.m[key].readingOn=new Date().toISOString().slice(0,10);bdSet("ij_maint_v2",db);}catch(e){}
  bdSave();bdRender();
};

/* ---- day state (persists across reopens; resets each new day) ---- */
var BD={};
function bdFresh(){return {date:todayIso(),driver:"",truck:"",screen:"signin",pre:{},preNote:{},tools:{},odo:null,reviewed:false,issue:"",clockIn:null,eod:{fuel:false,paperwork:false,tablet:false,radio:false},clockOut:null};}
function bdLoad(){var s=bdGet("ij_binday_v1");BD=(s&&typeof s==="object")?s:bdFresh();if(BD.date!==todayIso())BD=bdFresh();if(!BD.eod)BD.eod={fuel:false,paperwork:false,tablet:false,radio:false};if(!BD.pre)BD.pre={};if(!BD.preNote)BD.preNote={};if(!BD.tools)BD.tools={};if(BD.issue==null)BD.issue="";bdSave();}
function bdSave(){bdSet("ij_binday_v1",BD);}

/* ---- punches (same shared stores as hands-on) ---- */
function bdPunchIn(){
  var p=bdGet("ij_punches_v1")||{};var n=BD.driver;
  if(!p[n]||!p[n].in){var d=new Date(),early=(d.getHours()<7)||(d.getHours()===7&&d.getMinutes()<30);p[n]={in:bdNow(),early:early,inTruck:BD.truck,out:(p[n]&&p[n].out)||null,outTruck:null};bdSet("ij_punches_v1",p);}
  return (bdGet("ij_punches_v1")||{})[n];
}
function bdPunchOut(time){var p=bdGet("ij_punches_v1")||{};var n=BD.driver;if(!p[n])p[n]={in:bdNow(),early:false,inTruck:BD.truck};p[n].out=time||bdNow();p[n].outTruck=BD.truck;bdSet("ij_punches_v1",p);}
function bdLogClock(){var log=bdGet("ij_clock_log")||[],iso=todayIso(),n=BD.driver,e=null;for(var i=log.length-1;i>=0;i--){var x=log[i];if(x&&x.name===n&&String(x.at).slice(0,10)===iso){e=x;break;}}if(e){e.outTime=BD.clockOut;if(!e.truck)e.truck=BD.truck;}else{log.push({name:n,truck:BD.truck,inTime:(BD.clockIn&&BD.clockIn.t)||"7:30am",early:!!(BD.clockIn&&BD.clockIn.early),outTime:BD.clockOut,at:new Date().toISOString()});}bdSet("ij_clock_log",log);}

/* ---- controller ---- */
function bdBoot(){
  bdLoad();
  var gate=document.getElementById("daygate"),board=document.getElementById("board");
  if(!gate||!board)return;
  var showGate=(!BD.clockIn)||BD.screen==="clockout"||!!BD.clockOut;
  if(showGate){gate.style.display="block";board.style.display="none";bdRender();}
  else{gate.style.display="none";board.style.display="block";bdDriverBar();render();}
}
function officeNoteToday(shift){try{var o=JSON.parse(localStorage.getItem('ij_daynotes_v1')||'{}');var dt=new Date(),t=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');var n=o[t];if(n&&typeof n==='object'&&!Array.isArray(n))return(n[shift]||'').trim();if(o&&o.date===t)return(o[shift]||'').trim();}catch(e){}return'';}
function bdRender(){
  var g=document.getElementById("daygate");if(!g)return;
  var sc=BD.clockOut?"done":(BD.screen||"signin");
  var html;
  if(sc==="signin")html=bdSignin();
  else if(sc==="notes")html=bdNotes();
  else if(sc==="precheck")html=bdPre();
  else if(sc==="tools")html=bdTools();
  else if(sc==="jobcheck")html=bdJob();
  else if(sc==="clockout")html=bdClockoutScreen();
  else if(sc==="done")html=bdDone();
  else html=bdSignin();
  g.innerHTML=html;
}
window.bdGoto=function(s){BD.screen=s;bdSave();bdRender();};

function bdStep(active){
  var steps=["Truck check","Gear & odo","Your day","Start"];
  return '<div class="dg-prog">'+steps.map(function(s,i){var cls=i<active?"done":(i===active?"on":"");return '<div class="pstep '+cls+'"><span class="pdot"></span>'+s+'</div>';}).join("")+'</div>';
}

function bdTopBar(prev){var who=(BD.driver||"")+(BD.truck?(" \u00b7 truck #"+BD.truck):"");return '<div class="dg-top"><button class="dg-topback" onclick="bdGoto(\''+prev+'\')">\u2039 Back</button>'+(who?'<span class="dg-who">'+escHtml(who)+'</span>':'')+'</div>';}

/* ---- 1. sign in ---- */
function bdSessionDriver(){try{var s=bdGet("ij_session_v1");return (s&&s.name)?s.name:"";}catch(_){return "";}}
function bdAutoInTime(){var log=bdGet("ij_clock_log")||[],iso=todayIso(),n=BD.driver;for(var i=log.length-1;i>=0;i--){var x=log[i];if(x&&x.name===n&&String(x.at).slice(0,10)===iso&&x.inTime)return x.inTime;}return "7:30am";}
function bdSignin(){
  if(!BD.driver){var __sd=bdSessionDriver();if(__sd){BD.driver=__sd;bdSave();}}
  var fromSess=!!bdSessionDriver();
  var drv=bdDrivers();
  var picked=BD.driver;
  var truck=BD.truck||"";
  var btns=drv.map(function(n){return '<button class="who-btn '+(picked===n?'sel':'')+'" onclick="bdPickDriver(\''+n+'\')">'+escHtml(n)+'</button>';}).join("");
  var truckRow="";
  if(picked){
    truckRow='<div class="dg-sh">Which truck today</div><div class="tk-grid">'+bdFleet().map(function(f){return '<button class="tk-btn '+(truck===f.num?'sel':'')+'" onclick="bdPickTruck(\''+f.num+'\')"><span class="tk-num">#'+f.num+'</span>'+(f.mgr?'<span class="tk-lead">'+escHtml(f.mgr)+'</span>':'')+'</button>';}).join("")+'</div><div class="tk-note">Pick whatever you\u2019re in today \u2014 a hand-load truck can run as a bin truck. Trucks &amp; leads come from the Management Hub.</div>';
  }
  return '<div class="daygate">'+
    (fromSess
      ? '<h1 class="dg-h1">Morning, <span class="o">'+escHtml(String(picked||"").split(" ")[0])+'</span></h1>'+
        '<p class="dg-lead">You\u2019re signed in. Pick your truck and we\u2019ll run the walk-around.</p>'
      : '<h1 class="dg-h1">Morning \u2014 <span class="o">who\u2019s driving?</span></h1>'+
        '<p class="dg-lead">Opened directly \u2014 your name normally comes from signing in at the Main Hub. Pick it to keep going.</p>'+
        '<div class="who-wrap">'+btns+'</div>')+
    truckRow+
    '<div class="warnline" id="bdWarn"></div>'+
    '<div class="dg-cta"><button class="dg-go" '+((picked&&truck)?'':'disabled')+' onclick="bdStartCheck()">Start the truck check</button></div>'+
  '</div>';
}
window.bdPickDriver=function(n){BD.driver=n;bdSave();bdRender();};
window.bdPickTruck=function(t){BD.truck=t;bdSave();bdRender();};
window.bdStartCheck=function(){if(!BD.driver||!BD.truck){var w=document.getElementById("bdWarn");if(w)w.textContent="Pick your name and your truck.";return;}BD.screen="notes";bdSave();bdRender();};

function bdNotes(){
  var body=officeNoteToday('bin');
  var lbl=new Date().toLocaleDateString('en-CA',{weekday:'long',month:'short',day:'numeric'});
  var card='<div style="background:#fff;border:1px solid #e6e2dc;border-left:5px solid #F05014;border-radius:13px;padding:15px 16px;margin:6px 0 18px;box-shadow:0 1px 3px rgba(0,0,0,.06)"><div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;gap:10px"><span style="font-weight:800;font-size:14px;color:#141414">From the office</span><span style="font-size:11.5px;color:#8a8a8a;flex:none">For '+escHtml(lbl)+'</span></div><div style="font-size:14px;line-height:1.6;color:'+(body?'#2a2a2a':'#8a8a8a')+'">'+(body?escHtml(body).replace(/\n/g,'<br>'):'Nothing from the office today \u2014 you\u2019re clear to start.')+'</div></div>';
  return '<div class="daygate"><h1 class="dg-h1">Morning <span class="o">meeting</span></h1><p class="dg-lead">Today\u2019s notes from the office \u2014 read them before your walk-around.</p>'+card+'<div class="dg-cta"><button class="dg-go" onclick="bdAckNotes()">Understood \u2014 got it</button></div></div>';
}
window.bdAckNotes=function(){BD.screen="precheck";bdSave();bdRender();};
/* ---- 2. walk-around ---- */
function bdPre(){
  var items=BD_PRECHECK.map(function(c){
    var v=BD.pre[c.id];
    return '<div class="chk"><div class="ct">'+escHtml(c.t)+'</div>'+(c.d?'<div class="cd">'+escHtml(c.d)+'</div>':'')+
      '<div class="seg"><button class="ok '+(v==='ok'?'sel':'')+'" onclick="bdPreSet(\''+c.id+'\',\'ok\')">Good</button>'+
      '<button class="flag '+(v==='flag'?'sel':'')+'" onclick="bdPreSet(\''+c.id+'\',\'flag\')">Flag it</button></div>'+
      '<div class="flagnote '+(v==='flag'?'show':'')+'"><textarea placeholder="What\u2019s wrong? (required)" oninput="bdPreNote(\''+c.id+'\',this.value)">'+escHtml(BD.preNote[c.id]||'')+'</textarea></div></div>';
  }).join("");
  return '<div class="daygate">'+bdTopBar('signin')+bdStep(0)+
    '<h1 class="dg-h1">Walk-around <span class="o">check</span></h1>'+
    '<p class="dg-lead">Full walk around #'+escHtml(BD.truck)+'. Mark each one. Flag anything that needs attention \u2014 it goes straight to the shop list.</p>'+
    items+
    bdIssueBox()+
    '<div class="warnline" id="bdWarn"></div>'+
    '<div class="dg-cta"><button class="dg-go" onclick="bdPreContinue()">Continue</button>'+
    '<button class="dg-back" onclick="bdGoto(\'signin\')">Back</button></div>'+
  '</div>';
}
window.bdPreSet=function(id,v){BD.pre[id]=v;bdSave();bdRender();};
window.bdPreNote=function(id,v){BD.preNote[id]=v;bdSave();var w=document.getElementById("bdWarn");if(w)w.textContent="";};
window.bdPreContinue=function(){
  var w=document.getElementById("bdWarn");
  for(var i=0;i<BD_PRECHECK.length;i++){if(!BD.pre[BD_PRECHECK[i].id]){if(w)w.textContent="Mark every item before you continue.";return;}}
  for(var j=0;j<BD_PRECHECK.length;j++){var c=BD_PRECHECK[j];if(BD.pre[c.id]==="flag"&&!((BD.preNote[c.id]||"").trim())){if(w)w.textContent="Add a note for each flagged item.";return;}}
  try{var d=new Date().toISOString().slice(0,10);var fx=bdGet("ij_fixes_v1")||[];BD_PRECHECK.forEach(function(c){if(BD.pre[c.id]==="flag"){var fid=BD.truck+":"+c.id+":"+d;if(!fx.some(function(x){return x.id===fid;})){fx.push({id:fid,truck:BD.truck,item:c.t,note:(BD.preNote[c.id]||"").trim(),who:BD.driver,date:d,open:true,source:"walk-around"});}}});bdSet("ij_fixes_v1",fx);}catch(e){}
  try{var d2=new Date().toISOString().slice(0,10);var note=(BD.issue||"").trim();var fx2=bdGet("ij_fixes_v1")||[];var nid=BD.truck+":drivernote:"+d2;var ix=-1;for(var k=0;k<fx2.length;k++){if(fx2[k].id===nid){ix=k;break;}}if(note){var rec={id:nid,truck:BD.truck,item:"Driver note",note:note,who:BD.driver,date:d2,open:true,source:"walk-around"};if(ix>=0)fx2[ix]=rec;else fx2.push(rec);bdSet("ij_fixes_v1",fx2);}else if(ix>=0){fx2.splice(ix,1);bdSet("ij_fixes_v1",fx2);}}catch(e){}
  BD.screen="tools";bdSave();bdRender();
};

function bdIssueBox(){return '<div class="chk issuebox"><div class="ct">\ud83d\udd27 Anything else wrong with the truck?</div><div class="cd">Squeaky belt, soft brakes, a light out \u2014 anything. Optional, but it goes to the shop and the manager.</div><textarea id="bdIssue" placeholder="Describe it \u2014 optional" oninput="bdIssueSet(this.value)">'+escHtml(BD.issue||"")+'</textarea></div>';}
window.bdIssueSet=function(v){BD.issue=v;bdSave();};

/* ---- 3. gear + odometer ---- */
function bdTools(){
  var gear=bdOnboard();
  var rows=gear.map(function(t,i){
    var v=BD.tools[i];
    return '<div class="tool-row"><div class="trn">'+escHtml(t)+'</div><div class="seg sm">'+
      '<button class="ok '+(v==='on'?'sel':'')+'" onclick="bdToolSet('+i+',\'on\')">On board</button>'+
      '<button class="flag '+(v==='miss'?'sel':'')+'" onclick="bdToolSet('+i+',\'miss\')">Missing</button></div></div>';
  }).join("");
  var u=bdMaintUnit(BD.truck),last=(u&&u.reading)?u.reading.toLocaleString()+" km":"\u2014";
  var odo;
  if(!bdOdoOn(BD.truck)){odo='<div class="odo-card done"><b>\u2713 Odometer \u2014 auto-synced</b><div class="odo-sub">Turned off by the office \u2014 no manual reading needed. Last: '+last+'</div></div>';}
  else if(BD.odo){odo='<div class="odo-card done"><b>\u2713 Odometer logged</b> \u2014 '+BD.odo.toLocaleString()+' km</div>';}
  else if(bdOdoDue(BD.truck)){odo='<div class="odo-card"><b>\ud83d\udcd0 Weekly odometer \u2014 required</b><div class="odo-sub">Every truck logs the reading. Last: '+last+'</div><input id="bdOdoIn" inputmode="numeric" placeholder="Current odometer (km)"><button class="odo-go" onclick="bdLogOdo()">Log odometer</button></div>';}
  else{odo='<div class="odo-card done"><b>\u2713 Odometer not due</b> \u2014 last '+last+'</div>';}
  return '<div class="daygate">'+bdTopBar('precheck')+bdStep(1)+
    '<h1 class="dg-h1">Gear & <span class="o">odometer</span></h1>'+
    '<p class="dg-lead">Onboard gear, and this week\u2019s odometer before you roll.</p>'+
    odo+
    '<div class="dg-sh">Onboard gear</div>'+rows+
    '<div class="warnline" id="bdWarn"></div>'+
    '<div class="dg-cta"><button class="dg-go" onclick="bdToolsContinue()">Continue</button>'+
    '<button class="dg-back" onclick="bdGoto(\'precheck\')">Back</button></div>'+
  '</div>';
}
window.bdToolSet=function(i,v){BD.tools[i]=v;bdSave();bdRender();};
window.bdToolsContinue=function(){
  var gear=bdOnboard();var w=document.getElementById("bdWarn");
  for(var i=0;i<gear.length;i++){if(!BD.tools[i]){if(w)w.textContent="Mark each item on board or missing.";return;}}
  if(bdOdoOn(BD.truck)&&bdOdoDue(BD.truck)&&!BD.odo){if(w)w.textContent="Log this week\u2019s odometer to continue.";return;}
  try{var d=new Date().toISOString().slice(0,10);var tools={};gear.forEach(function(t,i){tools[t]=BD.tools[i]||"on";});var log=bdGet("ij_tooldaily_v1")||[];log=log.filter(function(r){return !(String(r.truck)===String(BD.truck)&&r.date===d);});log.push({truck:BD.truck,date:d,when:bdNow(),who:BD.driver,tools:tools});bdSet("ij_tooldaily_v1",log);}catch(e){}
  BD.screen="jobcheck";bdSave();bdRender();
};

/* ---- 4. job check ---- */
/* ---- review-card expander: peek at notes + what the bin's for, no re-render ---- */
function bdRevCard(key,tag,tagCls,title,sub,purpose,notes,roofing){
  return '<div class="jrev-item" data-k="'+key+'">'+
    '<div class="jrev" onclick="bdRevToggle(&#39;'+key+'&#39;)">'+
    '<span class="jr-tag '+tagCls+'">'+tag+'</span>'+
    '<div class="jr-b"><b>'+escHtml(title)+'</b><span>'+escHtml(sub)+'</span></div>'+
    '<span class="jr-chev">\u25be</span>'+
    '</div>'+
    '<div class="jr-detail">'+
      '<div class="jd-row"><div class="jd-k">Bin\u2019s for</div><div class="jd-v">'+(roofing?'<span class="jd-roof">ROOFING</span>':'')+escHtml(purpose||"\u2014")+'</div></div>'+
      '<div class="jd-row"><div class="jd-k">Notes from the office</div><div class="jd-v">'+(notes?escHtml(notes):'<span style="color:var(--muted)">No notes \u2014 double-check before you load.</span>')+'</div></div>'+
    '</div>'+
  '</div>';
}
window.bdRevToggle=function(k){var el=document.querySelector('.jrev-item[data-k="'+k+'"]');if(el)el.classList.toggle("open");};
function bdJob(){
  var drops=(typeof DROP_JOBS!=="undefined"?DROP_JOBS:[]).filter(function(j){return !j.binCode;});
  var swaps=(typeof SWAP_JOBS!=="undefined"?SWAP_JOBS:[]).map(function(j){return {j:j,b:get(j.outCode)};}).filter(function(x){return x.b&&x.b.status==="dropped";});
  var picks=(typeof bins!=="undefined"?bins:[]).filter(function(b){return b.status==="dropped"&&b.scheduledPickup;});
  var rows="";
  drops.forEach(function(j){rows+=bdRevCard("d_"+j.id,"DROP","drop",j.customer||"",(j.address||"")+" \u00b7 "+j.size+" yd"+(j.roofing?" \u00b7 roofing":""),j.scope||"",((j.note||"")+(j.contact?((j.note?" \u00b7 ":"")+j.contact):"")),j.roofing);});
  swaps.forEach(function(x){var b=x.b;rows+=bdRevCard("s_"+x.j.id,"SWAP","swap",b.customer||b.code,(b.address||"")+" \u00b7 "+b.code+" \u2192 fresh "+b.size+" yd",(b.roofing?"Roofing":"General / mixed waste"),(b.notes||""),b.roofing);});
  picks.forEach(function(b){rows+=bdRevCard("p_"+b.code,"PICK","pick",b.customer||b.code,(b.town||b.address||"")+" \u00b7 "+b.code+(b.roofing?" \u00b7 roofing":""),(b.roofing?"Roofing":"General / mixed waste"),(b.notes||""),b.roofing);});
  var total=drops.length+swaps.length+picks.length;
  var lead=total?(total+' booked '+(total===1?'job':'jobs')+' \u2014 drops, swaps and pickups. Look through them so you know the whole day.'):'No bin jobs booked yet today \u2014 anything on-call will show on the board.';
  if(!total)rows='<div class="jr-empty">No bin jobs booked yet today.</div>';
  return '<div class="daygate">'+bdTopBar('tools')+bdStep(2)+
    '<h1 class="dg-h1">Here\u2019s your <span class="o">day</span></h1>'+
    '<p class="dg-lead">'+lead+'</p>'+
    '<div class="jrev-wrap">'+rows+'</div>'+
    '<div class="rev-bar '+(BD.reviewed?"on":"")+'" onclick="bdToggleRev()"><div class="rcbx">'+(BD.reviewed?"\u2713":"")+'</div><div class="rt">Looked through the day so I know it and grabbed anything missing. '+(BD.reviewed?"Got it.":"Tap to confirm \u2014 required.")+'</div></div>'+
    '<div class="warnline" id="bdWarn"></div>'+
    '<div class="dg-cta"><button class="dg-go" '+(BD.reviewed?'':'disabled')+' onclick="bdClockIn()">'+(BD.reviewed?"Start the day":"Confirm review to start")+'</button>'+
    '<button class="dg-back" onclick="bdGoto(\'tools\')">Back</button></div>'+
  '</div>';
}
window.bdToggleRev=function(){BD.reviewed=!BD.reviewed;bdSave();bdRender();};
window.bdClockIn=function(){
  if(!BD.reviewed)return;
  BD.clockIn={t:bdAutoInTime(),early:false};
  BD.screen="board";bdSave();
  try{ localStorage.setItem("ij_active_day_v1", JSON.stringify({active:true,date:todayIso(),truck:BD.truck,mgr:BD.driver||"",crew:[],phase:"out",binDriver:true})); }catch(e){}
  window.location.href="island-junk-day-board-v28.html";
};

/* ---- driver bar (clocked in) ---- */
function bdDriverBar(){
  var el=document.getElementById("driverbar");if(!el)return;
  var ci=BD.clockIn||{};
  el.innerHTML='<div class="db-l"><span class="db-dot"></span><div><b>'+escHtml(BD.driver||"")+'</b><span class="db-meta">truck #'+escHtml(BD.truck||"")+' \u00b7 in '+escHtml(ci.t||"\u2014")+(ci.early?' \u00b7 early':'')+'</span></div></div>'+
    '<div class="db-btns"><button class="db-weigh" onclick="bdOpenWeigh()">\u2696\ufe0f Weigh / empty</button><button class="db-out" onclick="bdGotoClockout()">Clock out</button></div>';
}
window.bdGotoClockout=function(){BD.screen="clockout";bdSave();bdBoot();};

/* ---- clock-out checklist ---- */
function bdClockoutScreen(){
  var e=BD.eod||{};
  var ready=bdEodReady();
  var ck=function(on,icon,label,sub,key){return '<div class="eodck '+(on?"on":"")+'" onclick="bdEod(\''+key+'\')"><div class="ecbx">'+(on?"\u2713":"")+'</div><div class="ek"><b>'+icon+' '+escHtml(label)+'</b><span>'+escHtml(sub)+'</span></div></div>';};
  var list=
    ck(e.fuel,"\u26fd","Truck fueled & DEF good","Filled up, DEF topped / OK","fuel")+
    ck(e.paperwork,"\ud83e\uddfe","Receipts & paperwork in the box","Every slip and job sheet handed in","paperwork")+
    ck(e.tablet,"\ud83d\udd0c","Tablet on the charger","Plugged in for tomorrow","tablet")+
    ck(e.radio,"\ud83d\udce1","Radio on the charger","Plugged in for tomorrow","radio");
  var ci=BD.clockIn||{};
  return '<div class="daygate">'+
    '<h1 class="dg-h1">Done for <span class="o">the day</span></h1>'+
    '<p class="dg-lead">'+escHtml(BD.driver||"")+' \u00b7 truck #'+escHtml(BD.truck||"")+' \u00b7 in '+escHtml(ci.t||"\u2014")+'. Four things before you clock out \u2014 all required.</p>'+
    '<div class="eodwrap">'+list+'</div>'+
    (ready?'':'<div class="lockmsg">Your clock-out unlocks once all four are done.</div>')+
    '<div class="warnline" id="bdWarn"></div>'+
    '<div class="dg-cta"><button class="dg-go" '+(ready?'':'disabled')+' onclick="bdClockOut()">Clock out now</button>'+
    '<button class="dg-back" onclick="bdBackToBoard()">Back to the board</button></div>'+
  '</div>';
}
window.bdEod=function(k){BD.eod[k]=!BD.eod[k];bdSave();bdRender();};
function bdEodReady(){var e=BD.eod||{};return !!(e.fuel&&e.paperwork&&e.tablet&&e.radio);}
window.bdBackToBoard=function(){BD.screen="board";bdSave();bdBoot();};
window.bdClockOut=function(){
  if(!bdEodReady()){var w=document.getElementById("bdWarn");if(w)w.textContent="Finish all four before you clock out.";return;}
  BD.clockOut=bdNow();
  bdPunchOut(BD.clockOut);
  bdLogClock();
  bdSave();bdBoot();
};

/* ---- done ---- */
function bdDone(){
  return '<div class="daygate"><div class="done-card">'+
    '<div class="done-ic">\u2713</div>'+
    '<h1 class="dg-h1" style="margin:6px 0 4px">Clocked out</h1>'+
    '<p class="dg-lead" style="text-align:center">'+escHtml(BD.driver||"")+' \u00b7 truck #'+escHtml(BD.truck||"")+'<br>in '+escHtml((BD.clockIn&&BD.clockIn.t)||"\u2014")+' \u00b7 out '+escHtml(BD.clockOut||"\u2014")+'</p>'+
    '<p class="done-note">Logged to the office. Nice work.</p>'+
    '<button class="dg-go" onclick="bdNewDriver()">Start a new driver</button>'+
  '</div></div>';
}
window.bdNewDriver=function(){BD=bdFresh();bdSave();bdBoot();};

/* ---- weigh / empty a bin (always available) ---- */
var bdWeighState={mode:"empty",code:"",f:"",r:""};
function bdStatusLabel(s){return ({in_yard:"in yard",dropped:"out",returning:"returning",stationed:"stationed",maintenance:"out of svc",leased:"leased"}[s])||s;}
window.bdOpenWeigh=function(){
  bdWeighState={mode:"empty",code:"",f:"",r:""};
  openSheet("Weigh / empty a bin",bdWeighHtml());
  bdWeighWire();
};
function bdWeighHtml(){
  var w=bdWeighState;
  var opts=(typeof bins!=="undefined"?bins:[]).slice().sort(function(a,b){return a.code<b.code?-1:1;});
  var sel='<select id="bdwBin"><option value="">Pick a bin\u2026</option>'+opts.map(function(b){return '<option value="'+b.code+'" '+(b.code===w.code?"selected":"")+'>'+b.code+' ('+b.size+' yd \u00b7 '+bdStatusLabel(b.status)+')</option>';}).join("")+'</select>';
  var tot=(parseFloat(w.f)||0)+(parseFloat(w.r)||0);
  var lbl=w.mode==="empty"?"Tare":"Gross";
  return '<div class="bw">'+
    '<div class="bw-seg"><button class="'+(w.mode==="empty"?"on":"")+'" id="bdwEmpty">Empty \u00b7 tare</button><button class="'+(w.mode==="full"?"on":"")+'" id="bdwFull">Full \u00b7 gross</button></div>'+
    '<div class="f-lab">Which bin</div>'+sel+
    '<div class="f-lab" style="margin-top:10px">'+lbl+' weight \u00b7 front + rear axle</div>'+
    '<div class="bw-ax"><div><label>Front (kg)</label><input id="bdwF" inputmode="numeric" value="'+escHtml(w.f)+'"></div><div><label>Rear (kg)</label><input id="bdwR" inputmode="numeric" value="'+escHtml(w.r)+'"></div></div>'+
    '<div class="bw-tot">'+lbl+': <b id="bdwTot">'+(tot>0?tot+" kg":"\u2014")+'</b></div>'+
    '<button class="bw-go" id="bdwGo" '+((w.code&&tot>0)?"":"disabled")+'>Save '+(w.mode==="empty"?"tare":"gross")+'</button>'+
    '<div class="f-note">Logs to the yard\u2019s weight sheet. Front + rear add up to the total \u2014 the yard scale is too small for a whole truck.</div>'+
  '</div>';
}
function bdWeighWire(){
  var setMode=function(m){bdWeighState.mode=m;var b=document.getElementById("sheetBody");if(b){b.innerHTML=bdWeighHtml();bdWeighWire();}};
  var e=document.getElementById("bdwEmpty"),f=document.getElementById("bdwFull");
  if(e)e.onclick=function(){setMode("empty");};
  if(f)f.onclick=function(){setMode("full");};
  var bin=document.getElementById("bdwBin");if(bin)bin.onchange=function(){bdWeighState.code=this.value;bdWeighCalc();};
  var ff=document.getElementById("bdwF"),rr=document.getElementById("bdwR");
  if(ff)ff.oninput=function(){bdWeighState.f=this.value;bdWeighCalc();};
  if(rr)rr.oninput=function(){bdWeighState.r=this.value;bdWeighCalc();};
  var go=document.getElementById("bdwGo");if(go)go.onclick=bdWeighSave;
}
function bdWeighCalc(){var w=bdWeighState;var tot=(parseFloat(w.f)||0)+(parseFloat(w.r)||0);var t=document.getElementById("bdwTot");if(t)t.textContent=tot>0?tot+" kg":"\u2014";var g=document.getElementById("bdwGo");if(g)g.disabled=!(w.code&&tot>0);}
function bdWeighSave(){
  var w=bdWeighState;var code=(w.code||"").trim().toUpperCase();var f=parseFloat(w.f)||0,r=parseFloat(w.r)||0,tot=f+r;if(!code||tot<=0)return;
  if(w.mode==="empty"){var tares=bdGet("ij_tares_v1")||{};tares[BD.truck+"|"+code]={truck:BD.truck,code:code,tareF:f,tareR:r,tare:tot,who:BD.driver,at:new Date().toISOString()};bdSet("ij_tares_v1",tares);}
  else{var wi=bdGet("ij_weighins_v1")||{};wi[code]={code:code,grossF:f,grossR:r,gross:tot,weighClock:bdNow(),who:BD.driver,truck:BD.truck,at:new Date().toISOString()};bdSet("ij_weighins_v1",wi);}
  var wl=bdGet("ij_weighlog_v1")||[];wl.push({code:code,kind:w.mode,f:f,r:r,total:tot,truck:BD.truck,who:BD.driver,time:bdNow(),at:new Date().toISOString()});bdSet("ij_weighlog_v1",wl);
  var m=document.getElementById("modal");if(m)m.classList.remove("show");
}

bdBoot();

</script>
</body>
</html>
