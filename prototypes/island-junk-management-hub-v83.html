<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Island Junk — Management Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --orange:#F05014; --orange-d:#D2440F;
    --asphalt:#141414; --ink:#141414; --muted:#6E6E6E;
    --paper:#F4F3F1; --card:#FFFFFF; --line:#E5E3DF;
    --green:#3CA03C; --green-d:#2E7D2E;
    --stop:#C0392B; --grape:#6B4C9A; --steel:#5B6470; --amber:#C97A1E;
    --shadow:0 1px 2px rgba(0,0,0,.05),0 8px 24px rgba(20,20,20,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--paper);color:var(--ink);line-height:1.45;-webkit-font-smoothing:antialiased;padding-bottom:46px}
  .wrap{max-width:640px;margin:0 auto;padding:0 16px}

  header{background:radial-gradient(440px 150px at 50% 4%,rgba(240,80,20,.08),rgba(240,80,20,0) 72%),linear-gradient(180deg,#ffffff 0%,#fbf9f4 100%);border-bottom:3px solid var(--orange);box-shadow:0 12px 34px rgba(0,0,0,.5);padding:13px 0 12px;position:relative;z-index:5}
  .hd{display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center}
  .logo{width:100%;max-width:320px;height:auto;display:block;margin:0 auto;filter:drop-shadow(0 3px 7px rgba(0,0,0,.18))}
  .tool{font-family:"Anton",sans-serif;font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:#f4f1ec;line-height:1;display:inline-flex;align-items:center;gap:9px;background:#161616;border:1px solid rgba(240,80,20,.5);padding:7px 15px 6px;border-radius:999px;box-shadow:0 5px 14px rgba(0,0,0,.3)}
  .tool::before,.tool::after{content:"";width:13px;height:2px;background:var(--orange);display:inline-block;border-radius:2px}

  .datebar{display:flex;align-items:center;justify-content:space-between;margin-top:14px}
  .datebar .d{font-weight:700;font-size:14px}.datebar .d span{color:var(--orange-d)}
  .datebar .who{font-size:11.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em}

  /* snapshot */
  .snap{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:13px}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px 14px;box-shadow:var(--shadow)}
  .tile.rev{background:#141414;border-color:#141414}
  .tile .l{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600}
  .tile.rev .l{color:#FFB37A}
  .tile .n{font-family:"Anton";font-size:28px;line-height:1.05;margin-top:4px}
  .tile.rev .n{color:#fff;font-size:32px}
  .tile .s{font-size:11.5px;color:var(--muted);margin-top:2px}
  .tile.rev .s{color:#bdbdbd}
  .tile.alert .n{color:var(--stop)}
  .tile.tap{cursor:pointer}.tile.tap:active{background:var(--paper)}.tile.rev.tap:active{background:#232323}

  .sec-h{font-family:"Inter";font-weight:800;text-transform:uppercase;letter-spacing:.03em;font-size:14px;margin:22px 0 11px;border-left:3px solid var(--orange);padding-left:9px;display:flex;align-items:center;gap:8px}
  .sec-h .c{margin-left:auto;background:var(--stop);color:#fff;font-weight:700;font-size:12px;min-width:24px;text-align:center;padding:2px 9px;border-radius:20px}

  /* needs attention */
  .att{background:var(--card);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow);overflow:hidden}
  .arow{display:flex;align-items:center;gap:12px;padding:14px 15px;border-bottom:1px solid var(--line);cursor:pointer}
  .arow:last-child{border-bottom:none}
  .arow:active{background:var(--paper)}
  .arow .dot{width:11px;height:11px;border-radius:50%;flex:none}
  .arow .al{flex:1;font-weight:600;font-size:14px}
  .arow .al .sub{display:block;font-weight:500;font-size:12px;color:var(--muted);margin-top:1px}
  .arow .ac{font-family:"Anton";font-size:18px;flex:none}
  .arow .chev{color:var(--line);font-size:20px;flex:none}
  /* needs-attention expandable cards (v37) */
  .acat{border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:9px;background:var(--card)}
  .acat-h{display:flex;align-items:center;gap:11px;padding:13px 14px;cursor:pointer;user-select:none}
  .acat-h .dot{width:11px;height:11px;border-radius:50%;flex:none}
  .acat-t{flex:1;font-weight:700;font-size:14.5px;color:var(--ink)}
  .acat-c{font-family:"Anton";font-size:15px;color:var(--ink);background:var(--paper);min-width:24px;text-align:center;border-radius:20px;padding:2px 9px;flex:none}
  .acat-chev{flex:none;color:var(--muted);font-size:13px;line-height:1;transition:transform .18s ease}
  .acat.open .acat-chev{transform:rotate(180deg)}
  .acat-body{display:none;padding:2px 14px 13px;border-top:1px solid var(--line)}
  .acat.open .acat-body{display:block}
  .acat-note{font-size:12px;color:var(--muted);margin-top:11px;line-height:1.45}
  .aitem{padding:11px 0;border-bottom:1px solid var(--line)}
  .aitem:last-of-type{border-bottom:none}
  .aitem .irow{padding:0;border-bottom:none}
  .aitem .actbtn{margin-top:9px}
  .aitem .adone{margin-top:4px}
  .actbtn{display:block;width:100%;padding:10px;border:1.5px solid var(--green);border-radius:10px;background:#fff;color:var(--green-d);font-weight:700;font-size:13.5px;cursor:pointer}
  .actbtn.fix{background:var(--green);border-color:var(--green);color:#fff}
  .adone{text-align:center;padding:8px;color:var(--green-d);font-weight:700;font-size:13px}
  .att-mini{margin-left:10px;font-size:12px;font-weight:700;color:var(--orange-d);cursor:pointer;text-transform:none;letter-spacing:.01em}
  .nd-det{margin:6px 0 0}
  .nd-det summary{cursor:pointer;font-size:12px;font-weight:700;color:var(--orange-d);padding:2px 0}
  .nd-pre{white-space:pre-wrap;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11.5px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin:6px 0 0;color:#333;line-height:1.4}
  .att{background:transparent;border:0;box-shadow:none;border-radius:0;overflow:visible}
  .d-red{background:var(--stop)} .d-amber{background:var(--amber)} .d-green{background:var(--green)}
  .trtabs{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:2px 0 12px;margin:0 -2px}
  .trtabs::-webkit-scrollbar{display:none}
  .trtab{flex:0 0 auto;padding:8px 13px;border-radius:999px;border:1.5px solid #e3e3e3;background:#fff;color:#555;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap}
  .trtab.on{background:#141414;border-color:#141414;color:#fff}
  .svcbar{height:8px;border-radius:5px;background:#ECECEC;overflow:hidden;margin-top:7px;max-width:340px}
  .svcbar>i{display:block;height:100%;border-radius:5px}
  .att.clear{padding:22px;text-align:center;color:var(--green-d);font-weight:600}

  /* launcher */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .mtile{background:var(--card);border-radius:14px;padding:14px 14px 15px;box-shadow:var(--shadow);cursor:pointer;position:relative;display:flex;flex-direction:column;gap:9px;min-height:94px;justify-content:center}
  .mtile:active{transform:translateY(1px)}
  .mtile .mn{font-family:"Anton",sans-serif;font-size:18px;letter-spacing:.012em;line-height:1.02;color:var(--ink);text-transform:uppercase}
  .mtile .accent{width:28px;height:3px;border-radius:2px;display:block}
  .mtile .ms{font-size:11.5px;color:var(--muted);line-height:1.32}
  .mtile .badge{position:absolute;top:10px;right:10px;background:var(--stop);color:#fff;font-size:10.5px;font-weight:800;padding:1px 7px;border-radius:20px;z-index:2}

  /* modal */
  .modal{position:fixed;inset:0;background:rgba(20,20,22,.55);z-index:50;display:none;align-items:flex-end;justify-content:center}
  .modal.show{display:flex}
  .sheet{background:#fff;width:100%;max-width:640px;border-radius:18px 18px 0 0;max-height:88vh;overflow:auto;padding:18px 18px calc(20px + env(safe-area-inset-bottom))}
  .sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .sheet-head h2{font-family:"Inter";font-weight:600;text-transform:uppercase;letter-spacing:.04em;font-size:17px}
  .x{background:var(--paper);border:none;width:34px;height:34px;border-radius:50%;font-size:18px;color:var(--muted);cursor:pointer}
  .ctx{font-size:12.5px;color:var(--muted);margin-bottom:14px}
  .irow{display:flex;align-items:center;gap:11px;padding:12px 0;border-bottom:1px solid var(--line)}
  .irow:last-child{border-bottom:none}
  .irow .im{flex:1;min-width:0}
  .irow .ic{font-weight:600;font-size:14px}
  .irow .is{font-size:12px;color:var(--muted);margin-top:1px}
  .irow .iv{font-family:"Anton";font-size:17px;flex:none}
  .pill{display:inline-block;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;padding:1px 8px;border-radius:20px;margin-left:6px;color:#fff}
  .open-btn{width:100%;margin-top:16px;font-family:"Inter";font-weight:600;text-transform:uppercase;letter-spacing:.05em;font-size:15px;padding:14px;border-radius:12px;border:none;cursor:pointer;color:#fff;background:var(--orange)}
  .note{font-size:12.5px;color:var(--muted);margin-top:12px;line-height:1.5}
  .stabs{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0 2px}
  .stab{padding:7px 13px;border-radius:999px;border:1.5px solid var(--line);background:#fff;color:#5a5a5a;font-weight:700;font-size:12.5px;cursor:pointer;font-family:inherit;line-height:1}
  .stab.on{background:var(--orange);border-color:var(--orange);color:#fff}
  .addbox{margin-top:20px;padding-top:16px;border-top:1px solid #ECECEC;display:flex;flex-direction:column;gap:9px}
  .addlbl{font-weight:800;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
  .addin{width:100%;border:1px solid #D6D6D6;border-radius:9px;padding:11px 12px;font-size:14px;color:var(--ink);font-family:inherit;background:#fff;box-sizing:border-box;font-weight:600}
  .addr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .addr3 .addin{padding:11px 8px}
  .addbtn-full{width:100%;border:none;background:var(--orange);color:#fff;border-radius:10px;padding:13px;font-weight:800;font-size:15px;cursor:pointer;font-family:inherit;letter-spacing:.02em}

  /* ===== BRAND THEME - dark canvas (matches New Booking v18) ===== */
  :root{ --ghost:#A7A199; --hair-d:#2A2724; }
  body{
    background:
      radial-gradient(120% 50% at 50% -12%, rgba(240,80,20,.13), rgba(240,80,20,0) 55%),
      linear-gradient(180deg,#181614 0%, #141414 34%, #0D0C0B 100%);
    background-attachment:fixed;
  }
  body::before{ content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:repeating-linear-gradient(135deg, rgba(255,255,255,.02) 0 1px, rgba(255,255,255,0) 1px 24px); }
  .wrap{ position:relative; z-index:1; color:#F4F1EC }

  /* canvas-level text */
  .datebar .who{ color:var(--ghost) }
  .sec-h{ color:#F4F1EC }

  /* keep text dark inside the white cards */
  .tile,.att,.arow,.mtile{ color:var(--ink) }

  /* elevate the white cards on the black */
  .tile,.att,.mtile{ border-color:#EDEBE7; box-shadow:0 12px 30px rgba(0,0,0,.40), 0 2px 6px rgba(0,0,0,.28) }

  /* revenue tile reads as special on the dark canvas */
  .tile.rev{ background:linear-gradient(160deg,#201D1A 0%, #141414 70%); border:1px solid #3A2A1F;
    box-shadow:0 14px 32px rgba(0,0,0,.55), 0 0 0 1px rgba(240,80,20,.18), 0 8px 22px rgba(240,80,20,.12) }

  .mtile{ transition:transform .14s, box-shadow .14s }
  .mtile:active{ transform:translateY(1px) }

  /* glowing orange CTA in the drill-down sheets */
  .open-btn{ background:linear-gradient(180deg,#FF6A2E 0%, var(--orange) 52%, var(--orange-d) 100%);
    box-shadow:0 10px 24px rgba(240,80,20,.45), inset 0 1px 0 rgba(255,255,255,.28) }

  /* darker scrim; the drill-down sheet stays white */
  .modal{ background:rgba(6,6,5,.62); -webkit-backdrop-filter:blur(3px); backdrop-filter:blur(3px) }

  @media (prefers-reduced-motion:reduce){ *{ transition:none !important } }
/* fleet/toolkit editors */
.rmbtn{border:1px solid #E7B8AB;background:#FBE9E4;color:#B33A1C;border-radius:9px;padding:7px 12px;font-size:12.5px;font-weight:700;cursor:pointer;flex:0 0 auto}
.addrow{display:flex;gap:8px;margin-top:12px}
.addrow input{flex:1;min-width:0;padding:11px;border:1px solid var(--line,#E3DFD8);border-radius:10px;font-size:14px}
.addrow #flNum{flex:0 0 86px}
.addbtn2{flex:0 0 auto;border:none;background:var(--orange,#F05014);color:#fff;border-radius:10px;padding:0 16px;font-weight:800;font-size:14px;cursor:pointer}
/* maintenance editor */
.msub{font-weight:800;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin:6px 0 8px}
.mrow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid #ECECEC}
.mrow.due{background:#FBF1E6;border:1px solid #E6C79A;border-radius:11px;padding:11px;margin-bottom:8px}
.mim{flex:1;min-width:0}
.mic{font-weight:700;font-size:14px;color:var(--ink)}
.mis{font-size:12.5px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.mint{width:74px;border:1px solid #D6D6D6;border-radius:7px;padding:5px 8px;font-size:13px;font-weight:700;color:var(--ink)}
.mby{border:1px solid #D8B888;background:#fff;color:#8a5a1a;border-radius:7px;padding:4px 9px;font-size:11.5px;font-weight:700;cursor:pointer}
.msel{border:1px solid #D6D6D6;border-radius:8px;padding:8px;font-size:13px;background:#fff}
.snz{display:flex;gap:6px;flex:0 0 auto}
.snz button{border:1px solid #D8B888;background:#fff;color:#8a5a1a;border-radius:8px;padding:7px 10px;font-size:12px;font-weight:700;cursor:pointer}
.snz button:first-child{background:#8a5a1a;color:#fff;border-color:#8a5a1a}
/* maintenance v2 */
.mrow.tap{cursor:pointer}
.mrow.due{border-left:3px solid var(--stop);padding-left:9px}
.mrow.close{border-left:3px solid #E0A100;padding-left:9px}
.mrow .chev{font-size:24px;color:var(--muted);flex:0 0 auto;line-height:1}
.mbadge{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.03em;padding:2px 7px;border-radius:20px;vertical-align:middle;margin-left:5px}
.mbadge.due{background:#FBE9E4;color:#C8401F}
.mbadge.close{background:#FBF1D6;color:#9a6a00}
.mbadge.ok{background:#E8F3E8;color:#2E7D32}
.mis2{font-size:12.5px;color:var(--ink);font-weight:600;margin-top:3px}
.mlast{font-size:11.5px;color:var(--muted);margin-top:4px}
.mrt{display:flex;flex-direction:column;gap:6px;flex:0 0 auto}
.logbtn{border:1px solid #8a5a1a;background:#8a5a1a;color:#fff;border-radius:8px;padding:6px 11px;font-size:11.5px;font-weight:700;cursor:pointer}
.backbtn{border:none;background:none;color:#8a5a1a;font-weight:800;font-size:13px;cursor:pointer;padding:0 0 10px;display:block}
.readbar{display:flex;align-items:center;gap:7px;flex-wrap:wrap;background:#F6F1EA;border:1px solid #E6DCCB;border-radius:11px;padding:10px 12px;font-weight:700;font-size:13.5px;margin-bottom:14px}
.rdate{color:var(--muted);font-weight:500;font-size:12px}
.mint.sm{width:54px}.mint.big{width:96px}
.addrow.wrap{flex-wrap:wrap}
.hrow{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid #EFEFEF}
.hl{display:flex;flex-direction:column;min-width:0}.hl b{font-size:13.5px}.hl span{font-size:11.5px;color:var(--muted);margin-top:2px}
.hr{font-size:12.5px;color:var(--muted);white-space:nowrap}
.open-btn.danger{color:#C8401F}
/* job edit log */
.erow{padding:11px 0;border-bottom:1px solid #ECECEC}
.erow .ic{font-weight:700;font-size:14px;color:var(--ink)}
.erow .is{font-size:13px;color:var(--ink);margin-top:3px}
.erow .emeta{font-size:11.5px;color:var(--muted);margin-top:4px}
/* tool registry */
.iv.low{color:#C8401F}
.tl{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.03em;text-transform:uppercase;padding:1px 7px;border-radius:20px;margin-left:5px}
.tl-out{background:#FBF1D6;color:#9a6a00}
.tl-in{background:#E8F3E8;color:#2E7D32}
/* tool registry editor */
.mrow.col{flex-wrap:wrap;align-items:flex-start}
.unitnums{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.unum{font-size:11.5px;font-weight:700;color:var(--ink);background:#EEF0F0;border-radius:6px;padding:3px 7px}
.unum.out{background:#FBE9E4;color:#C8401F}
.ucol{display:flex;align-items:center;gap:8px;flex:0 0 auto}
.snz button{cursor:pointer}
.rmbtn.sm{padding:6px 10px;font-size:15px;line-height:1}
.bitedit{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:9px;width:100%}
.bitedit .bl{font-size:12px;font-weight:700;color:var(--muted)}
.bchip2{display:inline-flex;align-items:center;gap:4px;font-size:12.5px;font-weight:600;background:#fff;border:1px solid #D8D2C8;border-radius:999px;padding:3px 5px 3px 10px;color:var(--ink)}
.bchip2 button{border:none;background:none;color:var(--muted);cursor:pointer;font-size:15px;line-height:1;padding:0 2px}
.bitin{flex:1;min-width:90px;border:1px solid #D6D6D6;border-radius:8px;padding:6px 9px;font-size:13px}
.addmini{border:1px solid #2E7D8A;background:#2E7D8A;color:#fff;border-radius:8px;width:34px;font-size:18px;font-weight:700;cursor:pointer}
/* low banner + usage + clock */
.lowbanner{display:flex;align-items:center;gap:10px;background:#FBE9E4;border:1px solid #E7B8AB;border-radius:12px;padding:11px 14px;margin-bottom:14px;cursor:pointer}
.lb-i{font-weight:800;font-size:13px;color:#C8401F;white-space:nowrap}
.lb-t{flex:1;font-size:12.5px;color:#8a3a25;font-weight:600;line-height:1.3}
.lowbanner .chev{font-size:22px;color:#C8401F}
.urow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid #ECECEC}
.ucnt{display:flex;gap:16px;flex:0 0 auto;text-align:center}
.uc b{display:block;font-size:19px;font-weight:800;line-height:1}
.uc span{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--muted)}
.uc.used b{color:#C8401F}
.uc.re b{color:#2E7D32}
  /* empty weigh-in toggle */
  .tgl{display:flex;align-items:center;gap:12px;border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;cursor:pointer;background:var(--card)}
  .tgl.on{border-color:var(--green);background:#F1F9F1}
  .tgl .tg-k{flex:1}
  .tgl .tg-k b{font-size:14.5px}
  .tgl .tg-k span{display:block;font-size:11.5px;color:var(--muted);font-weight:600;margin-top:1px}
  .tg-sw{flex:none;width:46px;height:26px;border-radius:20px;background:#ccc;position:relative;transition:background .15s}
  .tgl.on .tg-sw{background:var(--green)}
  .tg-dot{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .15s}
  .tgl.on .tg-dot{left:23px}
  /* live truck hub + skips */
  .truckrow{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);cursor:pointer}
  .truckrow:last-child{border-bottom:0}
  .tr-n{flex:none;width:42px;height:42px;border-radius:11px;background:#141414;color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:15px}
  .tr-m{flex:1;min-width:0}
  .tr-h{font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .tr-s{font-size:11.5px;color:var(--muted);margin-top:1px}
  .tr-load{font-size:10.5px;color:var(--muted);margin-top:4px}
  .tprog{height:5px;background:var(--line);border-radius:4px;margin-top:5px;overflow:hidden}
  .tprog-f{height:100%;background:var(--green);border-radius:4px}
  .tstrip{background:var(--card);border-radius:14px;padding:2px 14px;box-shadow:0 12px 30px rgba(0,0,0,.40),0 2px 6px rgba(0,0,0,.28);color:var(--ink);margin-bottom:6px}
  .sec-h.tdrop{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
  .tchev{margin-left:auto;font-size:12px;color:#9a9a9a;transition:transform .18s}
  .tchev.open{transform:rotate(180deg)}
  .tstat{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;padding:1px 7px;border-radius:20px}
  .tstat.route{background:#E3F2FD;color:#0277BD}
  .tstat.back{background:#FFF3E0;color:#E65100}
  .tstat.done{background:#E8F5E9;color:#2E7D2E}
  .tstat.idle{background:#ECEFF1;color:#607D8B}
  .skcount{display:inline-block;background:#FBE9E7;color:#C8401F;font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px;margin-left:6px}
  .sklist{margin-top:5px}
  .skrow{display:flex;justify-content:space-between;gap:10px;font-size:11.5px;color:var(--muted);padding:3px 0;border-top:1px solid var(--line)}
  .skrow:first-child{border-top:0}
  .skb{font-weight:600;color:var(--ink)}
  /* truck alert switches */
  .acard{border:1px solid var(--line);border-radius:13px;padding:12px 13px;margin-bottom:11px;background:var(--card)}
  .ah{font-weight:800;font-size:14px;margin-bottom:6px}
  .ah-cls{font-weight:600;font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-left:6px}
  .arowt{display:flex;align-items:center;gap:12px;padding:9px 0;border-top:1px solid var(--line)}
  .arowt:first-of-type{border-top:0}
  .ar-k{flex:1}.ar-k b{font-size:13px;font-weight:700}.ar-k span{display:block;font-size:10.5px;color:var(--muted);margin-top:1px}
  .tg-sw.on2{background:var(--green)}
  .tg-sw.on2 .tg-dot{left:23px}
  .flname{border:1px solid var(--line);border-radius:7px;padding:5px 8px;font-size:12px;font-family:inherit;width:150px;background:#fff;color:var(--ink)}

/* access & permissions */
.acctabs{display:flex;gap:8px;margin:2px 0 14px}
.acctab{flex:1;padding:10px;border:1.5px solid #E3DFD8;background:#fff;border-radius:11px;font-weight:800;font-size:13px;color:#777;cursor:pointer}
.acctab.on{background:#141414;border-color:#141414;color:#fff}
.empcard{background:#FAF8F4;border:1px solid #ECE7DE;border-radius:14px;padding:13px;margin-bottom:11px}
.empcard.off{opacity:.6}
.emptop{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:8px}
.empname{flex:1;font-weight:800;font-size:15.5px;border:none;background:transparent;border-bottom:1.5px solid #e3ddd2;padding:4px 2px;color:#141414}
.emprole{width:100%;font-size:12.5px;color:#555;border:1px solid #e3ddd2;border-radius:9px;padding:8px 9px;margin-bottom:9px;background:#fff}
.actoggle{flex:none;border:1.5px solid #d9cfc0;background:#fff;color:#9a948a;border-radius:20px;padding:6px 13px;font-weight:800;font-size:11.5px;cursor:pointer}
.actoggle.on{background:#3CA03C;border-color:#3CA03C;color:#fff}
.trktoggle{flex:none;border:1.5px solid #d9cfc0;background:#fff;color:#9a948a;border-radius:20px;padding:6px 13px;font-weight:800;font-size:11.5px;cursor:pointer}
.trktoggle.on{background:#1F8A82;border-color:#1F8A82;color:#fff}
.trkadd{flex:0 0 auto;border:1.5px solid #d9cfc0;background:#fff;color:#9a948a;border-radius:10px;padding:9px 13px;font-weight:800;font-size:12.5px;cursor:pointer}
.trkadd.on{background:#1F8A82;border-color:#1F8A82;color:#fff}
.pinrow{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.pinlbl{font-size:11px;font-weight:800;letter-spacing:.5px;color:#9a948a;width:30px}
.pinin{width:92px;font-family:"Anton",sans-serif;font-size:20px;letter-spacing:4px;border:1.5px solid #e3ddd2;border-radius:9px;padding:6px 10px;background:#fff;color:#141414}
.eye{border:none;background:#EEE9E0;color:#6f6a60;border-radius:8px;padding:7px 11px;font-weight:700;font-size:12px;cursor:pointer}
.acpills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:11px}
.acpill.lock{opacity:.45;cursor:default;pointer-events:none}
.pinlock{font-size:12px;color:#8b8b8b;font-style:italic}
.ownerbadge{font-size:11px;font-weight:800;color:var(--orange,#F05014);border:1px solid var(--orange,#F05014);border-radius:8px;padding:3px 9px;text-transform:uppercase;letter-spacing:.04em}
.empcard.ownerlock{opacity:.94}
.acpill{border:1.5px solid #d9cfc0;background:#fff;color:#8a847a;border-radius:18px;padding:6px 12px;font-weight:700;font-size:12px;cursor:pointer}
.acpill.on{background:#F05014;border-color:#F05014;color:#fff}
.emprm{background:#fff;border:1.5px solid #e7c3bb;color:#b4351f;border-radius:9px;padding:8px 13px;font-weight:800;font-size:12px;cursor:pointer}
.empadd{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-top:8px}
.empadd input{flex:1;min-width:90px;border:1.5px solid #e3ddd2;border-radius:9px;padding:9px 10px;font-size:14px;background:#fff}
.empadd input:last-of-type{max-width:84px}
.logsec{margin-top:16px}
.logsec-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.logbtns{display:flex;gap:6px}
.lbtn{border:1.5px solid #d9cfc0;background:#fff;color:#555;border-radius:8px;padding:6px 11px;font-weight:800;font-size:11.5px;cursor:pointer}
.lbtn.dgr{border-color:#e7c3bb;color:#b4351f}


/* data & exports */
.paycard{background:#FAF8F4;border:1px solid #ECE7DE;border-radius:14px;padding:14px;margin-top:4px}
.payseg{display:flex;gap:8px;margin-bottom:11px}
.pseg{flex:1;padding:10px;border:1.5px solid #E3DFD8;background:#fff;border-radius:10px;font-weight:800;font-size:13px;color:#777;cursor:pointer}
.pseg.on{background:#141414;border-color:#141414;color:#fff}
.payper{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.pnav{width:42px;height:42px;border:1.5px solid #d9cfc0;background:#fff;border-radius:10px;font-size:18px;font-weight:800;color:#444;cursor:pointer}
.pnav:disabled{opacity:.35}
.paylbl{flex:1;text-align:center;display:flex;flex-direction:column;gap:1px}
.paylbl span{font-size:11px;color:#9a948a;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.paylbl b{font-size:15.5px;color:#141414}
.paybtn{width:100%;background:#3CA03C;color:#fff;border:none;border-radius:11px;padding:14px;font-weight:800;font-size:15px;cursor:pointer}
.paybtn:active{transform:scale(.99)}
.dsrow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 0;border-bottom:1px solid #f1ede5}
.dsn{font-weight:700;font-size:13.5px;color:#141414;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.dsc{font-size:11px;font-weight:700;color:#9a948a;background:#F1ECE3;border-radius:6px;padding:2px 7px}

/* ---- Desktop / tablet responsive (phone layout above is the base) ---- */
@media (min-width:768px){
  .wrap{max-width:960px}
  .snap{grid-template-columns:repeat(4,1fr)}
  #launcher{grid-template-columns:repeat(4,1fr)}
}
@media (min-width:1200px){
  .wrap{max-width:1160px}
  #launcher{grid-template-columns:repeat(5,1fr)}
}

 {t:"4",cls:"Hands-on",driver:"Marcus",crew:["Nate"],status:"route",done:3,total:5,cur:"Oak Bay — garage cleanout",load:55,metal:10,updated:"1:42 PM",clockIn:"7:30",depots:["Metal → Radius"],rev:1145,

   stops:[{n:"Downtown — retail cleanout",s:"done"},{n:"Quadra — appliance pickup",s:"done"},{n:"Saanich — office furniture",s:"now"},{n:"Cordova Bay — hot tub",s:"todo"}]},
 {t:"6",cls:"Hands-on",driver:"Zack",crew:["Spencer"],status:"returning",done:4,total:4,cur:"Heading back to HQ",load:78,metal:22,updated:"1:33 PM",clockIn:"7:15",depots:["E-waste → Return-It"],rev:1002,
   stops:[{n:"Vic West — basement",s:"done"},{n:"Esquimalt — garage",s:"done"},{n:"View Royal — deck tear-out",s:"done"},{n:"Langford — construction debris",s:"done"}]},
 {t:"5",cls:"Bin truck",driver:"Cole",crew:[],status:"route",done:5,total:8,cur:"Shoreline Roofing — pickup",load:0,metal:0,updated:"1:48 PM",clockIn:"7:30",depots:[],rev:640,

/* attention items */
function mhOpenFixes(){var all=lsGetMH("ij_fixes_v1")||[];var res=lsGetMH("ij_fixes_resolved_v1")||{};return all.filter(function(f){return f&&f.open!==false&&!(f.id&&res[f.id]);});}
var MH_MOTIVE=[
  {id:"fc1",truck:"6",code:"P0217",sev:"critical",desc:"Engine coolant over-temperature \u2014 risk of engine damage if it keeps running.",when:"1h ago"},
  {id:"fc2",truck:"8",code:"P0420",sev:"warning",desc:"Catalytic converter efficiency below threshold (Bank 1) \u2014 emissions-related, book a check.",when:"yesterday"}
];
/* ===== Needs another day — multi-day jobs banked but not finished (ij_jobs_v1) ===== */
function ndJobsAll(){var a=lsGetMH("ij_jobs_v1");return Array.isArray(a)?a:[];}
function ndJobs(){return ndJobsAll().filter(function(j){return j&&j.status==="open"&&j.visits&&j.visits.length&&((j.ackUntilVisits==null)||(j.ackUntilVisits!==j.visits.length));});}
function ndDaysText(j){return (j.visits||[]).map(function(v,i){return "Day "+(i+1)+(v.date?" \u00b7 "+v.date:"")+"\n"+(v.summary||"(no details)");}).join("\n\n");}
window.mhNeedsDaySched=function(id){var a=ndJobsAll();for(var i=0;i<a.length;i++){if(a[i].id===id){a[i].ackUntilVisits=(a[i].visits||[]).length;break;}}try{localStorage.setItem("ij_jobs_v1",JSON.stringify(a));}catch(e){}if(document.getElementById("attList"))paintAlerts();toastMH("Marked scheduled \u2014 comes back if another day gets banked");};

/* ===== Yard manager's daily note (ij_yard_mgr_notes_v1) surfaced as a board alert ===== */
function mhYardNoteKey(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function mhYardNoteRaw(){var all=lsGetMH("ij_yard_mgr_notes_v1")||{};return String(all[mhYardNoteKey()]||"").trim();}
function mhYardNoteHash(t){var h=0;for(var i=0;i<t.length;i++){h=((h<<5)-h+t.charCodeAt(i))|0;}return String(h);}
function mhYardNote(){var t=mhYardNoteRaw();if(!t)return"";var ack=lsGetMH("ij_yard_mgr_note_ack_v1")||{};return ack[mhYardNoteKey()]===mhYardNoteHash(t)?"":t;}
function mhYardNotePreview(t){t=String(t).replace(/\s+/g," ").trim();return esc(t.length>64?t.slice(0,64)+"\u2026":t);}
window.mhYardNoteAck=function(){var t=mhYardNoteRaw();if(!t)return;var ack=lsGetMH("ij_yard_mgr_note_ack_v1")||{};ack[mhYardNoteKey()]=mhYardNoteHash(t);try{localStorage.setItem("ij_yard_mgr_note_ack_v1",JSON.stringify(ack));}catch(e){}if(document.getElementById("attList"))paintAlerts();toastMH("Got it \u2014 clears for today; comes back if the note changes");};

/* ===== Manager's own reminders (ij_reminders_v1) surfaced as a board alert ===== */
/* Demo seed: only when the list has never been set, so the preview shows the card.
   On a real device the manager's own reminders are already there, so this never fires. */
(function(){try{if(localStorage.getItem("ij_reminders_v1")===null){var _n=new Date();var _d=function(o){var x=new Date(_n);x.setDate(x.getDate()+o);return x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0")+"-"+String(x.getDate()).padStart(2,"0");};localStorage.setItem("ij_reminders_v1",JSON.stringify([
  {id:"rdemo1",text:"Call Makola back about the extra bin for Tillicum",by:"Voice",ts:Date.now()-3600000,due:""},
  {id:"rdemo2",text:"Order more hazmat bags before the Cool-Aid cleanout",by:"Voice",ts:Date.now()-7200000,due:_d(0)},
  {id:"rdemo3",text:"Chase the Oak Bay PO number",by:"Voice",ts:Date.now()-90000000,due:_d(-1)}
]));}}catch(e){}})();
function mhRemAll(){var a=lsGetMH("ij_reminders_v1");return Array.isArray(a)?a:[];}
function mhRemDueState(s){if(!s)return"";var t=mhYardNoteKey();return s<t?"over":(s===t?"today":"future");}
function mhRemActive(){return mhRemAll().filter(function(x){if(!x||x.done)return false;var st=mhRemDueState(x.due||"");return st===""||st==="over"||st==="today";});}
function mhRemDueLabel(s){try{var p=s.split("-");return new Date(+p[0],+p[1]-1,+p[2]).toLocaleDateString("en-CA",{weekday:"short",month:"short",day:"numeric"});}catch(e){return s;}}
window.mhReminderDone=function(id){var a=mhRemAll().filter(function(x){return x&&x.id!==id;});try{localStorage.setItem("ij_reminders_v1",JSON.stringify(a));}catch(e){}if(document.getElementById("attList"))paintAlerts();toastMH("Done \u2014 cleared here and in the Reminders app");};

function binsOutDays(){try{var c=JSON.parse(localStorage.getItem("ij_binsout_cfg_v1"));return (c&&+c.days>0)?+c.days:14;}catch(e){return 14;}}
function attItems(){
  const a=[];
  var _rem=mhRemActive();
  if(_rem.length){var _ro=_rem.some(function(r){return mhRemDueState(r.due||"")==="over";});a.push({key:"reminders",dot:_ro?"d-red":"d-amber",label:"Reminders",sub:_rem.length+" on your list"+(_ro?" \u00b7 some overdue":"")+" \u00b7 from the Reminders app",count:_rem.length});}
  var _yn=mhYardNote();
  if(_yn)a.push({key:"yardnote",dot:"d-amber",label:"Note from the yard manager",sub:mhYardNotePreview(_yn),count:1});
  var _nd=ndJobs();
  if(_nd.length)a.push({key:"needsday",dot:"d-amber",label:"Needs another day",sub:_nd.length+" job"+(_nd.length>1?"s":"")+" still going \u2014 book the next day",count:_nd.length});
  if(MH_MOTIVE.length){ var _critM=MH_MOTIVE.some(function(c){return c.sev==="critical";}); a.push({key:"motive",dot:_critM?"d-red":"d-amber",label:"Engine codes \u2014 Motive",sub:MH_MOTIVE.length+" open \u00b7 auto-detected on the trucks",count:MH_MOTIVE.length}); }
  var _po=poList().filter(function(r){return r&&r.status==='requested';});
  if(_po.length)a.push({key:"poneeded", dot:"d-red", label:"PO# to chase", sub:_po.length+" · text the PM, get the number", count:_po.length});
  var _rev=revOn()?revDue():[];
  if(_rev.length)a.push({key:"reviews", dot:"d-amber", label:"Reviews to send", sub:_rev.length+" · happy customers, no review asked yet", count:_rev.length});
  a.push({key:"unpaid", dot:"d-red", label:"Unpaid e-transfers", sub:ETRANSFERS.length+" to chase \u00b7 "+money(ETRANSFERS.reduce((s,u)=>s+u.amt,0)), count:ETRANSFERS.length});
  a.push({key:"scale", dot:"d-red", label:"Scale check", sub:SCALE_FLAG.combo+" reading off", count:1});
  a.push({key:"binsout", dot:"d-amber", label:"Bins out too long", sub:BINS_OUT.overdue.length+" past 14 days", count:BINS_OUT.overdue.length});
  var _repDone=lsGetMH("ij_repairs_done_v1")||{};
  var _repOpen=REPAIRS.filter(function(r,i){return !_repDone[i];});
  if(_repOpen.length)a.push({key:"repairs", dot:"d-amber", label:"Repairs / tool requests", sub:"from the yard", count:_repOpen.length});
  var _tri=mhOpenFixes();if(_tri.length)a.push({key:"trissues",dot:"d-amber",label:"Truck issues flagged",sub:_tri.length+" open \u00b7 from the crews",count:_tri.length});
    var _ttR=mhRoster();
  var _ttU=_ttR.filter(function(p){return !attGet(p.name).status;}).length;
  var _ttP=attPendCount();
  a.push({key:"clockin",dot:_ttP?"d-red":"d-amber",label:"Today\u2019s clock-in / out",sub:_ttR.length+" crew \u00b7 mark in / late / off",count:_ttP+_ttU});
  return a;
}

/* ===== Needs-attention expandable cards (v37) ===== */
var ATT_MIN={};
function mhAttBody(key){
  function im(ic,is,iv){return '<div class="im"><div class="ic">'+ic+'</div><div class="is">'+is+'</div></div>'+(iv?'<div class="iv">'+iv+'</div>':'');}
  function ai(info,action){return '<div class="aitem"><div class="irow">'+info+'</div>'+(action||'')+'</div>';}
  function note(t){return '<div class="acat-note">'+t+'</div>';}
  if(key==="needsday"){
    return ndJobs().map(function(j){
      var d=j.visits.length,last=(j.visits[j.visits.length-1]||{}).date||"";
      var typ=j.type||"job",name=j.customer||(typ==="pallet"?"(pallet job)":"(no name)");
      var info=im(esc(name)+' <span class="pill" style="background:#5B6470">'+esc(typ)+'</span>', d+' day'+(d>1?'s':'')+' banked'+(last?' \u00b7 last '+esc(last):''), '');
      var days='<details class="nd-det"><summary>See what\u2019s done so far</summary><pre class="nd-pre">'+esc(ndDaysText(j))+'</pre></details>';
      var act='<button class="actbtn fix" onclick="mhNeedsDaySched(&#39;'+j.id+'&#39;)">Scheduled \u2014 next day booked</button>';
      return ai(info, days+act);
    }).join('')
    +note('Jobs the crew banked with \u201cback another day\u201d but didn\u2019t finish. Book the next day on the calendar, then mark it here \u2014 it drops off the list. If the crew banks yet another day it comes back on its own, and finishing the job clears it for good.');
  }
  if(key==="yardnote"){
    var _t=mhYardNoteRaw();
    return ai(im("Today\u2019s note \u00b7 "+esc(mhYardNoteKey()),"written in the Yard Hub",""),'<pre class="nd-pre" style="white-space:pre-wrap">'+esc(_t)+'</pre><button class="actbtn fix" onclick="mhYardNoteAck()">Got it</button>')
      +note('Left by the yard manager in the Yard Hub \u2014 surfaced here so it doesn\u2019t get missed. \u201cGot it\u201d clears it for today; if the note gets edited it comes back.');
  }
  if(key==="reminders"){
    return mhRemActive().map(function(r){
      var st=mhRemDueState(r.due||""),tag="";
      if(st==="over")tag='<span class="pill" style="background:#C8401F">Overdue \u00b7 '+esc(mhRemDueLabel(r.due))+'</span> ';
      else if(st==="today")tag='<span class="pill" style="background:#9a6a00">Due today</span> ';
      var act='<button class="actbtn fix" onclick="mhReminderDone(&#39;'+esc(r.id)+'&#39;)">Done</button>';
      return ai(im(tag+esc(r.text),"",""), act);
    }).join('')
    +note('Reminders the manager set in the Reminders app \u2014 by voice or typed. \u201cDone\u201d clears one here and in the app. Reminders given a future date stay off this list until their day.');
  }
  if(key==="clockin"){return attendanceBody();}
  if(key==="motive"){
    return MH_MOTIVE.map(function(c){
      var crit=c.sev==="critical";
      var pill=' <span class="pill" style="background:'+(crit?"#C8401F":"#E8A317")+'">'+(crit?"critical":"warning")+'</span>';
      var act='<button class="actbtn" onclick="mhMotiveAck(&#39;'+c.id+'&#39;)">Acknowledge</button>';
      return ai(im('Truck #'+esc(c.truck)+' \u00b7 '+esc(c.code)+pill, esc(c.desc)+' \u00b7 '+esc(c.when)+' \u00b7 via Motive', ''), act);
    }).join('')
    +note('Straight off the trucks through Motive \u2014 the moment a fault code opens on a vehicle it lands here, no one has to spot or report it. The owner sees the same alert.');
  }
  if(key==="poneeded"){
    var po=poList().filter(function(r){return r&&r.status==='requested';});
    var waiting=poList().filter(function(r){return r&&r.status==='needed';}).length;
    return po.map(function(r){
      var sub=Math.round((r.total||0)/1.05);
      var info=im(esc(r.company||'—')+(r.account?(' · '+esc(r.account)):''), esc(r.headline||r.addr||'')+' · subtotal $'+sub+' · total $'+esc(r.total), '');
      var msg='<div style="background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px 10px;font-size:12px;margin:6px 0;color:#333;line-height:1.45">'+esc(poText(r))+'</div>';
      var sent=r.texted?'<div class="adone">✓ Texted '+esc(r.booker||'the PM')+(r.phone?(' · '+esc(r.phone)):'')+'</div>':'<button class="actbtn" onclick="mhPoText(&#39;'+r.id+'&#39;)">Text '+esc(r.booker||'the PM')+' the total</button>';
      var entry='<input id="mpo_'+r.id+'" placeholder="PO# from the PM" style="width:100%;padding:9px;border:1.5px solid var(--line);border-radius:8px;font-size:15px;margin-top:6px;box-sizing:border-box"><button class="actbtn fix" onclick="mhPoSave(&#39;'+r.id+'&#39;)">Save PO# → ready to invoice</button>';
      return ai(info, msg+sent+entry);
    }).join('')
    +note('The owner set the total — text the property manager for the PO#, then drop the number in here. Saving it sends the job back to the owner’s invoice queue.'+(waiting?(' '+waiting+' more waiting on the owner’s total.'):''));
  }
  if(key==="unpaid"){
    return ETRANSFERS.map(function(u){return ai(im(esc(u.cust),esc(u.reason)+' \u00b7 '+u.days+' day'+(u.days>1?'s':''),money0(u.amt)),'');}).join('')
      +note('Residential e-transfers still owing. In production, tap a name to text the reminder. Commercial invoices and bin billing sit with the owner.');
  }
  if(key==="scale"){
    return ai(im(esc(SCALE_FLAG.combo),esc(SCALE_FLAG.detail),''),'')
      +note('Caught from the empty truck + bin weigh-in. Confirm and recalibrate before trusting today\u2019s net weights.');
  }
  if(key==="binsout"){
    var bc=lsGetMH("ij_binsout_contact_v1")||{};
    return BINS_OUT.overdue.map(function(b){
      var done=bc[b.code];
      var act=done?'<div class="adone">\u2713 Contacted '+esc(done)+'</div>':'<button class="actbtn" onclick="mhBinContact(&#39;'+b.code+'&#39;)">Made contact</button>';
      return ai(im(esc(b.code)+' \u00b7 '+esc(b.cust),'out '+b.days+' days \u00b7 no pickup booked',''),act);
    }).join('')
      +note('Longest-out first \u2014 past 14 days. Chase a pickup or confirm the rental\u2019s still going. \u201cMade contact\u201d stamps the date so it\u2019s not re-chased from memory.');
  }
  if(key==="repairs"){
    var rd=lsGetMH("ij_repairs_done_v1")||{};
    return REPAIRS.map(function(r,i){
      if(rd[i])return '';
      var pill=r.urgent?' <span class="pill" style="background:var(--stop)">urgent</span>':'';
      return ai(im(esc(r.item)+pill,esc(r.note)+' \u00b7 '+esc(r.who),''),'<button class="actbtn fix" onclick="mhRepairFix('+i+')">Mark fixed</button>');
    }).join('')
      +note('Raised by the yard.');
  }
  if(key==="trissues"){
    var tri=mhOpenFixes();
    return tri.map(function(f){
      var act=f.id?'<button class="actbtn fix" onclick="ijFixResolve(&#39;'+f.id+'&#39;)">Mark fixed</button>':'';
      return ai(im('Truck #'+esc(f.truck)+' \u00b7 '+esc(f.item||'Issue'),esc(f.note||'')+(f.who?(' \u00b7 '+esc(f.who)):'')+(f.date?(' \u00b7 '+esc(f.date)):''),''),act);
    }).join('')
      +note('Raised by the crews on their walk-around \u2014 also on the mechanic\u2019s Maintenance Hub.');
  }
  if(key==="reviews"){
    var _revAcct={residential:"Residential",commercial:"Commercial",property_mgmt:"Property mgmt"};
    return revDue().map(function(r){
      var nm=r.contact?(esc(r.name)+' · '+esc(r.contact)):esc(r.name);
      var meta=(_revAcct[r.account]||'Residential')+' · '+(r.type==='bin'?'Bin service':'Junk removal')+' · done '+esc(r.doneDate)+' · '+esc(r.crew);
      var msg='<div style="background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px 10px;font-size:12px;margin:6px 0;color:#333;line-height:1.45">'+esc(revText(r))+'</div>';
      var prev=r.prevReviewed?'<div class="acat-note" style="margin:4px 0 0">⚑ Last asked '+esc(r.prevReviewed)+' — your call whether to ask again.</div>':'';
      var send='<button class="actbtn" onclick="mhRevSend(&#39;'+r.id+'&#39;)">Send review request</button>';
      var skip='<button class="actbtn" onclick="mhRevSkip(&#39;'+r.id+'&#39;)" style="background:#fff;color:#555;border:1.5px solid var(--line)">Skip</button>';
      return ai(im(nm,meta,''), msg+prev+'<div style="display:flex;gap:8px;margin-top:2px">'+send+skip+'</div>');
    }).join('')
    +note('Send the review ask to happy customers — paid-on-site jobs land here once the job’s done, e-transfer jobs once they’ve paid. Skip drops one without asking. The wording and link live in the Owner Hub Customer texts.');
  }
  return '';
}

function lastDone(m,id){let b=null;(m.history||[]).forEach(h=>{if(h.id===id&&(!b||h.on>b.on))b=h;});return b;}
function svcStatus(m,it){
  const ld=lastDone(m,it.id);
  if(it.by==="time"){
    if(!ld)return{state:"ok",detail:"no record yet"};
    const days=Math.floor((Date.now()-new Date(ld.on).getTime())/86400000), rem=it.interval-days;
    if(rem<=0)return{state:"due",detail:(rem===0?"due today":Math.abs(rem)+" day"+(Math.abs(rem)>1?"s":"")+" over")+" · every "+it.interval+"d"};
    if(rem<=it.lead)return{state:"close",detail:rem+" day"+(rem>1?"s":"")+" to go · every "+it.interval+"d"};
    return{state:"ok",detail:"in "+rem+" days · every "+it.interval+"d"};
  }
  const u=it.by==="hours"?"h":"km";
  if(!ld)return{state:"ok",detail:"no record yet"};
  const since=m.reading-ld.reading, rem=it.interval-since;
  if(rem<=0)return{state:"due",detail:Math.abs(rem).toLocaleString()+" "+u+" over · every "+it.interval.toLocaleString()+u};
  if(rem<=it.lead)return{state:"close",detail:rem.toLocaleString()+" "+u+" to go · every "+it.interval.toLocaleString()+u};
  return{state:"ok",detail:"in "+rem.toLocaleString()+" "+u};
}

function isSnoozed(key,id){const u=snoozeStore()[key+":"+id];return !!(u&&Date.now()<u);}
function maintAlerts(){const db=maintDB();const out=[];
  db.order.forEach(key=>{const m=db.m[key];(m.items||[]).forEach(it=>{const st=svcStatus(m,it);
    if((st.state==="due"||st.state==="close")&&!isSnoozed(key,it.id))out.push({key,label:m.label,id:it.id,name:it.name,state:st.state,detail:st.detail});});});
  out.sort((a,b)=>(a.state==="due"?0:1)-(b.state==="due"?0:1));
  return out;
}

function toolRegMH(){const r=lsGetMH("ij_tool_register");if(r&&Array.isArray(r.items)){
    var DROP={blades:1,bags:1,knives:1};var before=r.items.length;
    r.items=r.items.filter(function(it){return !(DROP[it.id]&&it.type==="counted");});
    if(r.items.length!==before){try{localStorage.setItem("ij_tool_register",JSON.stringify(r));}catch(e){}}
    return r;}
  const nU=n=>{const a=[];for(let i=1;i<=n;i++)a.push({n:i,out:null});return a;};
  return {items:[
    {id:"sawzall",name:"Sawzalls",type:"numbered",units:nU(3)},
    {id:"battery",name:"Batteries",type:"numbered",units:nU(8)},
    {id:"hammer",name:"Rotary hammers",type:"kit",units:nU(2),bits:["Paddle","Chisel","Point","Spade","Auger"]}
  ]};}
function toolLogMH(){const x=lsGetMH("ij_tool_log");return Array.isArray(x)?x.slice().reverse():[];}
function toolOutCount(){let c=0;toolRegMH().items.forEach(it=>{if(it.units)it.units.forEach(u=>{if(u.out)c++;});});return c;}
function saveToolRegMH(reg){try{localStorage.setItem("ij_tool_register",JSON.stringify(reg));}catch(e){}}
window.ijToolAddUnit=(id)=>{const r=toolRegMH();const it=r.items.find(x=>x.id===id);if(it&&it.units){const n=it.units.reduce((m,u)=>Math.max(m,u.n),0)+1;it.units.push({n,out:null});}saveToolRegMH(r);render();openSheet("toolregedit");};
window.ijToolRemoveUnit=(id)=>{const r=toolRegMH();const it=r.items.find(x=>x.id===id);if(it&&it.units&&it.units.length){const last=it.units[it.units.length-1];if(last.out){alert("That unit is signed out — it has to come back before you can remove it.");}else{it.units.pop();}}saveToolRegMH(r);render();openSheet("toolregedit");};
window.ijToolSetStock=(id,v)=>{const r=toolRegMH();const it=r.items.find(x=>x.id===id);if(it){const n=parseInt(String(v).replace(/[^0-9]/g,""),10);if(!isNaN(n)){const dl=n-it.onHand;it.onHand=n;if(dl)logUsage(id,it.name,Math.abs(dl),dl<0?"used":"restock");}}saveToolRegMH(r);render();};
window.ijToolStockStep=(id,d)=>{const r=toolRegMH();const it=r.items.find(x=>x.id===id);if(it){it.onHand=Math.max(0,(it.onHand||0)+d);logUsage(id,it.name,Math.abs(d),d<0?"used":"restock");}saveToolRegMH(r);render();openSheet("toolregedit");};

function mhParseIso(iso){var p=String(iso).split("-");return new Date(+p[0],(+p[1])-1,+p[2]);}

/* 8 colours are freely assignable to a truck or the truck & trailer. 3 stay locked to job status (the app + Make.com read those). */
var IJCM_COLOURS=[
 {key:"lavender", name:"Lavender", hex:"#7986CB", id:"1"},
 {key:"flamingo", name:"Flamingo", hex:"#E67C73", id:"4"},
 {key:"banana", name:"Banana", hex:"#F6BF26", id:"5"},
 {key:"tangerine", name:"Tangerine", hex:"#F4511E", id:"6"},
 {key:"peacock", name:"Peacock", hex:"#039BE5", id:"7"},
 {key:"graphite", name:"Graphite", hex:"#616161", id:"8"},
 {key:"blueberry", name:"Blueberry", hex:"#3F51B5", id:"9"}
];
var IJCM_LOCKED=[
 {key:"basil", name:"Basil · dark green", hex:"#0B8043", id:"10", meaning:"Done — job finished, details filled, on route to the next stop"},
 {key:"tomato", name:"Tomato · red", hex:"#D50000", id:"11", meaning:"Waiting on an e-transfer or info before it can be invoiced"},
 {key:"grape", name:"Grape · purple", hex:"#8E24AA", id:"3", meaning:"Invoiced & done"}
];
var IJCM_UNASSIGNED={key:"sage", name:"Sage \u00b7 light green", hex:"#33B679", id:"2", meaning:"Unassigned \u2014 no truck picked yet. Every new job starts here until you colour it for a truck."};
var IJCM_assign={}; var IJCM_custom=[]; var IJCM_names={};
function ijcmAll(){ return IJCM_COLOURS.map(function(c){var n=IJCM_names[c.key];return n?{key:c.key,name:n,hex:c.hex,id:c.id,note:c.note}:c;}).concat(IJCM_custom.map(function(c){return {key:c.key,name:c.name,hex:c.hex,custom:true};})); }
window.ijcmRename=function(key){ var c=ijcmAll().filter(function(x){return x.key===key;})[0]; if(!c)return;
  var n=prompt("Name this colour \u2014 use the same name you gave it in Google Calendar:", c.name); if(n==null)return; n=String(n).trim(); if(!n)return;
  var cu=IJCM_custom.filter(function(x){return x.key===key;})[0]; if(cu)cu.name=n; else IJCM_names[key]=n; ijcmRender(); };
window.ijcmAddCustom=function(){ var ni=document.getElementById("ijcmNewName"), hi=document.getElementById("ijcmNewHex");
  var nm=((ni&&ni.value)||"").trim(); var hx=(hi&&hi.value)||"#7E57C2";
  if(!nm){ijcmToast("Give the colour a name first");return;}
  var k="c_"+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
  IJCM_custom.push({key:k,name:nm,hex:hx});
  IJCM_assign[k]="";
  ijcmRender(); };
window.ijcmRemoveCustom=function(key){ if(!confirm("Remove this colour from the map?"))return;
  IJCM_custom=IJCM_custom.filter(function(x){return x.key!==key;}); delete IJCM_assign[key]; ijcmRender(); };

function ijcmToast(m){try{if(typeof toast==="function"){toast(m);return;}}catch(e){}try{if(typeof toastMH==="function"){toastMH(m);return;}}catch(e){}}
function ijcmEsc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function ijcmRaw(){try{var s=JSON.parse(localStorage.getItem("ij_colourmap_v1"));if(s&&typeof s==="object")return s;}catch(e){}return null;}
function ijcmFleet(){
  var o=null;try{o=JSON.parse(localStorage.getItem("ij_fleet_v1"));}catch(e){}
  var out=[];
  if(o&&typeof o==="object"){Object.keys(o).forEach(function(n){out.push({num:String(n),lead:(o[n]&&o[n].mgr)||""});});}
  if(!out.length){["3","4","5","6","7","12"].forEach(function(n){out.push({num:n,lead:""});});}
  out.sort(function(a,b){return Number(a.num)-Number(b.num);});
  return out;
}
function ijcmFmt(ts){try{var d=new Date(ts);return d.toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"})+" · "+d.toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"});}catch(e){return String(ts);}}

function ijcmLoad(){
  var raw=ijcmRaw();
  IJCM_custom=(raw&&Array.isArray(raw.custom))?JSON.parse(JSON.stringify(raw.custom)):[];
  IJCM_names=(raw&&raw.names&&typeof raw.names==="object")?JSON.parse(JSON.stringify(raw.names)):{};
  IJCM_assign={};
  ijcmAll().forEach(function(c){IJCM_assign[c.key]="";});
  if(raw&&raw.assign&&typeof raw.assign==="object"){
    ijcmAll().forEach(function(c){var v=raw.assign[c.key];if(typeof v==="string")IJCM_assign[c.key]=v;});
  } else if(raw&&raw.current&&typeof raw.current==="object"){
    ijcmAll().forEach(function(c){var e=raw.current[c.key];if(e&&typeof e==="object")IJCM_assign[c.key]=e.truck||"";else if(typeof e==="string")IJCM_assign[c.key]=e;});
  }
}

function ijcmTruckOpts(sel){
  var h='<option value=""'+(sel===""||sel==="unassigned"?" selected":"")+">— Unassigned —</option>";
  ijcmFleet().forEach(function(t){
    var lbl="Truck #"+t.num+(t.lead?" · "+t.lead:"");
    h+='<option value="'+ijcmEsc(t.num)+'"'+(String(sel)===t.num?" selected":"")+">"+ijcmEsc(lbl)+"</option>";
  });
  h+='<option value="trailer"'+(sel==="trailer"?" selected":"")+">Truck &amp; trailer</option>";
  return h;
}

  +'<div class="ijcm-cnote" style="margin:6px 2px 0">Google Calendar now has 24 colours plus custom ones you can create and name (June 2026 update). Make the colour in Google Calendar first, then add it here with the same name and point it at a truck.</div>'; }

  var unassignedRow=(function(c){return '<div class="ijcm-srow"><span class="ijcm-dot" style="background:'+c.hex+'"></span><div class="ijcm-sm"><div class="ijcm-sn">'+ijcmEsc(c.name)+'</div><div class="ijcm-mn">'+ijcmEsc(c.meaning)+'</div></div><span class="ijcm-tag">Locked</span></div>';})(IJCM_UNASSIGNED);
  var lockedRows=IJCM_LOCKED.map(function(c){
    return '<div class="ijcm-srow"><span class="ijcm-dot" style="background:'+c.hex+'"></span><div class="ijcm-sm"><div class="ijcm-sn">'+ijcmEsc(c.name)+'</div><div class="ijcm-mn">'+ijcmEsc(c.meaning)+'</div></div><span class="ijcm-tag">Locked</span></div>';
  }).join("");
  var raw=ijcmRaw();var hist=(raw&&raw.history)||[];var last=hist.length?hist[hist.length-1]:null;
  var lastLine=last?("Last saved "+ijcmFmt(last.ts)+" · "+hist.length+" change"+(hist.length===1?"":"s")+" on record"):"Not saved yet — set your trucks, then Save.";
  var html=ijcmCSS()
   +'<div class="ijcm-intro">Set which truck — or the truck &amp; trailer — each colour stands for. Tap \u270E to rename a colour to match the name you gave it in Google Calendar, and add any custom colours you\u2019ve created there. Shared with the Owner Hub, so a change here shows in both.</div>'
   +'<div class="ijcm-gl">Truck colours — assign freely</div>'
   +'<div class="ijcm-cap">Seven colours are yours. Assign each to a truck or the truck &amp; trailer, or leave it Unassigned. Add trucks to the roster in <b>Fleet — trucks</b>.</div>'
   +cards+ijcmAddRowHTML()
   +'<div class="ijcm-warn" id="ijcmWarn"></div>'
   +'<div class="ijcm-gl" style="margin-top:18px">The unassigned colour \u2014 locked</div>'
   +'<div class="ijcm-note" style="margin-top:0">Sage is your calendar\u2019s default colour. It always means \u201cno truck picked yet,\u201d so it can\u2019t be assigned to a truck \u2014 every new job lives here until you colour it for a crew.</div>'
   +'<div class="ijcm-slist">'+unassignedRow+'</div>'
   +'<div class="ijcm-gl" style="margin-top:18px">Management colours — locked</div>'
   +'<div class="ijcm-note" style="margin-top:0">These three always mean job status, never a truck. The app and your Make.com automation read them — they can’t be reassigned.</div>'
   +'<div class="ijcm-slist">'+lockedRows+'</div>'
   +'<button class="ijcm-save" onclick="ijcmSave()">Save the map</button>'
   +'<div class="ijcm-last" id="ijcmLast">'+lastLine+'</div>';
  sheet("Colour → truck",html);
  ijcmDupe();
}

function ijcmSetTruck(el){var k=el.getAttribute("data-col");if(IJCM_assign.hasOwnProperty(k))IJCM_assign[k]=el.value;ijcmDupe();}
function ijcmDupe(){
  var counts={};IJCM_COLOURS.forEach(function(c){var v=(IJCM_assign[c.key]||"").trim();if(v)counts[v]=(counts[v]||0)+1;});
  var dupes=Object.keys(counts).filter(function(k){return counts[k]>1;});
  document.querySelectorAll(".ijcm-sel").forEach(function(s){var v=(s.value||"").trim();if(v&&dupes.indexOf(v)>=0)s.classList.add("dupe");else s.classList.remove("dupe");});
  var w=document.getElementById("ijcmWarn");
  if(w){if(dupes.length){w.classList.add("show");w.innerHTML="⚠ Two colours point at the same truck. Each truck needs its own colour, or the board can’t tell their jobs apart — fix before go-live.";}else{w.classList.remove("show");w.innerHTML="";}}
}
function ijcmSave(){
  var assign={};var current={};
  ijcmAll().forEach(function(c){var v=(IJCM_assign[c.key]||"");assign[c.key]=v;current[c.key]={cat:"",truck:v};});
  var raw=ijcmRaw()||{};
  var prev=raw.assign||null;
  if(!prev&&raw.current){prev={};IJCM_COLOURS.forEach(function(c){var e=raw.current[c.key];prev[c.key]=(e&&typeof e==="object")?(e.truck||""):(typeof e==="string"?e:"");});}
  var changed=JSON.stringify(prev||{})!==JSON.stringify(assign);
  if(JSON.stringify(raw.custom||[])!==JSON.stringify(IJCM_custom)||JSON.stringify(raw.names||{})!==JSON.stringify(IJCM_names))changed=true;
  var ts=new Date().toISOString();
  var hist=(raw.history)||[];
  if(changed||!hist.length){
    hist.push({ts:ts,assign:assign});
    var out={v:3,assign:assign,current:current,history:hist,custom:IJCM_custom,names:IJCM_names};
    try{localStorage.setItem("ij_colourmap_v1",JSON.stringify(out));}catch(e){}
  }

function trTools(n){

  days.forEach(function(d){Object.keys(d.tools).forEach(function(t){if(!streak[t])streak[t]={run:0,broken:false};});});
  Object.keys(streak).forEach(function(t){for(var i=0;i<days.length;i++){if(days[i].tools[t]==="miss"&&!streak[t].broken){streak[t].run++;}else{streak[t].broken=true;}}});
  var warn=Object.keys(streak).filter(function(t){return streak[t].run>=3;});
  var warnBlock=warn.length?('<div class="irow"><span class="dot d-red" style="width:11px;height:11px;border-radius:50%"></span><div class="im"><div class="ic">Missing '+warn.length+' day'+(warn.length>1?"s":"")+' running</div><div class="is">'+warn.map(function(t){return esc(t)+" ("+streak[t].run+"d)";}).join(", ")+'</div></div></div>'):'';

  }).join("");

function otBarColor(net){return net>OT_CAP?"#C0392B":(net>=OT_NEAR?"#E8A317":"#3CA03C");}

function otBody(){
  var D=otData(), rows=D.rows, nOver=0, nNear=0;
  rows.forEach(function(r){[r.w1,r.w2].forEach(function(s){if(s.net>OT_CAP)nOver++;else if(s.net>=OT_NEAR)nNear++;});});
  var nav='<div class="ot-nav"><button class="ot-pn" onclick="otStep(-1)">\u2190</button><div class="ot-pl"><span>Pay period</span><b>'+payLabel(OT_OFFSET)+'</b></div><button class="ot-pn" onclick="otStep(1)"'+(OT_OFFSET>=0?' disabled':'')+'>\u2192</button></div>';
  var sum='<div class="ot-sum">'+rows.length+' tracked \u00b7 cap 40h per working week (Thu\u2013Wed, weekends off)'+(nOver?' \u00b7 <b class="ot-over">'+nOver+' week'+(nOver>1?'s':'')+' over</b>':'')+(nNear?' \u00b7 <b class="ot-near">'+nNear+' at cap</b>':'')+'</div>';
  var cards=rows.map(function(r){
    var notes=[];
    if(r.w1.noOut||r.w2.noOut)notes.push('missing a clock-out \u2014 that day isn\u2019t counted yet');
    if(r.w1.big||r.w2.big)notes.push('12h+ in a day \u2014 double-time on the overage');
    var note=notes.length?'<div class="ot-note">'+esc(notes.join(' \u00b7 '))+'</div>':'';
    return '<div class="ot-card"><div class="ot-top"><span class="ot-nm">'+esc(r.name)+'</span><span class="ot-ro">'+esc(r.role)+'</span></div>'
      +otWkChip('Week 1',r.w1,r.cur===1)+otWkChip('Week 2',r.w2,r.cur===2)+note+'</div>';
  }).join('');
  if(!rows.length)cards='<div class="ot-note" style="text-align:center;padding:18px 0">No tracked crew yet.</div>';
  return OT_CSS+nav+sum+cards;
}

    if(allObj){var cols2=["key"];keys.forEach(function(k){Object.keys(val[k]).forEach(function(c){if(cols2.indexOf(c)<0)cols2.push(c);});});return {headers:cols2,rows:keys.map(function(k){return cols2.map(function(c){if(c==="key")return k;var v=val[k][c];return (v&&typeof v==="object")?JSON.stringify(v):(v==null?"":v);});})};}
    return {headers:["key","value"],rows:keys.map(function(k){var v=val[k];return [k,(v&&typeof v==="object")?JSON.stringify(v):v];})};
  }
  return {headers:["value"],rows:[[String(val==null?"":val)]]};
}

  var raw=lsGetMH(store);var fl=flattenRows(raw==null?[]:raw);return {file:store.replace(/_/g,"-"),title:dsLabel(store),headers:fl.headers,rows:fl.rows};
}

/* ---- payroll pay-period file (reuses your wife's exact template via SheetJS) ---- */
var PAY_BRAND="Victoria",PAY_OFFSET=0;
function payStart(off){var anchor=new Date(2024,0,4);var today=new Date();var per=Math.floor((today-anchor)/(14*86400000))+off;return new Date(anchor.getTime()+per*14*86400000);}
function paySerial(d){return Math.round((Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())-Date.UTC(1899,11,30))/86400000);}
function payLabel(off){var s=payStart(off);var e=new Date(s.getTime()+13*86400000);var f=function(d){return d.toLocaleDateString(undefined,{month:"short",day:"numeric"});};return f(s)+" \u2013 "+f(e)+", "+e.getFullYear();}
window.ijPayBrand=function(b){PAY_BRAND=b;repaintData();};
window.ijPayStep=function(d){var n=PAY_OFFSET+d;if(n>0)return;PAY_OFFSET=n;repaintData();};
window.ijPayExport=function(){
  if(typeof XLSX==="undefined"){alert("Spreadsheet engine is still loading (needs internet on first use). Give it a second and tap again.");return;}
  try{
    var wb=XLSX.read(PAY_TPL_B64,{type:"base64"});
    var name=(PAY_BRAND==="Nanaimo")?"Nanaimo Hours":"Victoria Employee Hours";
    var ws=wb.Sheets[name];if(!ws){alert("Template sheet not found.");return;}
    var s=payStart(PAY_OFFSET);
    ws["B1"]={t:"n",v:paySerial(s),z:"d-mmm"};
    var out=XLSX.write(wb,{bookType:"xlsx",type:"array"});
    var fname="Island Junk "+PAY_BRAND+" Pay "+s.toISOString().slice(0,10)+".xlsx";
    var blob=new Blob([out],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    var u=URL.createObjectURL(blob);var a=document.createElement("a");a.href=u;a.download=fname;document.body.appendChild(a);a.click();setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(u);},150);
    toastMH("Pay file downloaded");
  }catch(e){alert("Pay file export failed: "+(e&&e.message?e.message:e));}
};

/* ============ Customizable launcher tiles (ij_mh_layout_v1) ============
   MODULES stays as the catalog (defaults: icon, name, url, status, badge).
   The layout below decides order / visibility / names / grouping, and is the
   single source of truth once saved. Ships with Trucks+Bins+Yard+Swing pre-grouped. */
var MH_LAYOUT_KEY="ij_mh_layout_v1";
var MH_GROUP_DEFAULT=["trucks","bins","yard","swing"];
function mhUid(){return "s"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function mhCat(key){for(var i=0;i<MODULES.length;i++){if(MODULES[i].key===key)return MODULES[i];}return null;}
function mhDefaultLayout(){
  var slots=[],did=false;
  MODULES.forEach(function(m){
    if(MH_GROUP_DEFAULT.indexOf(m.key)>=0){
      if(!did){slots.push({id:mhUid(),kind:"group",name:"Trucks, Bins & Yard",hidden:false,children:MH_GROUP_DEFAULT.map(function(k){return {key:k};})});did=true;}
      return;
    }
    slots.push({id:mhUid(),kind:"tile",key:m.key,name:null,url:null,hidden:false});
  });
  return {v:1,slots:slots};
}
function mhSanitize(lay){
  if(!lay||!Array.isArray(lay.slots))return mhDefaultLayout();
  lay.slots.forEach(function(s){ if(!s.id)s.id=mhUid(); if(s.kind==="group"){ if(!Array.isArray(s.children))s.children=[]; s.children=s.children.filter(function(c){return c&&(c.url||mhCat(c.key));}); } });
  lay.slots=lay.slots.filter(function(s){ if(s.kind==="group")return true; if(s.url)return true; return !!mhCat(s.key); });
  if(!lay.slots.length)return mhDefaultLayout();
  return lay;
}
function mhLoad(){
  try{var r=localStorage.getItem(MH_LAYOUT_KEY); if(r){var p=JSON.parse(r); if(p&&Array.isArray(p.slots)){var lay=mhSanitize(p); mhEnsureModules(lay); mhSave(lay); return lay;}}}catch(e){}
  var d=mhDefaultLayout(); mhEnsureModules(d); mhSave(d); return d;
}
function mhEnsureModules(lay){
  var used={};
  lay.slots.forEach(function(sl){ if(sl.key)used[sl.key]=1; if(sl.kind==="group")(sl.children||[]).forEach(function(c){if(c.key)used[c.key]=1;}); });
  MODULES.forEach(function(m){ if(!used[m.key]) lay.slots.push({id:mhUid(),kind:"tile",key:m.key,name:null,url:null,hidden:false}); });
}
function mhSave(lay){ try{localStorage.setItem(MH_LAYOUT_KEY,JSON.stringify(lay));}catch(e){} }
function mhSlot(lay,id){for(var i=0;i<lay.slots.length;i++){if(lay.slots[i].id===id)return lay.slots[i];}return null;}

/* ---- render launcher from layout ---- */
function mhTile(o){

      body=`<div>${chips}</div><div style="margin-top:4px;font-size:12.5px;color:var(--muted)">Add a tool: <select onchange="mhCzGroupAdd('${s.id}',this.value);this.value=''" style="${SEL}"><option value="">\u2014</option>${mhToolOpts("")}</select></div>`
        +`<div style="margin-top:10px"><button onclick="mhCzDelete('${s.id}')" style="${BTN}">Ungroup &amp; remove tile</button></div>`;
    } else {

/* ---- customize handlers ---- */
window.mhCzMove=function(id,dir){var lay=mhLoad();var i=-1;for(var k=0;k<lay.slots.length;k++){if(lay.slots[k].id===id){i=k;break;}}var j=i+dir;if(i<0||j<0||j>=lay.slots.length)return;var t=lay.slots[i];lay.slots[i]=lay.slots[j];lay.slots[j]=t;mhSave(lay);mhRenderCustomize();render();};

window.mhCzAssign=function(id,gid){if(gid==="")return;var lay=mhLoad();var i=-1;for(var k=0;k<lay.slots.length;k++){if(lay.slots[k].id===id){i=k;break;}}if(i<0)return;var s=lay.slots[i];var g;if(gid==="__new__"){g={id:mhUid(),kind:"group",name:"New group",hidden:false,children:[]};lay.slots.push(g);}else{g=mhSlot(lay,gid);if(!g||g.kind!=="group")return;}var child=(s.url&&!s.key)?{key:null,name:s.name||"Tile",url:s.url}:{key:s.key};if(s.name&&s.key&&s.name!==(mhCat(s.key)||{}).name)child.name=s.name;g.children.push(child);lay.slots.splice(i,1);mhSave(lay);mhRenderCustomize();render();};
window.mhCzPop=function(gid,idx){var lay=mhLoad();var g=mhSlot(lay,gid);if(!g||!g.children[idx])return;var c=g.children[idx];g.children.splice(idx,1);var slot=(c.url&&!c.key)?{id:mhUid(),kind:"tile",key:null,name:c.name||"Tile",url:c.url,hidden:false}:{id:mhUid(),kind:"tile",key:c.key,name:c.name||null,url:null,hidden:false};lay.slots.push(slot);mhSave(lay);mhRenderCustomize();render();};
window.mhCzGroupAdd=function(gid,key){if(!key)return;var lay=mhLoad();var g=mhSlot(lay,gid);if(!g)return;var ti=-1;for(var k=0;k<lay.slots.length;k++){if(lay.slots[k].kind==="tile"&&lay.slots[k].key===key){ti=k;break;}}if(ti>=0){var ts=lay.slots[ti];var child={key:key};if(ts.name)child.name=ts.name;g.children.push(child);lay.slots.splice(ti,1);}else{g.children.push({key:key});}mhSave(lay);mhRenderCustomize();render();};

window.mhCzAddTile=function(){var sel=document.getElementById("mhAddKey");if(!sel)return;var v=sel.value;if(!v)return;var lay=mhLoad();if(v==="__url__"){var u=prompt("Link / URL:");if(!u)return;u=String(u).trim();if(!u)return;var nm=prompt("Tile name:","New tile");lay.slots.push({id:mhUid(),kind:"tile",key:null,name:(nm&&nm.trim())||"New tile",url:u,hidden:false});}else{lay.slots.push({id:mhUid(),kind:"tile",key:v,name:null,url:null,hidden:false});}mhSave(lay);mhRenderCustomize();render();};

function openSheet(key){
  if(key==="colours"){ijcmOpen();return;}
  if(key==="clockcrew"){renderClockCrew();return;}
  if(key==="estimate"){var ew=window.open("island-junk-estimate-builder-v4.html","_blank");if(!ew)toastMH("Allow pop-ups to open the estimate builder");return;}
  if(key==="incident"){var iw=window.open("island-junk-incident-report-v2.html","_blank");if(!iw)toastMH("Allow pop-ups to open incident reports");return;}
  if(key==="truckrec"){openTruckRec();return;}
  if(key==="access"){renderAccess();return;}
  if(key==="weights"){
    var log=weighLog();
    var flags=wlFlags(log);
    var truest=wlGroupLightest(log,false);
    var crewE=wlGroupLightest(log,true);

        const nums=it.units.map(u=>`<span class="unum ${u.out?'out':''}">#${u.n}${u.out?" &middot; T"+esc(u.out.truck):""}</span>`).join("");
        const bits=it.type==="kit"?`<div class="bitedit"><span class="bl">Bits:</span> ${(it.bits||[]).map(b=>`<span class="bchip2">${esc(b)} <button onclick="ijToolRemoveBit('${it.id}','${esc(b)}')">&times;</button></span>`).join("")}<input class="bitin" id="bit_${it.id}" placeholder="add bit"><button class="addmini" onclick="ijToolAddBit('${it.id}')">+</button></div>`:"";
        return `<div class="mrow col"><div class="mim"><div class="mic">${esc(it.name)} <span class="mis2">${it.units.length} total${outN?" &middot; "+outN+" out":""}</span></div>
          <div class="unitnums">${nums}</div>${bits}</div>
          <div class="ucol"><div class="snz"><button onclick="ijToolAddUnit('${it.id}')">+ unit</button><button onclick="ijToolRemoveUnit('${it.id}')">&minus; unit</button></div>
          <button class="rmbtn sm" onclick="ijToolRemoveItem('${it.id}')">&times;</button></div></div>`;
      }).join("")+
      `<div class="addrow wrap"><input id="ntName" placeholder="New tool (e.g. Impact driver)"><select id="ntType" class="msel"><option value="numbered">numbered</option><option value="counted">counted</option><option value="kit">kit + bits</option></select><input id="ntN" inputmode="numeric" placeholder="#" style="max-width:60px"><button class="addbtn2" onclick="ijToolAddItem()">Add</button></div>`+
      `<button class="open-btn" style="margin-top:10px" onclick="ijToolReset()">Reset to standard registry</button>`);
    return;
  }
  if(key==="stock"){
    const st=stockMH();
    const low=st.items.filter(i=>i.restockAt>0&&i.onHand<=i.restockAt);
    sheet("Parts & stock",
      `<div class="ctx">Stock for the shop, trucks, yard, jobs and hazmat cleanups. Set what's on hand and the restock point \u2014 anything at or below it flags here and on the dashboard. Add or remove parts anytime.</div>`+
      `<div class="msub">Needs restock${low.length?" &middot; "+low.length:""}</div>`+
      (low.length?low.map(i=>`<div class="mrow close"><div class="mim"><div class="mic">${esc(i.name)} <span class="mbadge close">LOW</span></div><div class="mis2">${i.onHand} ${esc(i.unit)} left &middot; restock at ${i.restockAt}</div></div></div>`).join(""):`<div class="note">Everything is stocked.</div>`)+
      (function(){
        const seen=stockCats();const lbl={"Hazmat / PPE":"Hazmat","Job supplies":"Job","Yard supplies":"Yard","Shop supplies":"Shop"};
        if(seen.indexOf(STOCK_CAT)<0)STOCK_CAT=seen[0]||"Parts";
        const tabs=`<div class="stabs">`+seen.map((c,ix)=>`<button class="stab ${c===STOCK_CAT?'on':''}" onclick="ijStockCat(${ix})">${esc(lbl[c]||c)}</button>`).join("")+`</div>`;
        const row=i=>`<div class="mrow"><div class="mim"><div class="mic">${esc(i.name)}</div>
        <div class="mis">on hand <input class="mint" inputmode="numeric" value="${i.onHand}" onchange="ijStockSet('${i.id}',this.value)"> ${esc(i.unit)}</div><div class="mis">restock at <input class="mint sm" inputmode="numeric" value="${i.restockAt}" onchange="ijStockThresh('${i.id}',this.value)"></div></div>
        <div class="snz"><button onclick="ijStockStep('${i.id}',-1)">&minus;</button><button onclick="ijStockStep('${i.id}',1)">+</button></div>
        <button class="rmbtn sm" onclick="ijStockRemove('${i.id}')">&times;</button></div>`;
        return tabs+st.items.filter(i=>(i.cat||"Other")===STOCK_CAT).map(row).join("");
      })()+
      `<div class="addbox"><div class="addlbl">Add an item</div><input id="skName" class="addin" placeholder="Item name (e.g. Coolant)"><select id="skCat" class="addin">${["Shop / Demo supplies","Parts","Fluids","Job supplies","Yard supplies","Shop supplies"].map(c=>`<option value="${c}"${c===STOCK_CAT?' selected':''}>${c}</option>`).join("")}</select><div class="addr3"><input id="skN" class="addin" inputmode="numeric" placeholder="Qty"><input id="skUnit" class="addin" placeholder="Unit"><input id="skR" class="addin" inputmode="numeric" placeholder="Restock"></div><button class="addbtn-full" onclick="ijStockAdd()">Add item</button></div>`);
    return;
  }
  if(key==="usage"){
    const log=usageLog(), yr=new Date().getFullYear(), agg={};
    log.forEach(e=>{if(new Date(e.at).getFullYear()!==yr)return;const a=agg[e.id]=agg[e.id]||{name:e.name,used:0,restock:0};a[e.type]=(a[e.type]||0)+e.qty;});
    const oh={}; stockMH().items.forEach(i=>oh[i.id]={name:i.name,oh:i.onHand,unit:i.unit}); toolRegMH().items.forEach(it=>{if(it.type==="counted")oh[it.id]={name:it.name,oh:it.onHand,unit:it.unit};});
    const ids=Array.from(new Set(Object.keys(agg).concat(Object.keys(oh))));
    const rows=ids.map(id=>{const a=agg[id]||{used:0,restock:0};const o=oh[id];return {name:(o&&o.name)||(a&&a.name)||id,used:a.used||0,restock:a.restock||0,oh:o?o.oh:null,unit:o?o.unit:""};}).sort((x,y)=>y.used-x.used);
    sheet("Usage & restock",
      `<button class="backbtn" onclick="openSheet('toolreg')">&larr; Tool registry</button>`+
      `<div class="ctx">How much you go through in a year. "Used" climbs as crews sign blades, bags and knives out and as parts get drawn down; "restocked" climbs when you top up. Counts reset each calendar year.</div>`+
      `<div class="msub">${yr} so far</div>`+
      rows.map(r=>`<div class="urow"><div class="im"><div class="ic">${esc(r.name)}</div>${r.oh!=null?`<div class="is">${r.oh} ${esc(r.unit)} on hand</div>`:""}</div>
        <div class="ucnt"><div class="uc used"><b>${r.used}</b><span>used</span></div><div class="uc re"><b>${r.restock}</b><span>restocked</span></div></div></div>`).join(""));
    return;
  }
  if(key==="clock"){mhViewIso=mhLatestWeekday();clockSheet();return;}
  // generic module tiles
  const names={booking:"New booking",rates:"Rate Sheet",route:"Route Builder",colour:"Colour → Truck map",invoicing:"Invoicing Hub",bins:"Bin Tracker",access:"Access & permissions"};
  const blurb={
    booking:"Create a job — assign a truck (sets the calendar colour), customer, address, scope, hard-set price, proximity check.",
    rates:"The one place every price lives. Change a rate and every billing screen re-prices.",
    route:"Build and optimise a run from a list of stops.",
    colour:"Maps crew colours to trucks so colour-coded jobs trace back to the right truck.",
    invoicing:"Every completed job laid out start to finish, invoice-ready, with the unpaid section.",
    bins:"Where every bin is — out, returning, in the yard — and which are overdue.",
    access:"Owner only — the sign-in log across every hub (who opened what, when, who was manager vs crew) plus who's allowed to lead the trucks and yard."
  };
  sheet(names[key]||"Tool", `<div class="ctx">${esc(blurb[key]||"")}</div>`+openBtn("Open "+(names[key]||"tool")));
}
$("#mX").addEventListener("click",()=>$("#modal").classList.remove("show"));
$("#modal").addEventListener("click",e=>{if(e.target===$("#modal"))$("#modal").classList.remove("show");});

render();
</script>
</body>
</html>
