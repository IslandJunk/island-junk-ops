<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Island Junk — Truck Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --orange:#F05014; --orange-d:#D2440F;
    --ink:#141414; --muted:#6E6E6E;
    --paper:#F4F3F1; --card:#FFFFFF; --line:#E5E3DF;
    --green:#3CA03C; --green-d:#2E7D2E;
    --stop:#C0392B; --grape:#6B4C9A; --steel:#5B6470; --amber:#C97A1E;
    --shadow:0 1px 2px rgba(0,0,0,.05),0 8px 24px rgba(20,20,20,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--paper);color:var(--ink);line-height:1.45;-webkit-font-smoothing:antialiased;padding-bottom:40px}
  .cnav{position:sticky;top:0;z-index:36;display:flex;gap:8px;max-width:640px;margin:0 auto;background:var(--paper,#F4F3F1);padding:8px 16px;border-bottom:1px solid var(--line,#E5E3DF)}
  .cnav-b{flex:1;border:none;border-radius:9px;padding:9px 8px;font-family:"Inter",system-ui,sans-serif;font-weight:700;font-size:12.5px;cursor:pointer;color:#fff;background:#141414;display:flex;align-items:center;justify-content:center;gap:5px;line-height:1}
  .cnav-b.inc{background:#C0392B}
  .cnav-b:active{filter:brightness(.9)}

  .wrap{max-width:560px;margin:0 auto;padding:0 16px}

  header{background:radial-gradient(440px 150px at 50% 4%,rgba(240,80,20,.08),rgba(240,80,20,0) 72%),linear-gradient(180deg,#ffffff 0%,#fbf9f4 100%);border-bottom:3px solid var(--orange);box-shadow:0 12px 34px rgba(0,0,0,.5);padding:13px 0 12px;position:relative;z-index:5}
  .hd{display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center}
  .logo{width:100%;max-width:320px;height:auto;display:block;margin:0 auto;filter:drop-shadow(0 3px 7px rgba(0,0,0,.18))}
  .tool{font-family:"Anton",sans-serif;font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:#f4f1ec;line-height:1;display:inline-flex;align-items:center;gap:9px;background:#161616;border:1px solid rgba(240,80,20,.5);padding:7px 15px 6px;border-radius:999px;box-shadow:0 5px 14px rgba(0,0,0,.3)}
  .tool::before,.tool::after{content:"";width:13px;height:2px;background:var(--orange);display:inline-block;border-radius:2px}
  .truckbadge{font-family:"Anton";font-size:15px;background:var(--orange);color:#fff;padding:5px 12px;border-radius:9px;letter-spacing:.04em}
  .truckbadge.hidden{display:none}

  .prog{display:flex;gap:5px;margin-top:14px}
  .prog .p{flex:1;height:5px;border-radius:3px;background:var(--line)}
  .prog .p.on{background:var(--orange)} .prog .p.done{background:var(--green)}

  .stage{margin-top:18px}
  h1{font-family:"Anton";font-size:27px;letter-spacing:.02em;line-height:1.1;margin-bottom:6px}
  h1 .o{color:var(--orange-d)}
  .lead{font-size:14px;color:var(--muted);margin-bottom:18px;line-height:1.5}
  .sh{font-family:"Inter";font-weight:800;text-transform:uppercase;letter-spacing:.03em;font-size:13px;color:var(--muted);margin:18px 0 10px}

  .truckgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:6px}
  .tbtn{background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:20px 14px;text-align:center;cursor:pointer;box-shadow:var(--shadow)}
  .tbtn:active{border-color:var(--orange);background:var(--paper)}
  .tbtn .num{font-family:"Anton";font-size:34px;line-height:1}
  .tbtn .cls{font-size:12px;color:var(--muted);margin-top:5px;font-weight:600}

  .panel{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow)}
  label.fld{display:block;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:0 0 7px}
  input[type=text],input[type=tel],textarea{width:100%;font-family:inherit;font-size:17px;border:1.5px solid var(--line);border-radius:11px;padding:13px 14px;min-height:50px;-webkit-appearance:none;appearance:none;background:#fff}
  input:focus,textarea:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px rgba(240,80,20,.15)}
  .pin{letter-spacing:.4em;font-weight:700;text-align:center;font-size:22px}
  .link{display:inline-block;margin-top:14px;color:var(--orange-d);font-weight:700;font-size:14px;cursor:pointer;background:none;border:none;padding:0}

  .chips{display:flex;flex-wrap:wrap;gap:9px}
  .chip{padding:11px 16px;border-radius:30px;border:1.5px solid var(--line);background:#fff;font-weight:600;font-size:14px;cursor:pointer}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .rosterbtn{width:100%;text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:11px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:8px}
  .rosterbtn:active{border-color:var(--orange);background:var(--paper)}

  .check{background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:9px}
  .check .ct{font-weight:700;font-size:14.5px}
  .check .cd{font-size:12px;color:var(--muted);margin-top:1px}
  .seg{display:flex;gap:8px;margin-top:10px}
  .seg button{flex:1;border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:11px;font-weight:700;font-size:13.5px;cursor:pointer;color:var(--muted)}
  .seg button.ok.sel{background:var(--green);border-color:var(--green);color:#fff}
  .seg button.flag.sel{background:var(--stop);border-color:var(--stop);color:#fff}
  .flagnote{margin-top:9px;display:none} .flagnote.show{display:block}
  .flagnote textarea{min-height:46px;font-size:15px}

  .toolrow{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px}
  .toolrow .tn{flex:1;font-weight:600;font-size:14.5px}
  .toolrow .ts{display:flex;gap:7px}
  .toolrow .ts button{border:1.5px solid var(--line);background:#fff;border-radius:9px;padding:8px 12px;font-weight:700;font-size:12.5px;cursor:pointer;color:var(--muted)}
  .toolrow .ts button.on.sel{background:var(--green);border-color:var(--green);color:#fff}
  .toolrow .ts button.miss.sel{background:var(--amber);border-color:var(--amber);color:#fff}

  .alertcard{border:1.5px solid var(--amber);background:#FFF7ED;border-radius:13px;padding:15px;margin-bottom:14px}
  .alertcard.good{border-color:#bfe0bf;background:#F4FBF4}
  .alertcard .at{font-weight:800;font-size:15px;display:flex;align-items:center;gap:8px}
  .alertcard .ad{font-size:13px;color:#5a5a5a;margin-top:5px;line-height:1.5}
  .dot{width:10px;height:10px;border-radius:50%;flex:none}.dot.a{background:var(--amber)}.dot.g{background:var(--green)}

  .reqpreset{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
  .reqpreset button{border:1.5px solid var(--line);background:#fff;border-radius:30px;padding:9px 14px;font-weight:600;font-size:13.5px;cursor:pointer}
  .reqpreset button:active{border-color:var(--orange)}
  .reqlist{margin-top:6px}
  .reqitem{display:flex;align-items:center;gap:10px;font-size:13.5px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:7px}
  .reqitem .rx{margin-left:auto;color:var(--muted);cursor:pointer;font-size:18px;background:none;border:none}

  .jobtools{background:#141414;color:#fff;border-radius:13px;padding:15px;margin-bottom:13px}
  .jobtools .jl{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#FFB37A;font-weight:700}
  .jobtools .jt{font-size:14px;margin-top:6px;line-height:1.55}
  .reviewbar{border:1.5px solid var(--orange);background:#FFF7ED;border-radius:13px;padding:14px;margin-bottom:14px;display:flex;gap:12px;align-items:flex-start}
  .reviewbar.done{border-color:var(--green);background:#F4FBF4}
  .reviewbar .rt{flex:1;font-size:13.5px;font-weight:600;line-height:1.5}
  .reviewbar .cbx{width:26px;height:26px;border-radius:7px;border:2px solid var(--orange);flex:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff}
  .reviewbar.done .cbx{background:var(--green);border-color:var(--green)}

  .job{background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:9px;display:flex;gap:12px;align-items:flex-start}
  .job .jtime{font-family:"Anton";font-size:15px;color:var(--orange-d);flex:none;width:56px}
  .job .jb{flex:1}
  .job .jname{font-weight:700;font-size:14.5px}
  .job .jsub{font-size:12.5px;color:var(--muted);margin-top:2px}
  .job .jtl{font-size:11.5px;color:var(--steel);margin-top:5px}

  .footer-rec{font-size:12px;color:var(--muted);margin-top:18px;text-align:center;line-height:1.5;border-top:1px solid var(--line);padding-top:14px}

  .notecard{background:#fff;border:1px solid var(--line);border-left:5px solid var(--orange);border-radius:13px;padding:16px 17px;box-shadow:var(--shadow)}
  .notecard .nh{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:11px;gap:10px}
  .notecard .nh-by{font-weight:800;font-size:14.5px}
  .notecard .nh-when{font-size:11.5px;color:var(--muted);flex:none}
  .notecard .nbody{font-size:14.5px;line-height:1.62;color:#2a2a2a}

  .cta{position:sticky;bottom:0;background:linear-gradient(to top,var(--paper) 70%,transparent);padding:14px 0 16px;margin-top:18px}
  .btn{width:100%;font-family:"Inter";font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-size:16px;padding:16px;border-radius:13px;border:none;cursor:pointer;color:#fff;background:var(--orange)}
  .btn:disabled{background:#D7D4CF;color:#9a9a9a;cursor:not-allowed}
  .btn.go{background:var(--green)}
  .btn.ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line)}
  .warn{color:var(--stop);font-size:13px;font-weight:600;text-align:center;margin-top:8px;min-height:18px}
  .smallnote{font-size:11.5px;color:var(--muted);text-align:center;margin-top:8px}
/* ===== DAY FLOW ===== */
.jobtools.keys{margin-top:10px}
.jobtools.keys .keyrow{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--ink);padding:3px 0}
.kt-tag{font-size:10.5px;font-weight:800;letter-spacing:.04em;padding:2px 7px;border-radius:999px;color:#fff;white-space:nowrap}
.kt-tag.office{background:#C8401F}.kt-tag.site{background:#2E7D9A}
.noteflag{font-size:10.5px;font-weight:800;letter-spacing:.04em;color:#8a7a52;background:#FBF3DD;padding:2px 7px;border-radius:999px;vertical-align:middle}
.demoflag{font-size:10.5px;font-weight:800;letter-spacing:.04em;color:#fff;background:#C0392B;padding:2px 7px;border-radius:999px;vertical-align:middle}
.ni-demo{font-size:9px;font-weight:800;letter-spacing:.03em;color:#fff;background:#C0392B;padding:1px 5px;border-radius:999px;margin-left:4px;vertical-align:middle}
.jobcard .demoflag{margin-left:6px}
.demobanner{background:#C0392B;color:#fff;border-radius:14px;padding:13px 15px;margin:11px 0;box-shadow:0 0 0 0 rgba(192,57,43,.5);animation:demopulse 1.8s ease-out infinite}
.demobanner .db-h{font-family:Anton,sans-serif;font-size:19px;letter-spacing:.02em;line-height:1.1}
.demobanner .db-sub{font-size:13px;font-weight:600;margin-top:3px;line-height:1.3;opacity:.96}
@keyframes demopulse{0%{box-shadow:0 0 0 0 rgba(192,57,43,.45)}70%{box-shadow:0 0 0 12px rgba(192,57,43,0)}100%{box-shadow:0 0 0 0 rgba(192,57,43,0)}}
/* meter */
.meter{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 13px;margin:0 0 12px}
.meter-head{display:flex;justify-content:space-between;font-size:13px;color:var(--muted)}
.meter-head b{color:var(--ink);font-size:15px}
.meter-head .mm{color:#8a6a2a}
.meter-bar{position:relative;height:14px;border-radius:8px;background:#EFEce6;margin:8px 0 6px;overflow:hidden}
.meter-fill{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,#3CA03C,#79c34d);border-radius:8px}
.meter-metal{position:absolute;left:0;top:0;bottom:0;background:repeating-linear-gradient(45deg,#9a7b32,#9a7b32 4px,#b8923d 4px,#b8923d 8px);opacity:.92;border-radius:8px}
.swapmark{position:absolute;top:-2px;bottom:-2px;width:2px;background:#C8401F}
.meter-sub{font-size:11.5px;color:var(--muted)}
.alert-banner{background:#FBE9E4;border:1px solid #E7B8AB;border-radius:12px;padding:10px 12px;font-size:13px;color:#7a2d18;margin-bottom:12px}
.alert-banner .amut{color:#a86c5a;font-size:11.5px}
/* stop card */
.stopcard{background:#fff;border:1px solid var(--line);border-radius:16px;padding:15px 15px 14px;box-shadow:0 6px 18px rgba(20,20,20,.06);margin-bottom:14px}
.stopcard.note{background:#FCFAF4;border-color:#ECE3CB}
.sc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.sc-time{font-weight:800;color:var(--orange);font-size:14px}
.sc-pos{font-size:11.5px;color:var(--muted)}
.sc-name{font-family:Anton,sans-serif;font-size:23px;letter-spacing:.01em;line-height:1.05;margin:2px 0 3px}
.sc-area{font-size:13px;color:var(--muted);margin-bottom:8px}
.sc-scope{font-size:14.5px;color:var(--ink);margin-bottom:10px}
.keybadge{display:block;font-size:12.5px;font-weight:600;padding:7px 10px;border-radius:10px;margin-bottom:9px}
.keybadge.office{background:#FBE9E4;color:#7a2d18}.keybadge.site{background:#E6F1F5;color:#1f5a6e}
.sc-tools{font-size:12.5px;color:var(--muted);margin-bottom:11px}
.sc-actions{display:flex;gap:9px}
.sc-actions .btn{flex:1;padding:13px;font-size:14px;margin:0}
/* day list */
.nextlist{display:flex;flex-direction:column;gap:1px;margin-bottom:8px}
.nextitem{display:flex;align-items:center;gap:10px;padding:9px 11px;background:#fff;border:1px solid var(--line);font-size:13.5px}
.nextitem:first-child{border-radius:11px 11px 0 0}.nextitem:last-child{border-radius:0 0 11px 11px}
.nextitem+.nextitem{border-top:none}
.ni-dot{width:20px;height:20px;border-radius:50%;background:#EFEce6;color:var(--muted);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.ni-time{color:var(--muted);font-size:12px;width:42px;flex:0 0 auto}
.ni-name{color:var(--ink);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nextitem.now{background:#FFF6F1;border-color:#F3C7B4}.nextitem.now .ni-dot{background:var(--orange);color:#fff}.nextitem.now .ni-name{color:var(--orange)}
.nextitem.done .ni-dot{background:#3CA03C;color:#fff}.nextitem.done .ni-name{color:var(--muted);text-decoration:line-through}
.nextitem.detour{background:#FAF6EC;border-color:#ECE3CB}.nextitem.detour .ni-dot{background:#b8923d;color:#fff}.nextitem.detour .ni-name{color:#8a6a2a;font-weight:600}
.detourlist{display:flex;flex-direction:column;gap:1px;margin:-7px 0 8px}
/* chips */
.chiprow{display:flex;flex-wrap:wrap;gap:7px}
.fchip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 13px;font-size:14px;font-weight:600;color:var(--ink);cursor:pointer}
.fchip.on{background:var(--orange);color:#fff;border-color:var(--orange)}
.rowin2{width:100%;padding:12px;border:1px solid var(--line);border-radius:11px;font-size:15px}
.bigta{width:100%;min-height:84px;padding:12px;border:1px solid var(--line);border-radius:11px;font-size:15px;font-family:inherit;resize:vertical}
.cta2{display:flex;gap:9px;margin-top:16px}
.cta2 .btn{flex:1;margin:0}.cta2 .btn.ghost{flex:0 0 38%}
.amut{color:var(--muted);font-weight:500;font-size:12px}
/* dump offer */
.dumpoffer{background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px;margin-bottom:12px}
.dumpoffer.hot{background:#FAF6EC;border-color:#E2C98A;box-shadow:0 4px 14px rgba(160,130,40,.12)}
.dumpoffer.small{padding:11px 13px}
.do-head{font-size:14.5px;font-weight:700;color:var(--ink);margin-bottom:3px}
.do-head b{color:#8a6a2a}
.depotbtn{display:flex;flex-direction:column;text-align:left;width:100%;border:1px solid var(--line);background:#fff;border-radius:11px;padding:11px 12px;margin-top:9px;cursor:pointer}
.depotbtn b{font-size:13.5px;color:var(--ink)}.depotbtn span{font-size:12px;color:var(--muted);margin-top:2px}
.minor-row{display:flex;flex-wrap:wrap;gap:14px;margin-top:6px}
/* depot screen */
.depotcard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:14px}
.dc-name{font-weight:700;font-size:15px;color:var(--ink)}
.dc-addr{font-size:13px;color:var(--muted);margin-top:3px}
.dc-tag{display:inline-block;margin-top:9px;font-size:11.5px;font-weight:800;letter-spacing:.03em;padding:3px 9px;border-radius:999px}
.dc-tag.refund{background:#E7F3E7;color:#2c6e2c}.dc-tag.free{background:#EEF1F4;color:#5a6a78}
/* end of day */
.endsum{background:#fff;border:1px solid var(--line);border-radius:14px;padding:6px 14px;margin-bottom:14px}
.es-row{display:flex;justify-content:space-between;padding:9px 0;font-size:14px;color:var(--muted);border-bottom:1px solid var(--line)}
.es-row:last-child{border-bottom:none}.es-row b{color:var(--ink)}
.keyretwrap{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.keyret{display:flex;align-items:center;gap:11px;background:#FBE9E4;border:1px solid #E7B8AB;border-radius:12px;padding:11px 12px;cursor:pointer}
.keyret.done{background:#E7F3E7;border-color:#A9D3A9}
.keyret .cbx{width:22px;height:22px;border-radius:6px;border:2px solid #C8401F;display:flex;align-items:center;justify-content:center;font-weight:800;color:#C8401F;flex:0 0 auto}
.keyret.done .cbx{border-color:#3CA03C;color:#3CA03C}
.keyret .rt{flex:1;font-size:13.5px;color:var(--ink)}
.keyret .link{flex:0 0 auto;font-size:12px}
/* call-type route */
.calcroute{background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px;margin-bottom:14px}
.ctchip{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.06em;color:#fff;background:var(--orange);padding:4px 10px;border-radius:999px;margin-bottom:10px}
.fullw{width:100%;margin:0 0 7px}
/* key alert on a job */
.keyalert{background:#FBE9E4;border:1px solid #E7B8AB;border-radius:14px;padding:13px;margin-bottom:14px}
.ka-h{font-weight:800;color:#7a2d18;font-size:15px;margin-bottom:3px}
.ka-sub{font-size:13px;color:#9a5a45;margin-bottom:10px}
/* service-due card */
.svccard{background:#FBF1E6;border:1px solid #E6C79A;border-radius:14px;padding:13px;margin-bottom:12px}
.svc-h{font-weight:800;color:#8a5a1a;font-size:15px;margin-bottom:6px}
.svc-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid #EFD9B8}
.svc-row:first-of-type{border-top:none}
.svc-n{flex:1;font-size:14px;font-weight:600;color:var(--ink)}
.svc-s{font-size:12px;color:#9a7a4a;font-weight:500;margin-top:2px}
.svc-mute{flex:0 0 auto;border:1px solid #D8B888;background:#fff;color:#8a5a1a;border-radius:9px;padding:7px 14px;font-size:12.5px;font-weight:700;cursor:pointer}
.svc-foot{font-size:11.5px;color:#9a7a4a;margin-top:9px}
/* briefing peek + key flags */
.job.peek{border-color:var(--orange);background:#FFF6F1}
.job.demojob{border-color:#C0392B;background:#FDF2F0;border-left:4px solid #C0392B;padding-left:10px}
.jpeek{margin-top:7px;font-size:12.5px;color:var(--muted);line-height:1.45}
.jgear{margin-top:6px;background:#FFF3EA;border:1px solid #F2C9AF;border-radius:9px;padding:7px 10px;font-size:12.5px;color:var(--ink)}
.ni-key{font-size:12px}
/* job detail + timer + edit (v8) */
.jobcard{background:#fff;border:1px solid #E6E2DC;border-radius:14px;padding:14px;margin:4px 0 14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.jobcard .ctchip{margin-bottom:8px}
.jc-scope{font-size:15.5px;font-weight:600;color:var(--ink);line-height:1.42;margin:6px 0 8px}
.jc-meta{font-size:13.5px;color:var(--muted);margin-bottom:8px}
.jc-row{font-size:13.5px;color:var(--ink);padding:6px 0;border-top:1px solid #F0EDE7}
.timerbar{display:flex;align-items:center;justify-content:space-between;background:#10331f;color:#fff;border-radius:13px;padding:13px 16px;margin-bottom:10px}
.timerbar .tb-l{font-size:13px;opacity:.85;font-weight:600}
.timerbar .tb-clock{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:.02em}
.startbtn{font-size:17px}
.nextitem.editable{cursor:pointer}
.ni-edit{font-size:10.5px;color:var(--orange);font-weight:800;border:1px solid var(--orange);border-radius:6px;padding:1px 6px;margin-left:5px}
/* tool sign-out + end-of-day (v11) */
.toolcard{background:#fff;border:1px solid #E6E2DC;border-radius:14px;padding:14px;margin-bottom:14px}
.toolcard.lit{border-color:var(--orange);background:#FFF6F1}
.tc-h{font-weight:800;font-size:15px;color:var(--ink);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tc-tag{font-size:10.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#fff;background:var(--orange);padding:2px 8px;border-radius:999px}
.tc-opt{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.tc-sub{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.4}
.tseg{margin-bottom:16px}
.ts-h{font-weight:700;font-size:14.5px;color:var(--ink);margin-bottom:8px}
.ts-hint{font-weight:500;font-size:12px;color:var(--muted)}
.uchips{display:flex;flex-wrap:wrap;gap:8px}
.uchip{display:inline-flex;align-items:center;justify-content:center;min-width:48px;padding:10px 12px;border-radius:11px;border:1.5px solid #D8D2C8;background:#fff;font-weight:800;font-size:14px;color:var(--ink);cursor:pointer}
.uchip.sel{background:var(--green);border-color:var(--green);color:#fff}
.uchip.out{background:#F1EFEC;border-color:#E0DBD2;color:var(--muted);font-weight:600;font-size:11.5px;cursor:not-allowed}
.bitlab{font-size:11.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:9px 0 6px}
.bitrow{display:flex;flex-wrap:wrap;gap:7px}
.bchip{display:inline-block;padding:7px 12px;border-radius:999px;border:1.5px solid #D8D2C8;background:#fff;font-weight:600;font-size:13px;color:var(--ink);cursor:pointer}
.bchip.sel{background:var(--ink);border-color:var(--ink);color:#fff}
.stepper{display:flex;align-items:center;gap:14px}
.stepper button{width:46px;height:46px;border-radius:12px;border:1.5px solid #D8D2C8;background:#fff;font-size:24px;font-weight:700;color:var(--ink);cursor:pointer;line-height:1}
.stepper span{font-weight:800;font-size:16px;color:var(--ink);min-width:90px;text-align:center}
.stopcard.alldone{background:#E7F3E7;border-color:#A9D3A9;text-align:center}
.stopcard.alldone .sc-name{color:#2E7D32}
.clockwrap{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.clockrow{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fff;border:1px solid #E6E2DC;border-radius:12px;padding:11px 13px}
.clockrow.done{background:#E7F3E7;border-color:#A9D3A9}
.cl-i{display:flex;flex-direction:column}.cl-i b{font-size:14.5px;color:var(--ink)}.cl-i span{font-size:12px;color:var(--muted);margin-top:2px}
.cl-btn{flex:0 0 auto;border:none;background:var(--ink);color:#fff;border-radius:10px;padding:9px 15px;font-size:13px;font-weight:700;cursor:pointer}
.cl-out{flex:0 0 auto;font-size:13px;font-weight:700;color:#2E7D32}
.toolretwrap{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.toolret{display:flex;align-items:center;gap:11px;background:#fff;border:1px solid #E6E2DC;border-radius:12px;padding:11px 12px;cursor:pointer}
.toolret.bat{background:#FBE9E4;border-color:#E7B8AB}
.toolret .cbx{width:22px;height:22px;border-radius:6px;border:2px solid #9a958c;flex:0 0 auto}
.toolret.bat .cbx{border-color:#C8401F}
.toolret .rt{flex:1;font-size:13.5px;font-weight:600;color:var(--ink)}
.must{font-size:10.5px;font-weight:800;letter-spacing:.03em;text-transform:uppercase;color:#fff;background:var(--red);padding:2px 8px;border-radius:999px}
/* back through the morning checklist */
.backstep{border:none;background:none;color:var(--muted);font-weight:700;font-size:13.5px;cursor:pointer;padding:2px 0 6px;margin-top:-4px}
.backstep:active{color:var(--orange)}
/* v15: weigh link, end-of-day mandatory checklist, clock-in flag, flash */
.weighlink{width:100%;text-align:left;border:1.5px solid var(--orange);background:#FFF4EF;color:#C8401F;border-radius:12px;padding:13px 14px;font-weight:800;font-size:14px;cursor:pointer;margin:4px 0 16px;display:flex;flex-direction:column;gap:2px}
.weighlink span{font-weight:600;font-size:11.5px;color:var(--muted)}
.routelink{width:100%;text-align:left;border:1.5px solid var(--green);background:#EFF7EF;color:#2c7a32;border-radius:12px;padding:13px 14px;font-weight:800;font-size:14px;cursor:pointer;margin:4px 0 16px;display:flex;flex-direction:column;gap:2px}
.routelink span{font-weight:600;font-size:11.5px;color:var(--muted)}
.mgrnote{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px;font-size:15px;font-family:inherit;color:var(--ink);background:#fff;min-height:84px;resize:vertical;-webkit-appearance:none}
.mgrnote:focus{outline:none;border-color:var(--orange)}
.mgrnote-row{display:flex;align-items:center;gap:12px;margin:10px 0 4px}
.mgrnote-row .btn{width:auto;margin:0;padding:11px 18px;font-size:13px}
.mgrnote-saved{font-size:12px;color:var(--green);font-weight:700}
.eodwrap{display:flex;flex-direction:column;gap:9px;margin-bottom:16px}
.eodck{display:flex;align-items:center;gap:11px;border:1.5px solid var(--line);border-radius:12px;padding:12px 13px;cursor:pointer;background:#fff}
.eodck .cbx{width:24px;height:24px;border-radius:7px;border:2px solid var(--line);flex:none;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:14px;background:#fff}
.eodck.on{border-color:#3CA03C;background:#F1F9F1}
.eodck.on .cbx{background:#3CA03C;border-color:#3CA03C}
.eodck .ek{display:flex;flex-direction:column;gap:1px}
.eodck .ek b{font-size:14px}.eodck .ek span{font-size:11.5px;color:var(--muted)}
.lockmsg{font-size:12px;color:var(--muted);background:#F6F6F6;border-radius:10px;padding:10px 12px;margin-bottom:12px}
.cl-btn[disabled]{opacity:.38;pointer-events:none}
.cl-i .early{font-style:normal;color:#C8401F;font-weight:800}
.flash{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;gap:10px;background:#143C14;color:#CFEFCF;border-radius:12px;padding:11px 14px;margin-bottom:14px;font-weight:700;font-size:13px;cursor:pointer}
.flash b{font-size:18px;opacity:.7}
/* v16: bin weigh-in */
.winput{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:13px 14px;font-family:inherit;font-size:16px;color:#141414;background:#fff;box-sizing:border-box}
.axlerow{display:flex;gap:10px}.axlerow .axle{flex:1}
.axlerow label{display:block;font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:5px}
.wtotal{margin-top:14px;font-size:15px;font-weight:700}.wtotal b{color:#C8401F;font-size:20px}
/* v17: mid-day crew change */
.crewchg{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fff;border:1.5px solid var(--line);border-radius:11px;padding:11px 13px;margin:12px 0 0;font-family:inherit;cursor:pointer}
.crewchg .cc-n{font-weight:700;font-size:13.5px;text-align:left}
.crewchg .cc-go{font-weight:700;font-size:12.5px;color:var(--orange);flex:none}
.crewrow{display:flex;align-items:center;justify-content:space-between;gap:10px;border:1.5px solid var(--line);border-radius:11px;padding:11px 13px;margin-bottom:8px;background:#fff}
.crewrow.driver{border-color:#d8d8d8;background:#FAFAFA}
.crewrow b{font-size:14.5px}.crewrow span{display:block;font-size:11.5px;color:var(--muted);font-weight:600}
.rmbtn{flex:none;border:1.5px solid var(--line);background:#fff;color:#C8401F;border-radius:9px;padding:8px 12px;font-family:inherit;font-weight:700;font-size:12.5px;cursor:pointer}
.crewwrap{margin-bottom:4px}
/* v19: empty weigh-in sheet */
.tarelist{display:flex;flex-direction:column;gap:7px}
.tarerow{display:flex;align-items:center;justify-content:space-between;border:1.5px solid var(--line);border-radius:10px;padding:10px 13px;background:#fff}
.tarerow b{font-size:14px}.tarerow span{font-size:12px;color:var(--muted);font-weight:600}
/* v20: self-fill tool lines */
.cline{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.cline input{flex:1;padding:11px 12px;border:1.5px solid #d8d8d8;border-radius:9px;font-size:14px;font-family:inherit;background:#fff}
.cline .rm{flex:none;width:40px;height:40px;border-radius:9px;border:1.5px solid #d8d8d8;background:#fff;font-size:15px;cursor:pointer;color:#888}
.addbtn{width:100%;border:1.5px dashed #bbb;background:#fff;border-radius:10px;padding:11px;font-size:13.5px;font-weight:600;cursor:pointer;margin-top:2px}
/* v21: run-bin field */
.binrun .req{color:#C8401F;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-left:6px}
.binrun .winput{margin-top:9px}
.binflag{display:inline-block;font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px;margin-left:6px;vertical-align:middle;text-transform:uppercase;letter-spacing:.04em;color:#fff}
.binflag.drop{background:#2e7d32}
.binflag.swap{background:#1565c0}
.binflag.pickup{background:#c0431a}
/* ---- Desktop / tablet responsive (phone layout above is the base) ---- */
@media (min-width:768px){
  .wrap{max-width:900px}
}
</style>
</head>

function lsGet(k){try{var r=localStorage.getItem(k);return r?JSON.parse(r):null;}catch(e){return null;}}

  if(stored&&typeof stored==="object"){const out={};Object.keys(stored).forEach(k=>{out[k]={mgr:stored[k].mgr||"",grease:(TRUCKS[k]&&TRUCKS[k].grease)||{due:false,last:"\u2014"}};});return out;}
  return TRUCKS;})();

function cklClockout(crew){ var c=cklChecklists(); var a=c&&c.clockout&&Array.isArray(c.clockout[crew])?c.clockout[crew]:null; return (a&&a.length)?a:_CKL_CO_HAND_DEF; }

  const stored=lsGet("ij_toolkit_v1");return (Array.isArray(stored)&&stored.length)?stored:d;})();

const MAINT={
 "3":{odoDue:false,lastKm:148200,lastDate:"Jun 9",oilEveryKm:8000,lastOilKm:144000},
 "4":{odoDue:false,lastKm:131050,lastDate:"Jun 8",oilEveryKm:8000,lastOilKm:128500},
 "5":{odoDue:false,lastKm:99800, lastDate:"Jun 7",oilEveryKm:8000,lastOilKm:96000},

};
/* Service schedule — intervals are managed in the Manager Hub (shared store), seeded so this works standalone */
function maintItems(){const s=lsGet("ij_maint_v1");
  if(Array.isArray(s)&&s.length)return s;
  return [
    {id:"oil",   name:"Oil change",              by:"km",   interval:8000},
    {id:"ff1",   name:"Fuel filter (primary)",   by:"km",   interval:30000},
    {id:"ff2",   name:"Fuel filter (secondary)", by:"km",   interval:30000},
    {id:"air",   name:"Air filter",              by:"km",   interval:24000},
    {id:"grease",name:"Greasing",                by:"time", interval:14}
  ];
}
function daysAgo(n){const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().slice(0,10);}
/* per-truck last-done (the maintenance person's record) */
const SERVICE={
 "3":{oil:144000,ff1:120000,ff2:120000,air:135000,grease:daysAgo(6)},
 "4":{oil:127500,ff1:110000,ff2:110000,air:120000,grease:daysAgo(5)},
 "5":{oil:95000, ff1:80000, ff2:80000, air:90000, grease:daysAgo(7)},
 "6":{oil:143900,ff1:124000,ff2:124000,air:130000,grease:daysAgo(16)},
 "7":{oil:112000,ff1:95000, ff2:95000, air:94000, grease:daysAgo(9)},
 "12":{oil:84000, ff1:70000, ff2:70000, air:80000, grease:daysAgo(4)}
};
function dueItems(truck,odo){const rec=SERVICE[truck]||{};const out=[];
  maintItems().forEach(it=>{const last=rec[it.id];
    if(it.by==="km"){ if(typeof last==="number"&&typeof odo==="number"&&odo>0){const since=odo-last; if(since>=it.interval)out.push(Object.assign({},it,{over:since-it.interval,since}));} }
    else{ if(last){const days=Math.floor((Date.now()-new Date(last).getTime())/86400000); if(days>=it.interval)out.push(Object.assign({},it,{sinceDays:days}));} }
  });
  return out;
}
function serviceCard(){
  const odo=(typeof S.odo==="number")?S.odo:((MAINT[S.truck]&&MAINT[S.truck].lastKm)||0);
  const due=dueItems(S.truck,odo).filter(it=>!(S.maintMuted||[]).includes(it.id));
  if(!due.length)return "";
  return `<div class="svccard"><div class="svc-h">🔧 Service due — Truck #${S.truck}</div>
    ${due.map(it=>`<div class="svc-row"><div class="svc-n">${esc(it.name)}<div class="svc-s">${it.by==="km"?(it.over.toLocaleString()+" km over · every "+it.interval.toLocaleString()+" km"):(it.sinceDays+" days since · every "+it.interval+" days")}</div></div>
      <button class="svc-mute" onclick="muteMaint('${it.id}')">Mute</button></div>`).join("")}
    <div class="svc-foot">Also showing in the manager's hub — he schedules the work and sets reminders. Mute clears it from your screen only.</div></div>`;
}
window.muteMaint=id=>{S.maintMuted=S.maintMuted||[];if(!S.maintMuted.includes(id))S.maintMuted.push(id);render();};

function recordEmpty(bin,f,r){
  bin=(bin||"").trim().toUpperCase();const ff=parseFloat(f)||0,rr=parseFloat(r)||0,tt=ff+rr;
  if(!bin||tt<=0)return 0;
  const sh=tareSheet(),key=S.truck+"|"+bin,rec=sh[key],today=new Date().toISOString().slice(0,10);
  if(!rec){sh[key]={truck:String(S.truck),bin,light:tt,lightF:String(ff),lightR:String(rr),last:tt,lastF:String(ff),lastR:String(rr),when:today,who:S.mgr,count:1};}
  else{rec.count=(rec.count||1)+1;rec.last=tt;rec.lastF=String(ff);rec.lastR=String(rr);rec.when=today;rec.who=S.mgr;if(tt<rec.light){rec.light=tt;rec.lightF=String(ff);rec.lightR=String(rr);}}

function stampDoneOnTruck(crew){
  const log=lsGetTH("ij_clock_log")||[];const iso=new Date().toISOString().slice(0,10);const dt=nowLabel();
  crew.forEach(name=>{
    let e=null;for(let i=log.length-1;i>=0;i--){const x=log[i];if(x&&x.name===name&&String(x.at).slice(0,10)===iso){e=x;break;}}
    if(e&&e.outTime)return;
    if(!e){const ci=(S.day.clockIn&&S.day.clockIn[name])||{};e={name,truck:S.truck,inTime:ci.t||"7:30am",early:!!ci.early,outTime:null,at:new Date().toISOString()};log.push(e);}

}

window.signoutConfirm=()=>{

    if(it.type==="numbered"||it.type==="kit"){
      const sel=it.type==="kit"?((t[it.id]&&t[it.id].units)||[]):(t[it.id]||[]);
      it.units.forEach(u=>{ if(sel.includes(u.n)){ if(!u.out||u.out.truck===S.truck)u.out={truck:S.truck,crew,at}; }

      if(it.type==="kit"){const bits=(t[it.id]&&t[it.id].bits)||[];if(bits.length)summary.push(it.name+" bits: "+bits.join(", "));}
    } else {
      const q=t[it.id]||0, prev=(S.day.toolTaken[it.id]||0), delta=q-prev;

window.wsSet=(k,v)=>{const w=S.day.weighForm;w[k]=v;const tot=(parseFloat(w.f)||0)+(parseFloat(w.r)||0);const t=document.getElementById("wsTot");if(t)t.textContent=tot>0?tot+" kg":"\u2014";const g=document.getElementById("wsGo");if(g)g.disabled=!(tot>0);};
window.saveWeighStart=()=>{const w=S.day.weighForm;const tt=recordEmpty(S.runBin,w.f,w.r);if(!tt)return;S.day.weighDone=true;S.day.flash="Empty logged \u2014 "+(S.runBin||"").trim().toUpperCase()+" = "+tt+" kg \u00b7 on the weight sheet";S.day.screen="route";render();};
window.emptySet=(k,v)=>{const w=S.day.emptyForm;w[k]=v;const tot=(parseFloat(w.f)||0)+(parseFloat(w.r)||0);const t=document.getElementById("eTot");if(t)t.textContent=tot>0?tot+" kg":"\u2014";const g=document.getElementById("eGo");if(g)g.disabled=!(w.code.trim()&&tot>0);};
window.saveEmptyWeigh=()=>{const w=S.day.emptyForm;const bin=(w.code||"").trim().toUpperCase();const fr=parseFloat(w.f)||0,rr=parseFloat(w.r)||0,tt=fr+rr;if(!bin||tt<=0)return;
  const sh=tareSheet();const key=S.truck+"|"+bin;const rec=sh[key];const today=new Date().toISOString().slice(0,10);
  if(!rec){sh[key]={truck:String(S.truck),bin,light:tt,lightF:String(fr),lightR:String(rr),last:tt,lastF:String(fr),lastR:String(rr),when:today,who:S.mgr,count:1};}
  else{rec.count=(rec.count||1)+1;rec.last=tt;rec.lastF=String(fr);rec.lastR=String(rr);rec.when=today;rec.who=S.mgr;if(tt<rec.light){rec.light=tt;rec.lightF=String(fr);rec.lightR=String(rr);}}
  lsSetTH("ij_tares_v1",sh);
  S.day.flash="Empty logged \u2014 #"+S.truck+" + "+bin+" = "+tt+" kg \u00b7 added to the weight sheet";
  S.day.emptyForm={code:"",f:"",r:""};render();};
window.peekJob=k=>{S.day.peek=(S.day.peek===k?null:k);render();};

/* --- load meter + swap/metal banners --- */
function junkLoad(d){return Math.max(0,(d.loadTotal||0)-(d.metalTotal||0));}
function meterHTML(){
  const d=S.day, jk=junkLoad(d), j=Math.min(100,jk), mt=Math.min(100-j,d.metalTotal);
  return `<div class="meter">
    <div class="meter-head"><span>On board <b>${pct(d.loadTotal)}</b></span><span class="mm">junk ${pct(jk)} · metal ${pct(d.metalTotal)}</span></div>
    <div class="meter-bar"><div class="meter-fill" style="width:${j}%"></div><div class="meter-metal" style="left:${j}%;width:${mt}%"></div><div class="swapmark" style="left:${SWAP_AT}%"></div></div>
    <div class="meter-sub">Green is junk, gold is droppable metal · ${SWAP_AT}% junk is swap territory · manager watches this live</div>
  </div>
  ${d.swapAlerted?`<div class="alert-banner"><b>Junk's getting full (${pct(jk)}).</b> Drop any metal first — if you still need a swap, call the manager and sort out a meet. They can see your load live too.</div>`:""}`;
}

/* --- guided route: current stop big, rest glanceable --- */
function demoBannerHTML(){return '<div class="demobanner"><div class="db-h">&#128296; DEMOLITION JOB</div><div class="db-sub">One-off job &mdash; read the notes below carefully before you start.</div></div>';}
function rRoute(){
  const d=S.day, s=curStop();
  const remaining=d.stops.filter((x,k)=>k>d.i&&x.status==="todo");
  const nextName=remaining.length?remaining[0].name:null;
  const allDone=d.stops.every(x=>x.status==="done");
  let card;
  if(allDone){
    card=`<div class="stopcard alldone">
      <div class="sc-name">All stops done ✓</div>
      <div class="sc-scope">${d.stops.length} stops · ${d.detours.length} depot drops · load ${pct(d.loadTotal)}</div>
      <button class="btn go fullw" style="margin-top:12px" onclick="returnHQ()">Done! Returning to HQ →</button>
      <div class="amut">Sends the manager a heads-up that you are on the way back.</div></div>`;
  } else if(s.booked){
    card=`<div class="stopcard">
      <div class="sc-top"><div class="sc-time">${s.time?esc(s.time):"no set time"}</div><div class="sc-pos">Stop ${d.i+1} of ${d.stops.length}</div></div>
      <div class="sc-name">${esc(s.name)}${s.demo?' <span class="demoflag">DEMO</span>':''}</div>
      ${s.demo?demoBannerHTML():''}
      <div class="sc-area">${esc(s.area)} · ${esc(s.address)}</div>
      <div class="sc-scope">${esc(s.scope)}</div>
      ${s.keys?`<div class="keybadge ${s.keys.from==="office"?"office":"site"}">🔑 ${s.keys.from==="office"?"Bring office keys":"Pick up keys on site"} — ${esc(s.keys.where||"")}</div>`:""}
      ${s.tools.length?`<div class="sc-tools">Tools: ${s.tools.map(esc).join(", ")}</div>`:""}
      <div class="sc-actions">
        ${!owOn()?'':(s.texted?'<button class="btn ghost" disabled style="opacity:.55">✓ on our way sent</button>':'<button class="btn ghost" onclick="onMyWay()">On our way →</button>')}
        <button class="btn go" onclick="openJob()">Work this stop</button>
      </div></div>`;
  }else{
    card=`<div class="stopcard note">
      <div class="sc-top"><div class="sc-time">${s.time?esc(s.time):"no set time"}</div><div class="sc-pos">Stop ${d.i+1} of ${d.stops.length}</div></div>
      <div class="sc-name">${esc(s.name)} <span class="noteflag">manager note</span></div>
      <div class="sc-area">${esc(s.area)} · ${esc(s.address)}</div>
      <div class="sc-scope">${esc(s.scope)}</div>
      <div class="sc-actions"><button class="btn go" onclick="openJob()">Add notes &amp; mark done</button></div></div>`;
  }
  const list=d.stops.map((x,k)=>{
    const st=x.status==="done"?"done":(k===d.i?"now":"todo");
    const done=x.status==="done";
    return `<div class="nextitem ${st}${done?' editable':''}" ${done?`onclick="editJob(${k})"`:''}><span class="ni-dot">${st==="done"?"✓":(st==="now"?"●":k+1)}</span>
      <span class="ni-time">${x.time?esc(x.time):"—"}</span>
      <span class="ni-name">${esc(x.name)}${x.demo?' <span class="ni-demo">DEMO</span>':''}${x.keys?' <span class="ni-key">🔑</span>':''}${done?' <span class="ni-edit">edit</span>':''}</span></div>`;
  }).join("");
  return `<h1>On the <span class="o">route</span></h1>
  ${meterHTML()}
  ${card}
  <div class="sh">The whole day</div>
  <div class="nextlist">${list}</div>
  <button class="crewchg" onclick="openCrewChange()"><span class="cc-n">\ud83d\udc77 ${esc([S.mgr,...S.crew].join(", "))}</span><span class="cc-go">Crew change \u203a</span></button>
  <div class="detourlist">${d.detours.map(t=>`<div class="nextitem detour"><span class="ni-dot">↻</span><span class="ni-name">${esc(t.depot.name.split(" — ")[0])} — ${esc(t.material)} dropped</span></div>`).join("")}</div>
  <div class="footer-rec">Live to the Management Hub · Truck #${S.truck} · load ${pct(d.loadTotal)} · ${esc([S.mgr,...S.crew].join(", "))}</div>`;
}
var OW_DEF="Hi {name}, your Island Junk crew is on the way{site} — we might stop at the recycle depot to make room, but we'll be there soon. See you!";
function owTmpl(){ try{ var c=JSON.parse(localStorage.getItem('ij_owner_cfg_v1')||'{}'); var v=(c&&c.victoria&&c.victoria.templates)?c.victoria.templates.enroute:null; return (typeof v==='string'&&v)?v:OW_DEF; }catch(e){ return OW_DEF; } }
function owOn(){ try{ var c=JSON.parse(localStorage.getItem('ij_owner_cfg_v1')||'{}'); if(c&&c.victoria&&c.victoria.msgOn&&c.victoria.msgOn.enroute===false) return false; }catch(e){} return true; }
function fillOw(t,data){ t=String(t||''); for(var k in data){ t=t.split('{'+k+'}').join(data[k]); } return t; }
function owName(s){ if(!s)return 'there'; if(s.type==='commercial')return (s.contact||s.name||'there'); return ((s.name||'').trim().split(' ')[0])||'there'; }
function owText(s){ var site=(s.type==='commercial'&&s.address)?(' to '+String(s.address).split(',')[0]):''; return fillOw(owTmpl(),{name:owName(s),site:site,eta:'',address:(s.address?String(s.address).split(',')[0]:'')}); }
function owPrompt(s){ if(!s||!s.booked)return; var msg=owText(s); if(confirm("Send “on our way” to "+owName(s)+"?\n\n"+msg)){ s.texted=true; render(); } }
window.onMyWay=()=>{ if(!owOn())return; var s=curStop(); if(s&&s.booked){ S.day.owAsk=S.day.i; render(); } };
function owOverlay(){ var d=S.day; if(d.owAsk==null) return ''; var s=d.stops[d.owAsk]; if(!s) return ''; var msg=owText(s); var addr=s.address?(' · '+esc(String(s.address))):''; return '<div style="position:fixed;inset:0;background:rgba(20,20,20,.55);display:flex;align-items:center;justify-content:center;padding:20px;z-index:200" onclick="if(event.target===this)owDismiss()"><div style="background:#fff;border-radius:16px;padding:18px;max-width:380px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.3)"><div style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#c5460f;font-weight:800">Text the next stop</div><div style="font-weight:800;font-size:16px;margin:3px 0 9px;color:#141414">'+esc(owName(s))+addr+'</div><div style="background:#F4F3F1;border-radius:10px;padding:11px;font-size:13px;line-height:1.5;color:#222;white-space:pre-wrap">'+esc(msg)+'</div><button style="margin-top:13px;width:100%;background:#3CA03C;color:#fff;border:none;border-radius:12px;font-weight:800;font-size:15px;padding:14px;cursor:pointer" onclick="owSend()">Send “on our way”</button><button style="margin-top:8px;width:100%;background:#fff;color:#444;border:1.5px solid #ddd;border-radius:12px;font-weight:700;font-size:14px;padding:11px;cursor:pointer" onclick="owDismiss()">Not now</button></div></div>'; }
window.owSend=()=>{ var d=S.day; if(d.owAsk!=null&&d.stops[d.owAsk]){ d.stops[d.owAsk].texted=true; } d.owAsk=null; render(); };
window.owDismiss=()=>{ S.day.owAsk=null; render(); };
window.openJob=()=>{S.day.form={load:null,metal:0,keyMin:"",notes:""};S.day.screen="job";render();};

/* --- working a stop: load %, metal %, key time, notes --- */
/* route a stop to the right tool by call type */
function callType(s){
  if(s.type==="residential")return{lab:"RESIDENTIAL · COLLECT",btn:"Open collect calculator",file:"CREW-residential-calculator-v25.html",hasMetal:true};
  if(s.type==="commercial") return{lab:"COMMERCIAL · INVOICE",btn:"Open commercial / invoice form",file:"CREW-commercial-form-v22.html",hasMetal:true};
  if(s.type==="pallet")     return{lab:"PALLET",btn:"Open pallet calculator",file:"island-junk-pallet-flow-v8.html",hasMetal:false};
  return{lab:"JOB",btn:"",file:"",hasMetal:true};
}
window.openCalc=(file,demo)=>{ if(!file)return; const url=file+(file.indexOf("?")>=0?"&":"?")+(demo?"demo=1":"start=1"); try{window.open(url,"_blank");}catch(e){ alert("Opens "+file+" in the app."); } };

function rJob(){
  const s=curStop(),f=S.day.form;
  if(!s.booked){
    return `<h1>${esc(s.name)}</h1>
    <p class="lead">${esc(s.scope)} — ${esc(s.address)}</p>
    <div class="seg"><div class="sh">Notes for the office <span class="amut">read at invoicing</span></div>
      <textarea id="jnotes" class="bigta" placeholder="What you grabbed, who you saw, anything Wes should know…">${esc(f.notes)}</textarea></div>
    <div class="cta2"><button class="btn ghost" onclick="backRoute()">Back</button>
      <button class="btn go" onclick="finishStop()">Mark done</button></div>`;
  }
  const ct=callType(s);
  const detail=`<div class="jobcard">
    <span class="ctchip">${ct.lab}</span>${s.demo?' <span class="demoflag">DEMO</span>':''}
    <div class="jc-scope">${esc(s.scope)}</div>
    <div class="jc-meta"><b>${esc(s.area)}</b> · ${esc(s.address)}</div>
    ${s.time?`<div class="jc-row">🕑 Booked ${esc(s.time)}</div>`:""}
    ${s.tools.length?`<div class="jc-row">🧰 Yard kit: ${s.tools.map(esc).join(", ")}</div>`:""}
    <div class="jc-row">👷 ${esc([S.mgr,...S.crew].join(", "))}</div>
  </div>`;
  const keyCard=s.keys?`<div class="keyalert"><div class="ka-h">🔑 Key needed for this job</div>
    <div class="ka-sub">${esc(s.keys.where||"")} — ${s.keys.from==="office"?"you brought these from the office":"pick up on site"}</div>
    <input type="text" inputmode="numeric" id="jkey" class="rowin2" placeholder="Minutes to pick up / drop off — Wes decides billing" value="${esc(f.keyMin)}"></div>`:"";
  const action = ct.file
    ? `<button class="btn go fullw startbtn" onclick="openCalc('${ct.file}',${s.demo?1:0})">Start job →</button>
       <div class="amut">Opens the ${esc(ct.lab.split(" ·")[0].toLowerCase())} form — the on-site timer lives there. Hit Start the moment you're working; price and collect at the end.</div>`

    <textarea id="jnotes" class="bigta" placeholder="Anything for the office / invoicing…">${esc(f.notes)}</textarea></div>
  <div class="cta2"><button class="btn ghost" onclick="backRoute()">Back</button>
    <button class="btn go" onclick="finishStop()">Done with this job</button></div>`;
}
window.backRoute=()=>{S.day.screen="route";render();};
window.returnHQ=()=>{const log=lsGetTH("ij_hq_alerts")||[];log.push({truck:S.truck,crew:[S.mgr,...S.crew].filter(Boolean).join(", "),stops:S.day.stops.filter(x=>x.status==="done").length,at:new Date().toISOString()});lsSetTH("ij_hq_alerts",log);S.day.screen="end";render();};

function rEditJob(k){

  <div class="jobcard"><span class="ctchip">${esc(ct.lab)}</span>

window.saveEdit=(k)=>{
  const s=S.day.stops[k]; const dn=s.done||(s.done={}); const edits=[];
  const nk=document.getElementById("edKey");
  if(nk){const v=nk.value; if(v!==(dn.keyMin||"")){edits.push(["Key time",dn.keyMin,v]);dn.keyMin=v;}}
  const nn=document.getElementById("edNotes");
  if(nn){const v=nn.value; if(v!==(dn.notes||"")){edits.push(["Notes",dn.notes,v]);dn.notes=v;}}
  if(edits.length)logJobEdits(s,edits);
  S.day.screen="route"; render();
};
function logJobEdits(s,edits){
  let log=[]; try{log=JSON.parse(localStorage.getItem("ij_job_edits_v1")||"[]");}catch(e){}
  const at=new Date().toISOString();
  edits.forEach(e=>log.push({job:s.name,truck:String(S.truck),crew:[S.mgr,...S.crew].join(", "),field:e[0],from:(e[1]==null||e[1]==="")?"—":String(e[1]),to:(e[2]==null||e[2]==="")?"—":String(e[2]),at}));
  try{localStorage.setItem("ij_job_edits_v1",JSON.stringify(log));}catch(e){}
}
window.setLoad=v=>{S.day.form.load=v;render();};
window.setMetal=v=>{S.day.form.metal=v;render();};

window.finishStop=()=>{
  const d=S.day,s=curStop(),f=d.form;
  const jn=document.getElementById("jnotes");if(jn)f.notes=jn.value;
  const jk=document.getElementById("jkey");if(jk)f.keyMin=jk.value;
  s.status="done";
  s.done={keyMin:f.keyMin||"",notes:f.notes||""};
  if(s.booked){
    if(s.keys&&s.keys.from==="office")d.keyReturns.push({name:s.name,where:s.keys.where});
    d.screen="after";
  } else { advance(); }
  render();
};
function advance(){const d=S.day;const ni=nextTodoIndex(d.i+1);if(ni===-1){d.screen="route";d.allDone=true;}else{d.i=ni;d.screen="route";var ns=d.stops[ni];if(ns&&ns.booked&&!ns.texted){d.owAsk=ni;}}}
window.toNext=()=>{advance();render();};

/* --- after each job: how full now / how much metal now, then dump --- */
function rAfter(){
  const d=S.day, reg=region((d.stops[nextTodoIndex(d.i+1)]||curStop()).area);
  const LOADTOT=[0,12.5,25,33,50,67,75,87.5,100];
  const loadChips=LOADTOT.map(v=>`<button class="fchip ${d.loadTotal===v?"on":""}" onclick="setTotalLoad(${v})">${v?fracLbl(v):"empty"}</button>`).join("");
  const metalChips=METALF.map(v=>`<button class="fchip ${d.metalTotal===v?"on":""}" onclick="setTotalMetal(${v})">${v?v+"%":"none"}</button>`).join("");
  const metalOn=d.metalTotal>=METAL_AT, md=DEPOTS.metal[reg]||[];
  const dump=`<div class="dumpoffer ${metalOn?"hot":""}">
    <div class="do-head">${metalOn?"🔩 Worth dropping metal":"Metal on board"} — <b>${pct(d.metalTotal)}</b></div>
    <div class="amut">${metalOn?"It's eating loading room. Drop it before the next job?":"Under "+METAL_AT+"% — usually not worth the trip yet."}</div>
    ${metalOn?md.map((p,i)=>`<button class="depotbtn" onclick="goDepot('metal',${i},'${reg}')"><b>${esc(p.name)}</b><span>${esc(p.addr)}</span></button>`).join(""):`<button class="link" onclick="forceDump('metal','${reg}')">Need the room — dump metal anyway</button>`}
  </div>`;
  return `<h1>Truck check <span class="o">before the next stop</span></h1>
  ${d.swapAlerted?`<div class="alert-banner"><b>Junk's getting full.</b> Drop any metal first — if you still need a swap, call the manager and set a meet. They can see your load live too.</div>`:""}
  <div class="seg"><div class="sh">How full is your truck now? <span class="amut">whole-truck read · of a 20-yd</span></div>
    <div class="chiprow">${loadChips}</div></div>
  <div class="seg"><div class="sh">How much metal on board now? <span class="amut">total · of a 20-yd</span></div>
    <div class="chiprow">${metalChips}</div></div>
  ${dump}
  <div class="dumpoffer small"><div class="do-head">E-waste / paints <span class="amut">usually minimal</span></div>
    <div class="minor-row"><button class="link" onclick="forceDump('ewaste','${reg}')">Drop e-waste (TVs / batteries)</button>
      <button class="link" onclick="forceDump('paints','${reg}')">Drop paints / chems</button></div></div>
  <div class="cta"><button class="btn go" onclick="toNext()">On to the next stop</button></div>`;
}
window.setTotalLoad=v=>{const d=S.day;d.loadTotal=v;d.swapAlerted=(junkLoad(d)>=SWAP_AT);render();};
window.setTotalMetal=v=>{const d=S.day;d.metalTotal=v;d.swapAlerted=(junkLoad(d)>=SWAP_AT);render();};

window.goDepot=(material,idx,reg)=>{const list=DEPOTS[material][reg]||[];S.day.pend={material,depot:list[idx],reg,after:null};S.day.screen="depot";render();};
window.forceDump=(material,reg)=>{const list=DEPOTS[material][reg]||[];if(!list.length)return;S.day.pend={material,depot:list[0],reg,after:null};S.day.screen="depot";render();};

/* --- at the depot: how full now? --- */
function rDepot(){
  const p=S.day.pend,mat=p.material;
  const chips=[0,12.5,25,33,50,67,75].map(v=>`<button class="fchip ${p.after===v?"on":""}" onclick="setAfter(${v})">${v?fracLbl(v):"empty"}</button>`).join("");
  const label=mat==="metal"?"metal":(mat==="ewaste"?"e-waste":"paints");
  return `<h1>At the <span class="o">depot</span></h1>
  <div class="depotcard"><div class="dc-name">${esc(p.depot.name)}</div><div class="dc-addr">${esc(p.depot.addr)}</div>
    ${p.depot.refund===true?`<div class="dc-tag refund">Refund — goes on our account</div>`:(p.depot.refund===false?`<div class="dc-tag free">Free drop — no refund</div>`:"")}</div>
  <p class="lead">Dropped the ${label}. <b>How full is the truck now?</b> Re-read the whole load.</p>
  <div class="chiprow">${chips}</div>
  <div class="cta2"><button class="btn ghost" onclick="cancelDepot()">Didn't go</button>
    <button class="btn go" ${p.after===null?"disabled":""} onclick="confirmDepot()">Update load</button></div>`;
}
window.setAfter=v=>{S.day.pend.after=v;render();};
window.cancelDepot=()=>{S.day.pend=null;S.day.screen="after";render();};
window.confirmDepot=()=>{const d=S.day,p=d.pend;if(p.after===null)return;
  d.loadTotal=p.after;
  if(p.material==="metal")d.metalTotal=0;
  d.swapAlerted=(junkLoad(d)>=SWAP_AT);
  d.detours.push({material:p.material,depot:p.depot,when:Date.now()});
  d.pend=null;d.screen="after";render();};

/* --- end of day: recap + return keys --- */
function rEnd(){
  const d=S.day;
  const done=d.stops.filter(s=>s.status==="done").length;
  const driver=S.mgr;
  const swampers=S.crew.filter(Boolean);
  const reg=toolRegister();
  const outUnits=[]; reg.items.forEach(it=>{if(it.units)it.units.forEach(u=>{if(u.out&&u.out.truck===S.truck)outUnits.push({it,n:u.n});});});
  const batOut=outUnits.some(x=>x.it.id==="battery");
  const toolsBack=outUnits.length===0;
  const keysBack=d.keyReturns.every(k=>k.returned);
  const e=d.eod;
  const ready=eodReady();

  const inLine=(name)=>{const ci=(d.clockIn&&d.clockIn[name])||{};return `in ${esc(ci.t||"7:30am")}${ci.early?' <i class="early">early \u26a0</i>':''}`;};
  const swRow=(name)=>{const out=d.clockOut[name];return `<div class="clockrow ${out?'done':''}"><div class="cl-i"><b>${esc(name)}</b><span>Swamper \u00b7 ${inLine(name)}</span></div>
      ${out?`<span class="cl-out">out ${esc(out)}</span>`:`<button class="cl-btn" onclick="clockOut('${esc(name)}')">Clock out</button>`}</div>`;};
  const swampSection=swampers.length?`
  <div class="sh">\u23f1 Clock out helpers <span class="amut">whenever they're done \u2014 before the close-out</span></div>
  <div class="clockwrap">${swampers.map(swRow).join("")}</div>
  ${(swampers.filter(n=>!d.clockOut[n]).length>1)?`<button class="btn ghost fullw" style="margin-bottom:14px" onclick="clockSwampersOut()">Clock all helpers out</button>`:""}`:"";

  const ck=(on,icon,label,sub,act)=>`<div class="eodck ${on?'on':''}" ${act?`onclick="${act}"`:''}>
    <div class="cbx">${on?"\u2713":""}</div><div class="ek"><b>${icon} ${esc(label)}</b><span>${esc(sub)}</span></div></div>`;
  const checklist=
    cklClockout(isHandloadTruck()?"hand":"bin").map(function(it){return ck(!!e[it.id],"",it.t,it.d,"eodToggle('"+it.id+"')");}).join("")+
    ck(toolsBack,"\ud83d\udd27","Tools & batteries back in",toolsBack?"All numbered gear returned":"Return numbered gear below"+(batOut?" \u00b7 batteries still out":""),"")+
    ck(keysBack,"\ud83d\udd11","Keys returned",keysBack?"Office keys handed back":"Hand office keys back below","");

  const toolRet=outUnits.length?outUnits.map(x=>{const isBat=x.it.id==="battery";
    return `<div class="toolret ${isBat?'bat':''}" onclick="returnTool('${x.it.id}',${x.n})"><div class="cbx"></div>
      <div class="rt">${esc(x.it.name)} #${x.n}${isBat?' \u00b7 battery':''}</div></div>`;}).join(""):`<div class="smallnote" style="text-align:left">All numbered gear returned \u2713</div>`;
  const keyret=d.keyReturns.length?d.keyReturns.map((k,i)=>`<div class="keyret ${k.returned?"done":""}" onclick="toggleKeyRet(${i})">
      <div class="cbx">${k.returned?"\u2713":""}</div><div class="rt"><b>Return keys to office</b> \u2014 ${esc(k.name)}${k.stayed?" \u00b7 stayed with property":""}</div>
      <button class="link" onclick="event.stopPropagation();keyStayed(${i})">stayed w/ property</button></div>`).join(""):`<div class="smallnote" style="text-align:left">No office keys to return.</div>`;

  const finishSection=`
  <div class="sh">\u2705 Finish on the truck ${ready?'':'<span class="amut">complete the checklist first</span>'}</div>
  ${ready
    ? `<div class="lockmsg" style="border-color:rgba(60,160,60,.45)">Checklist done. Head to the Clock Out screen \u2014 you'll clock <b>yourself</b> out there, and be asked about your <b>crew</b> (in case anyone jumped to another truck). Clock helpers who left early up top.</div>
       <div class="cta"><button class="btn go" onclick="finishToClockOut()">\u2713 Done on the truck \u2014 clock out \u00bb</button></div>`
    : `<div class="lockmsg">Once fuel/DEF, receipts, tablet+POS, tools and keys are all done, you'll head to the Clock Out screen to clock out. You can clock your helpers out any time up top.</div>`}`;

  return `<h1>Back at <span class="o">HQ</span></h1>
  <div class="endsum">
    <div class="es-row"><span>Stops done</span><b>${done} of ${d.stops.length}</b></div>
    <div class="es-row"><span>Depot drops</span><b>${d.detours.length}</b></div>
    <div class="es-row"><span>Truck load now</span><b>${pct(d.loadTotal)}</b></div>
  </div>
  <button class="routelink" onclick="goToRoute()">&#128666; Back to today's route<span>Pop back out to the board mid-day \u2014 your stops &amp; load are all there &#8594;</span></button>
  <button class="weighlink" onclick="openWeighBin()">\u2696\ufe0f Weigh a bin you've still got<span>Logs the full weight to the yard \u2014 they'll see it's done, no re-weigh \u2192</span></button>
  ${swampSection}
  ${serviceCard()}
  <div class="sh">\u2705 Before you clock out <span class="must">all required</span></div>
  <div class="eodwrap">${checklist}</div>
  <div class="sh">\ud83d\udd27 Return tools ${batOut?'<span class="must">batteries must come back</span>':''}</div>
  <div class="toolretwrap">${toolRet}</div>
  ${outUnits.length>1?`<button class="btn ghost fullw" style="margin-bottom:14px" onclick="returnAllTools()">Return all numbered gear</button>`:""}
  <div class="sh">\ud83d\udd11 Return keys</div>
  <div class="keyretwrap">${keyret}</div>
  <div class="sh">&#128221; Notes for the manager <span class="amut">optional \u2014 anything the office should know</span></div>
  <textarea class="mgrnote" id="mgrNoteTa" oninput="onMgrNote(this.value)" placeholder="Problems, follow-ups, customer messages, damage \u2014 anything the office needs to know\u2026">${esc(d.mgrNote||"")}</textarea>
  <div class="mgrnote-row"><button class="btn ghost" onclick="saveMgrNote()">Save for the manager</button><span class="mgrnote-saved" id="mgrNoteSaved"></span></div>
  ${finishSection}
  <div class="footer-rec">End-of-day logged to the Management Hub \u00b7 Truck #${S.truck} \u00b7 ${done}/${d.stops.length} stops \u00b7 ${d.detours.length} depot drops</div>`;
}
function eodReady(){const d=S.day;if(!d)return false;const reg=toolRegister();let tb=true;reg.items.forEach(it=>{if(it.units)it.units.forEach(u=>{if(u.out&&u.out.truck===S.truck)tb=false;});});const kb=d.keyReturns.every(k=>k.returned);const e=d.eod||{};return !!(cklClockout(isHandloadTruck()?"hand":"bin").every(function(it){return !!e[it.id];})&&tb&&kb);}
window.eodToggle=(k)=>{S.day.eod[k]=!S.day.eod[k]; sessionSave("hq"); render();};
window.clockOut=(name)=>{if(name===S.mgr&&!eodReady()){alert("Finish your before-you-clock-out checklist first.");return;}S.day.clockOut[name]=nowLabel();punchOut(name);logClock(name);render();};
window.clockSwampersOut=()=>{S.crew.filter(Boolean).forEach(n=>{if(!S.day.clockOut[n]){S.day.clockOut[n]=nowLabel();punchOut(n);logClock(n);}});render();};
window.returnTool=(id,n)=>{const reg=toolRegister();const it=reg.items.find(x=>x.id===id);const u=it&&it.units&&it.units.find(x=>x.n===n);if(u){u.out=null;saveToolReg(reg);logTool("in",[it.name+" #"+n]);}render();};
window.returnAllTools=()=>{const reg=toolRegister();const ret=[];reg.items.forEach(it=>{if(it.units)it.units.forEach(u=>{if(u.out&&u.out.truck===S.truck){u.out=null;ret.push(it.name+" #"+u.n);}});});saveToolReg(reg);if(ret.length)logTool("in",ret);render();};
window.signOff=()=>{
  if(!eodReady()){alert("Finish the before-you-clock-out checklist first \u2014 fuel/DEF, receipts, tablet+POS, tools and keys.");return;}
  const crew=[S.mgr,...S.crew].filter(Boolean);
  if(crew.some(n=>!S.day.clockOut[n])){alert("Clock out the crew before you end the day.");return;}
  alert("Day logged to the Management Hub. Nice work.");
};
window.finishToClockOut=()=>{
  if(!eodReady()){alert("Finish the before-you-clock-out checklist first \u2014 fuel/DEF, receipts, tablet+POS, tools and keys.");return;}
  const crew=[S.mgr,...S.crew].filter(Boolean);
  persistMgrNote();
  sessionClear();
  stampDoneOnTruck(crew);
  const q="?from=truck&truck="+encodeURIComponent(S.truck)+"&mgr="+encodeURIComponent(S.mgr||"")+"&crew="+encodeURIComponent(crew.join(","));
  location.href="island-junk-clock-out-v9.html"+q;
};
window.onMgrNote=(v)=>{ if(S.day) S.day.mgrNote=v; };
window.saveMgrNote=()=>{ persistMgrNote(); const el=$("#mgrNoteSaved"); if(el){ el.textContent="Saved \u2713"; setTimeout(()=>{ const e2=$("#mgrNoteSaved"); if(e2) e2.textContent=""; },2200); } };
function persistMgrNote(){
  const note=((S.day&&S.day.mgrNote)||"").trim();
  const d=new Date().toISOString().slice(0,10);
  const key=S.truck+":"+d;
  let log=lsGetTH("ij_mgr_notes_v1")||[];
  log=log.filter(r=>r.key!==key);
  if(note){ log.push({key:key,truck:S.truck,crew:[S.mgr,...S.crew].filter(Boolean).join(", "),date:d,note:note,at:new Date().toISOString()}); }
  lsSetTH("ij_mgr_notes_v1",log);
}
window.goToRoute=()=>{ if(S.day) persistMgrNote(); headOut(); };
window.toggleKeyRet=i=>{const k=S.day.keyReturns[i];k.returned=!k.returned;k.stayed=false; sessionSave("hq"); render();};
window.keyStayed=i=>{const k=S.day.keyReturns[i];k.stayed=true;k.returned=true; sessionSave("hq"); render();};

/* ===== boot: resume an active day straight to HQ; otherwise start the morning ===== */
(function(){
  const sess=sessionGet();
  if(sess){
    S.truck=sess.truck; S.mgr=sess.mgr; S.crew=Array.isArray(sess.crew)?sess.crew.slice():[];
    initDay();
    if(sess.eod) S.day.eod=Object.assign({fuel:false,receipts:false,tablet:false},sess.eod);
    if(Array.isArray(sess.keyDone)) S.day.keyReturns.forEach((k,i)=>{ if(sess.keyDone[i]) k.returned=true; });
    step=7; S.day.screen="end";
  }
  render();
})();
</script>
</body>
</html>
