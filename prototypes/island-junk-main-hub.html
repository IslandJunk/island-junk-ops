<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Island Junk — Main Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--orange:#F05014;--green:#3CA03C;--amber:#E8A317;--ink:#141414;--muted:#8b8b8b;--line:#E3DFD8}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:Inter,system-ui,sans-serif;color:#F4F1EC;min-height:100vh;
    background:radial-gradient(1200px 600px at 50% -10%,#2a2a2a 0%,#1a1a1a 45%,#101010 100%),linear-gradient(180deg,#161616,#0d0d0d);
    background-attachment:fixed}
  .wrap{max-width:620px;margin:0 auto;padding:0 16px 40px;position:relative;z-index:1}header .wrap{padding-bottom:0}
  .brand{text-align:center;padding:30px 0 8px}
  .brand .mark{font-family:Anton,sans-serif;font-size:34px;letter-spacing:1.5px;line-height:.95;color:#fff;text-transform:uppercase}
  .brand .mark b{color:var(--orange);font-weight:400}
  .brand .sub{font-size:11.5px;letter-spacing:3px;color:#b9b3a8;text-transform:uppercase;margin-top:5px}

  /* login */
  .panel{background:#fff;color:var(--ink);border-radius:18px;padding:22px 18px;margin-top:12px;box-shadow:0 12px 40px rgba(0,0,0,.35)}
  .panel h1{font-family:Anton,sans-serif;font-weight:400;font-size:23px;letter-spacing:.4px;margin:0 0 4px;text-transform:uppercase}
  .panel .lead{font-size:13.5px;color:var(--muted);margin:0 0 16px}
  .who{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .who button{display:flex;flex-direction:column;align-items:flex-start;gap:2px;background:#F7F4EF;border:1.5px solid var(--line);border-radius:12px;padding:13px 13px;cursor:pointer;text-align:left}
  .who button:active{transform:scale(.98)}
  .who .nm{font-weight:800;font-size:15px;color:var(--ink)}
  .who .rl{font-size:11.5px;color:var(--muted)}

  /* pin */
  .pinhead{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .pinhead .av{width:42px;height:42px;border-radius:50%;background:var(--orange);color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:17px}
  .dots{display:flex;gap:14px;justify-content:center;margin:18px 0 6px}
  .dot{width:16px;height:16px;border-radius:50%;border:2px solid #cfcabf;background:#fff}
  .dot.on{background:var(--ink);border-color:var(--ink)}
  .pinhint{text-align:center;font-size:11.5px;color:var(--muted);margin-bottom:10px}
  .pinerr{text-align:center;font-size:12.5px;color:var(--orange);font-weight:700;min-height:16px;margin-bottom:4px}
  .keys{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:300px;margin:6px auto 0}
  .keys button{padding:16px 0;border-radius:13px;border:1.5px solid var(--line);background:#F7F4EF;font-size:21px;font-weight:700;color:var(--ink);cursor:pointer}
  .keys button:active{background:#ECE7DE}
  .keys button.fn{font-size:14px;font-weight:700;color:var(--muted)}
  .linkbtn{display:block;width:100%;text-align:center;background:none;border:none;color:var(--muted);font-weight:700;font-size:13px;margin-top:14px;cursor:pointer;padding:6px}

  /* launcher */
  .hi{margin-top:14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .hi .h1{font-family:Anton,sans-serif;font-weight:400;font-size:22px;color:#fff;text-transform:uppercase;letter-spacing:.4px}
  .hi .h2{font-size:12.5px;color:#b9b3a8;margin-top:2px}
  .signout{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:#eee;border-radius:9px;padding:8px 12px;font-weight:700;font-size:12.5px;cursor:pointer}
  .tiles{margin-top:14px;display:flex;flex-direction:column;gap:12px}
  .tile{display:flex;align-items:center;gap:14px;background:#fff;color:var(--ink);border-radius:15px;padding:16px 16px;cursor:pointer;border:none;width:100%;text-align:left;box-shadow:0 8px 24px rgba(0,0,0,.28);position:relative;overflow:hidden}
  .tile:active{transform:scale(.99)}
  .tile .bar{position:absolute;left:0;top:0;bottom:0;width:6px}
  .tile .ic{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex:none;margin-left:4px}
  .tile .tx{flex:1;min-width:0}
  .tile .tn{font-weight:800;font-size:16.5px;display:flex;align-items:center;gap:8px}
  .tile .td{font-size:12.5px;color:var(--muted);margin-top:2px}
  .tile .chev{color:#c8c2b6;font-size:22px;font-weight:700}
  .lock{font-size:12px;background:#2a2a2a;color:#fff;border-radius:6px;padding:2px 7px;font-weight:800;letter-spacing:.3px}
  .soon{font-size:11px;background:#EFE9DE;color:#8a7a55;border-radius:6px;padding:2px 7px;font-weight:800;letter-spacing:.3px}
  .ver{font-size:10.5px;font-weight:700;letter-spacing:.16em;color:#8f897f;text-transform:uppercase}
  .foot{text-align:center;color:#6f6a60;font-size:11px;margin-top:22px;line-height:1.6}

  /* modal */
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;padding:20px;z-index:50}
  .ov.on{display:flex}
  .modal{background:#fff;color:var(--ink);border-radius:16px;padding:20px;max-width:360px;width:100%}
  .modal h2{font-family:Anton,sans-serif;font-weight:400;font-size:19px;margin:0 0 4px;text-transform:uppercase;letter-spacing:.4px}
  .modal p{font-size:13px;color:var(--muted);margin:0 0 14px}
  .modal input{width:100%;padding:13px;border:1.5px solid var(--line);border-radius:11px;font-size:16px;margin-bottom:6px}
  .merr{font-size:12.5px;color:var(--orange);font-weight:700;min-height:16px;margin-bottom:8px}
  .mbtns{display:flex;gap:10px}
  .mbtns button{flex:1;padding:13px;border-radius:11px;border:none;font-weight:800;font-size:14px;cursor:pointer}
  .mgo{background:var(--orange);color:#fff}
  .mcancel{background:#EEE;color:#444}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#222;color:#fff;padding:11px 16px;border-radius:11px;font-size:13.5px;font-weight:600;opacity:0;transition:opacity .2s;z-index:60;pointer-events:none;max-width:90%}
  .toast.on{opacity:1}

  header{background:radial-gradient(440px 150px at 50% 4%,rgba(240,80,20,.08),rgba(240,80,20,0) 72%),linear-gradient(180deg,#ffffff 0%,#fbf9f4 100%);border-bottom:3px solid var(--orange);box-shadow:0 12px 34px rgba(0,0,0,.5);padding:13px 0 12px;position:relative;z-index:5}
  .hd{display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center}
  .logo{width:100%;max-width:320px;height:auto;display:block;margin:0 auto;filter:drop-shadow(0 3px 7px rgba(0,0,0,.18))}
  .tool{font-family:"Anton",sans-serif;font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:#f4f1ec;line-height:1;display:inline-flex;align-items:center;gap:9px;background:#161616;border:1px solid rgba(240,80,20,.5);padding:7px 15px 6px;border-radius:999px;box-shadow:0 5px 14px rgba(0,0,0,.3)}
  .tool::before,.tool::after{content:"";width:13px;height:2px;background:var(--orange);display:inline-block;border-radius:2px}
</style>
</head>

    <h2 id="mTitle">Manager Hub</h2>
    <p id="mDesc">Enter the 4-digit manager code to continue.</p>
    <input type="password" id="mPin" inputmode="numeric" maxlength="4" placeholder="4-digit code" autocomplete="off">
    <div class="merr" id="mErr"></div>
    <div class="mbtns"><button class="mcancel" onclick="closeModal()">Cancel</button><button class="mgo" onclick="tryManager()">Open</button></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ---------- data (Manager Hub will own these stores in production) ---------- */
function lsGet(k){try{var r=localStorage.getItem(k);return r?JSON.parse(r):null;}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

var EMP_SEED=[
  {name:"Wes Roberts",role:"Owner",pin:"1111",access:["manager","reminders","estimate","truck","yard","bin","maint","hours","swing"],active:true,tracked:false},
  {name:"Paul Garside",role:"Main manager",pin:"2222",access:["manager","reminders","estimate","truck","yard","bin","maint","hours","swing"],active:true,tracked:false},
  {name:"Jesse Patno",role:"Truck manager",pin:"3333",access:["manager","reminders","estimate","truck","maint","hours","swing"],active:true,tracked:true},
  {name:"Brody Ingram-Johnson",role:"Yard manager",pin:"4444",access:["manager","reminders","estimate","yard","yardhub","maint","hours"],active:true,tracked:true},
  {name:"Zack Zeinstra",role:"Truck crew",pin:"5555",access:["manager","reminders","truck","hours"],active:true,tracked:true},
  {name:"Dylan Sparrow",role:"Truck crew",pin:"6666",access:["truck","hours"],active:true,tracked:true},
  {name:"Ashton Reid",role:"Truck crew",pin:"7777",access:["truck","hours"],active:true,tracked:true},
  {name:"Spencer Smith",role:"Truck crew",pin:"8888",access:["truck","hours"],active:true,tracked:true},
  {name:"Michael Opikokew",role:"Truck crew",pin:"9999",access:["truck","hours"],active:true,tracked:true},
  {name:"Tyler Kowalczyk",role:"Truck crew",pin:"1010",access:["truck","hours"],active:true,tracked:true},
  {name:"Troy Moore",role:"Bin truck driver",pin:"1212",access:["bin","hours"],active:true,tracked:true},
  {name:"Chris Barkhouse",role:"Yard crew",pin:"1313",access:["yard","hours"],active:true,tracked:true},
  {name:"Cody Sutton",role:"Crew",pin:"1414",access:["yard","truck","bin","hours"],active:true,tracked:true},
  {name:"Taryn Tuckwell",role:"Yard / bin crew",pin:"1515",access:["yard","bin","hours"],active:true,tracked:true}
];
function employees(){var e=lsGet("ij_employees_v1");return (Array.isArray(e)&&e.length)?e:EMP_SEED;}
function mhRoleToCrew(role){role=String(role||"").toLowerCase();if(/yard/.test(role))return "Yard crew";if(/bin/.test(role))return "Bin truck";return "Truck crew";}
function mhSetHM(name){var sch=lsGet("ij_clock_schedule_v1");if(!sch||!sch.positions)sch={positions:{"Yard crew":"07:00","Truck crew":"07:30","Bin truck":"07:30"},people:{}};var emp=null,r=employees();for(var i=0;i<r.length;i++){if(r[i].name===name){emp=r[i];break;}}var role=emp?emp.role:"";var crew=(sch.people[name]&&sch.people[name].crew)||mhRoleToCrew(role);if(!sch.positions[crew])crew=mhRoleToCrew(role);return (sch.people[name]&&sch.people[name].override)||sch.positions[crew]||"07:30";}
function mhTracked(name){var r=employees();for(var i=0;i<r.length;i++){if(r[i].name===name)return r[i].tracked!==false;}return true;}
function mhHmToClock(hm){var m=String(hm).match(/^(\d{1,2}):(\d{2})$/);if(!m)return null;var h=+m[1],mi=+m[2],ap=h>=12?"pm":"am",hh=h%12||12;return hh+":"+p2(mi)+ap;}
function sessionHours(){var h;try{h=parseFloat(localStorage.getItem("ij_session_hours_v1"));}catch(e){}return isNaN(h)?16:h;}
function saveSession(name){if(sessionHours()<=0)return;try{localStorage.setItem("ij_session_v1",JSON.stringify({name:name,at:Date.now()}));}catch(e){}}
function clearSession(){try{localStorage.removeItem("ij_session_v1");}catch(e){}}
function restoreSession(){try{var hrs=sessionHours();if(hrs<=0)return;var s=JSON.parse(localStorage.getItem("ij_session_v1"));if(!s||!s.name||!s.at)return;if(Date.now()-s.at>=hrs*3600000){clearSession();return;}var e=employees().filter(function(x){return x.name===s.name;})[0];if(!e||e.active===false){clearSession();return;}S.user=e;S.screen="launch";}catch(e){}}

var MGR_PW="1234";  /* demo manager code — real one set in Claude Code */

var HUBS=[
  {key:"owner",   name:"Owner Hub",     desc:"Invoicing, payroll, exports, access", icon:"\uD83D\uDC51",accent:"#C8902A",bg:"#F7EEDA",href:"island-junk-owner-hub-v54.html"},
  {key:"manager",name:"Manager Hub",  desc:"Bookings, dispatch, money, fleet",     icon:"\uD83D\uDDC2\uFE0F",accent:"#F05014",bg:"#FCE9E1",href:"island-junk-management-hub-v83.html",locked:true},
  {key:"swing",  name:"Swing Truck Board",desc:"Spare truck \u2014 cover runs & bin pulls",icon:"\uD83D\uDD01",accent:"#E8A317",bg:"#FBF1DD",href:"island-junk-swing-board-v5.html"},
  {key:"reminders",name:"Reminders",desc:"Tap & talk \u2014 quick notes & to-dos",icon:"\uD83D\uDCCC",accent:"#C8401F",bg:"#FBE9E4",href:"island-junk-reminders-v1.html"},
  {key:"estimate",name:"Estimate Builder",desc:"Build & save job quotes on site",icon:"\uD83E\uDDEE",accent:"#0E8A8A",bg:"#E1F2F1",href:"island-junk-estimate-builder-v4.html"},
  {key:"truck",  name:"Truck Crew Hub",desc:"Your day, jobs, sign in & out",        icon:"\uD83D\uDE9B",accent:"#039BE5",bg:"#E1F2FB",href:"island-junk-truck-hub-v54.html"},
  {key:"yard",   name:"Yard Crew Hub", desc:"Sort, weigh & process bins",           icon:"\u267B\uFE0F",accent:"#3CA03C",bg:"#E4F4E4",href:"island-junk-yard-processing-v28.html"},
  {key:"yardhub",name:"Yard Hub",      desc:"Yard manager view - crew, breaks, scale", icon:"\uD83D\uDCCB",accent:"#5B6470",bg:"#ECEEF0",href:"island-junk-yard-hub-v19.html"},
  {key:"bin",    name:"Bin Truck Hub", desc:"Drop, pick up & track bins",           icon:"\uD83D\uDDD1\uFE0F",accent:"#8E7CC3",bg:"#EEEAF6",href:"island-junk-bin-tracker-v34.html"},
  {key:"binreg", name:"Bin Registry",  desc:"Every bin \u2014 where it is & how long out",icon:"\uD83D\uDDC4\uFE0F",accent:"#5B6470",bg:"#ECEEF0",href:"island-junk-bin-registry-v6.html"},
  {key:"maint",  name:"Maintenance Hub",desc:"Trucks, machines, repairs, manuals",  icon:"\uD83D\uDD27",accent:"#5D4037",bg:"#EFE8E5",href:"island-junk-maintenance-hub-v12.html"},
  {key:"hours",  name:"My Hours",      desc:"Your hours this pay period",           icon:"\u23F1\uFE0F",accent:"#E8A317",bg:"#FBF1DD",href:"island-junk-employee-hours-v6.html"},
  {key:"clockout",name:"Clock In / Out",desc:"Your set start \u00b7 tap out at end of shift",icon:"\uD83D\uDC4B",accent:"#1F8A82",bg:"#E2F1EF",href:"island-junk-clock-out-v9.html",always:true},
  {key:"incident",name:"Incident report",desc:"Accident, injury, spill - WCB / ICBC",icon:"\uD83D\uDEA8",accent:"#C0392B",bg:"#F7E4E0",href:"island-junk-incident-report-v2.html",always:true}
];
function hub(k){return HUBS.filter(function(h){return h.key===k;})[0];}

/* ---------- state ---------- */
var S={screen:"login", user:null, sel:null, pin:"", err:"", pendingHub:null};
var app=document.getElementById("app");
function $(id){return document.getElementById(id);}

function render(){
  if(S.screen==="login")      app.innerHTML=vLogin();
  else if(S.screen==="pin")   app.innerHTML=vPin();
  else                        app.innerHTML=vLaunch();
  $("foot").innerHTML = S.screen==="launch"
    ? "Signed in as "+esc(S.user.name)+" \u00b7 one login, no more passwords past here (Manager Hub aside)."
    : "One front door for the whole crew. Demo build \u2014 real sign-in is wired in the production app.";
}
function esc(s){return String(s==null?"":s).replace(/[&<>\"]/g,function(c){return({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"})[c];});}

/* login */
function vLogin(){
  var rows=employees().filter(function(e){return e.active!==false;}).map(function(e){
    return '<button onclick="pick(\''+esc(e.name)+'\')"><span class="nm">'+esc(e.name)+'</span><span class="rl">'+esc(e.role)+'</span></button>';
  }).join("");
  return '<div class="panel"><h1>Who\u2019s signing in?</h1><p class="lead">Tap your name to sign in to the app.</p><div class="who">'+rows+'</div></div>';
}
window.pick=function(name){S.sel=name;S.pin="";S.err="";S.screen="pin";render();};

/* pin */
function vPin(){
  var e=employees().filter(function(x){return x.name===S.sel;})[0]||{};
  var dots="";for(var i=0;i<4;i++){dots+='<div class="dot'+(i<S.pin.length?' on':'')+'"></div>';}
  var keypad="";["1","2","3","4","5","6","7","8","9"].forEach(function(d){keypad+='<button onclick="key(\''+d+'\')">'+d+'</button>';});
  keypad+='<button class="fn" onclick="key(\'x\')">Clear</button>';
  keypad+='<button onclick="key(\'0\')">0</button>';
  keypad+='<button class="fn" onclick="key(\'b\')">\u232B</button>';
  return '<div class="panel">'+
    '<div class="pinhead"><div class="av">'+esc((S.sel||"?").slice(0,1).toUpperCase())+'</div><div><div style="font-weight:800;font-size:16px">'+esc(S.sel)+'</div><div style="font-size:12px;color:var(--muted)">'+esc(e.role||"")+'</div></div></div>'+
    '<div class="dots">'+dots+'</div>'+
    '<div class="pinerr">'+esc(S.err)+'</div>'+
    '<div class="pinhint">Enter your 4-digit PIN \u00b7 <span style="opacity:.8">demo PIN '+esc(e.pin||"")+'</span></div>'+
    '<div class="keys">'+keypad+'</div>'+
    '<button class="linkbtn" onclick="backLogin()">\u2190 Not you? Pick another name</button>'+
  '</div>';
}
window.key=function(k){
  if(k==="b"){S.pin=S.pin.slice(0,-1);S.err="";render();return;}
  if(k==="x"){S.pin="";S.err="";render();return;}
  if(S.pin.length>=4)return;
  S.pin+=k;
  if(S.pin.length===4){submitPin();return;}
  render();
};
function logSignin(e){try{var k="ij_signin_log_v1";var a=lsGet(k);if(!Array.isArray(a))a=[];a.push({name:e.name,role:e.role||"",access:(e.access||[]),at:new Date().toISOString()});if(a.length>300)a=a.slice(a.length-300);lsSet(k,a);}catch(_){}}
function submitPin(){
  var e=employees().filter(function(x){return x.name===S.sel;})[0];
  if(e&&e.active===false){S.err="This login is turned off";S.pin="";render();return;}
  if(e&&S.pin===e.pin){logSignin(e);saveSession(e.name);S.user=e;S.screen="launch";S.pin="";S.err="";render();}
  else{S.err="Wrong PIN \u2014 try again";S.pin="";render();}
}
window.backLogin=function(){S.sel=null;S.pin="";S.err="";S.screen="login";render();};

/* launcher */
function vLaunch(){
  var u=S.user;
  var tiles=HUBS.filter(function(h){return h.always||(u.access||[]).indexOf(h.key)>=0;}).map(function(h){
    var rightTag = h.locked?'<span class="lock">\uD83D\uDD12 LOCKED</span>' : (h.building?'<span class="soon">SOON</span>':'');
    return '<button class="tile" onclick="openHub(\''+h.key+'\')">'+
      '<span class="bar" style="background:'+h.accent+'"></span>'+
      '<span class="ic" style="background:'+h.bg+'">'+h.icon+'</span>'+
      '<span class="tx"><span class="tn">'+esc(h.name)+' '+rightTag+'</span><span class="td">'+esc(h.desc)+'</span></span>'+
      '<span class="chev">\u203a</span></button>';
  }).join("");
  return '<div class="hi"><div><div class="h1">Hi, '+esc(u.name.split(" ")[0])+'</div><div class="h2">'+esc(u.role)+' \u00b7 pick where you\u2019re headed</div></div><button class="signout" onclick="signout()">Sign out</button></div>'+
    '<div class="tiles">'+tiles+'</div>';
}
/* picking a work hub for the day = clock in. Writes ij_clock_log, the same record
   the Clock Out screen and My Hours read. Recorded once per day (first work-hub pick);
   the time-only tiles (My Hours, Clock Out) don't clock you in. */
function p2(n){return (n<10?"0":"")+n;}
function recordClockIn(name){
  try{
    var d=new Date(),iso=d.getFullYear()+"-"+p2(d.getMonth()+1)+"-"+p2(d.getDate());
    if(!mhTracked(name))return;
    var l=lsGet("ij_clock_log");if(!Array.isArray(l))l=[];
    if(l.some(function(e){return e&&e.name===name&&String(e.at).slice(0,10)===iso;}))return;
    var hm=mhSetHM(name);
    l.push({name:name,at:iso+"T"+hm+":00",inTime:mhHmToClock(hm)||"7:30am",outTime:null});
    lsSet("ij_clock_log",l);
  }catch(_){}
}
window.openHub=function(k){
  var h=hub(k);
  if(h.building){toast(h.name+" \u2014 building this next");return;}
  if(S.user && k!=="clockout" && k!=="hours") recordClockIn(S.user.name);
  if(h.locked){openModal(h);return;}
  go(h.href);
};
function go(href){ window.location.href=href; }
window.signout=function(){clearSession();S=Object.assign(S,{screen:"login",user:null,sel:null,pin:"",err:""});render();};

/* manager modal */
function openModal(h){S.pendingHub=h;$("mTitle").textContent=h.name;$("mErr").textContent="";$("mPin").value="";$("ov").classList.add("on");setTimeout(function(){$("mPin").focus();},50);}
window.closeModal=function(){$("ov").classList.remove("on");S.pendingHub=null;};
window.tryManager=function(){
  var v=($("mPin").value||"").trim();
  if(v===MGR_PW){var h=S.pendingHub;closeModal();go(h.href);}
  else{$("mErr").textContent="Wrong code (demo: "+MGR_PW+")";}
};
$("mPin")&&$("mPin").addEventListener("keydown",function(e){if(e.key==="Enter")tryManager();});

/* toast */
var tT;
function toast(m){var t=$("toast");t.textContent=m;t.classList.add("on");clearTimeout(tT);tT=setTimeout(function(){t.classList.remove("on");},2200);}

restoreSession();
render();
</script>
</body>
</html>
