<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Island Junk — Maintenance Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--orange:#F05014;--green:#3CA03C;--amber:#E8A317;--ink:#141414;--muted:#8b8b8b;--line:#E3DFD8;--stop:#C8401F}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:Inter,system-ui,sans-serif;color:#F4F1EC;min-height:100vh;background:radial-gradient(1200px 600px at 50% -10%,#2a2a2a 0%,#1a1a1a 45%,#101010 100%),linear-gradient(180deg,#161616,#0d0d0d);background-attachment:fixed}
  .wrap{max-width:620px;margin:0 auto;padding:0 16px 44px;position:relative;z-index:1}
  header{background:radial-gradient(440px 150px at 50% 4%,rgba(240,80,20,.08),rgba(240,80,20,0) 72%),linear-gradient(180deg,#ffffff 0%,#fbf9f4 100%);border-bottom:3px solid var(--orange);box-shadow:0 12px 34px rgba(0,0,0,.5);padding:13px 0 12px;position:relative;z-index:5}
  .hd{display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center}
  .logo{width:100%;max-width:320px;height:auto;display:block;margin:0 auto;filter:drop-shadow(0 3px 7px rgba(0,0,0,.18))}
  .tool{font-family:"Anton",sans-serif;font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:#f4f1ec;line-height:1;display:inline-flex;align-items:center;gap:9px;background:#161616;border:1px solid rgba(240,80,20,.5);padding:7px 15px 6px;border-radius:999px;box-shadow:0 5px 14px rgba(0,0,0,.3)}
  .tool::before,.tool::after{content:"";width:13px;height:2px;background:var(--orange);display:inline-block;border-radius:2px}
  .back{display:inline-block;margin:9px 0 2px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:#eee;border-radius:9px;padding:8px 12px;font-weight:700;font-size:12.5px;text-decoration:none}
  .foot{text-align:center;color:#6f6a60;font-size:11px;margin-top:22px;line-height:1.6}

  .ban{display:flex;align-items:center;gap:13px;border-radius:15px;padding:14px 16px;margin-top:12px;color:#fff}
  .ban.red{background:linear-gradient(135deg,#C8401F,#9e2f16)}
  .ban.amber{background:linear-gradient(135deg,#E8A317,#c4870b)}
  .ban.green{background:linear-gradient(135deg,#3CA03C,#2c7a2c)}
  .ban .bnum{font-family:Anton,sans-serif;font-size:30px;line-height:1;min-width:34px;text-align:center}
  .ban .btx{display:flex;flex-direction:column;gap:2px}
  .ban .btx b{font-size:15px;font-weight:800}
  .ban .btx span{font-size:12px;opacity:.9}

  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}
  .qbtn{background:#fff;color:var(--ink);border:none;border-radius:12px;padding:12px 6px;font-weight:800;font-size:12.5px;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.25)}
  .qbtn:active{transform:scale(.98)}

  .eyebrow{font-family:Anton,sans-serif;font-weight:400;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:#b9b3a8;margin:18px 0 8px;display:flex;align-items:center;gap:10px}
  .eyebrow::after{content:"";flex:1;height:1px;background:rgba(255,255,255,.12)}
  .cards{display:flex;flex-direction:column}
  .card{background:#fff;color:var(--ink);border:none;width:100%;text-align:left;border-radius:15px;padding:15px;box-shadow:0 8px 22px rgba(0,0,0,.25);margin-top:10px}
  button.card{cursor:pointer}
  button.card:active{transform:scale(.995)}
  .ctop{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .cname{font-weight:800;font-size:16px}
  .cmk{font-size:11.5px;color:var(--muted);margin-top:1px}
  .cmeta{font-size:12.5px;color:#555;margin-top:5px}
  .cissues{font-size:12.5px;color:var(--stop);margin-top:6px;font-weight:600}
  .cissues.ok{color:var(--green)}

  .bdg{font-size:11px;font-weight:800;letter-spacing:.4px;border-radius:7px;padding:3px 9px;flex:none}
  .bdg.due{background:#FBE4DD;color:#9e2f16}
  .bdg.soon{background:#FBEFD6;color:#8a5e08}
  .bdg.ok{background:#E4F2E4;color:#2c7a2c}
  .chip{font-size:11px;font-weight:800;border-radius:7px;padding:3px 9px;display:inline-block}
  .chip.warn{background:var(--amber);color:#fff}
  .chip.good{background:var(--green);color:#fff}

  .back2{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:#eee;border-radius:9px;padding:8px 12px;font-weight:700;font-size:12.5px;cursor:pointer;margin:12px 0 2px}
  .uhead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:12px 0 4px}
  .uhead h2{font-family:Anton,sans-serif;font-weight:400;font-size:24px;color:#fff;text-transform:uppercase;letter-spacing:.4px;margin:0}
  .lbl{font-weight:800;font-size:12.5px;letter-spacing:.4px;text-transform:uppercase;color:#9a958c;margin-bottom:10px}
  .readrow{display:flex;align-items:baseline;gap:8px}
  .rin{font-family:Anton,sans-serif;font-size:30px;border:none;border-bottom:2px solid var(--line);width:160px;padding:2px 0;color:var(--ink)}
  .ru{font-size:14px;color:var(--muted);font-weight:700}
  .readmeta{font-size:12px;color:var(--muted);margin-top:4px}
  .evrow{display:flex;align-items:center;gap:7px;margin-top:12px;flex-wrap:wrap;font-size:12.5px;color:#555}
  .seg{padding:5px 12px;border-radius:8px;border:1.5px solid var(--line);background:#fff;color:#555;font-weight:700;font-size:12px;cursor:pointer}
  .seg.on{background:var(--ink);border-color:var(--ink);color:#fff}

  .svc{border-top:1px solid #eee;padding:12px 0}
  .svc.first{border-top:none;padding-top:0}
  .svctop{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .svcn{font-weight:700;font-size:14.5px}
  .svcd{font-size:12px;color:var(--muted);margin-top:3px}
  .svcbar{height:8px;border-radius:5px;background:#ECECEC;overflow:hidden;margin-top:7px;max-width:340px}
  .svcbar i{display:block;height:100%;border-radius:5px}
  .svcbtns{display:flex;gap:8px;margin-top:9px;flex-wrap:wrap}
  .mini{background:#F2EFE9;border:1px solid var(--line);color:#444;border-radius:9px;padding:7px 11px;font-weight:700;font-size:12px;cursor:pointer}
  .mini.go{background:var(--green);border-color:var(--green);color:#fff}
  .ghost{width:100%;background:none;border:1px dashed #cfc9bd;color:#7d7768;border-radius:11px;padding:11px;font-weight:700;font-size:12.5px;cursor:pointer;margin-top:12px}

  .sub{font-size:12.5px;font-weight:700;color:#6f6a60;margin:14px 0 7px}
  .in{width:100%;padding:12px;border:1.5px solid var(--line);border-radius:11px;font-size:16px;margin-bottom:8px;background:#fff;color:var(--ink);font-family:inherit}
  select.in{appearance:none}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .wide{width:100%;background:var(--ink);color:#fff;border:none;border-radius:11px;padding:13px;font-weight:800;font-size:14px;cursor:pointer;margin-top:2px}
  .wide.go{background:var(--orange)}
  .muted{font-size:13px;color:var(--muted);text-align:center;padding:6px 0}
  .muted2{font-size:11.5px;color:var(--muted);margin-top:8px;line-height:1.5}
  .hr{height:1px;background:#eee;margin:14px 0}
  .hrow{display:flex;gap:10px;padding:9px 0;border-top:1px solid #f1f1f1}
  .hrow.first{border-top:none}
  .htag{font-size:10px;font-weight:800;letter-spacing:.3px;border-radius:6px;padding:3px 7px;height:fit-content;flex:none;text-transform:uppercase}
  .htag.rp{background:#FBE4DD;color:#9e2f16}
  .htag.sv{background:#E9EEF6;color:#3a5a86}
  .hmain{display:flex;flex-direction:column;gap:1px}
  .hmain b{font-size:13.5px}
  .hmain span{font-size:11.5px;color:var(--muted)}

  .edrow{display:flex;align-items:center;gap:8px;padding:8px 0;border-top:1px solid #f1f1f1}
  .edrow.first{border-top:none}
  .edn{flex:1;font-size:13.5px;font-weight:600}
  .ednum{width:84px;padding:8px;border:1.5px solid var(--line);border-radius:9px;font-size:15px}
  .edby{font-size:11.5px;color:var(--muted);width:34px}
  .edx{background:none;border:none;color:#c0392b;font-size:15px;cursor:pointer;padding:4px}

  .danger{width:100%;background:#fff;border:1.5px solid #e7c3bb;color:#b4351f;border-radius:12px;padding:13px;font-weight:800;font-size:13.5px;cursor:pointer;margin-top:14px}

  .pchips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:6px}
  .pchip{background:#F2EFE9;border:1.5px solid var(--line);color:#555;border-radius:20px;padding:7px 12px;font-weight:700;font-size:12px;cursor:pointer}
  .pchip.on{background:var(--ink);border-color:var(--ink);color:#fff}
  .ta{width:100%;min-height:80px;padding:12px;border:1.5px solid var(--line);border-radius:11px;font-size:15px;font-family:inherit;resize:vertical;margin-bottom:8px}
  .askout{margin-top:13px;background:#F7F4EF;border:1px solid var(--line);border-radius:12px;padding:13px;font-size:13.5px;line-height:1.5;color:var(--ink)}
  .askbadge{display:inline-block;background:var(--orange);color:#fff;font-size:10.5px;font-weight:800;letter-spacing:.4px;border-radius:6px;padding:3px 8px;margin-bottom:8px;text-transform:uppercase}
  .asknote{font-size:11.5px;color:var(--muted);margin-top:10px;line-height:1.5}

  .lbrow{display:flex;gap:11px;padding:11px 0;border-top:1px solid #f1f1f1}
  .lbrow.first{border-top:none}
  .lbic{font-size:18px;flex:none}
  .lbmain{flex:1;min-width:0}
  .lbmain b{font-size:14px}
  .lbnote{font-size:12px;color:#666;margin-top:2px}
  .lbmeta{font-size:11px;color:var(--muted);display:block;margin-top:3px}
  .lbact{display:flex;align-items:center;gap:6px;flex:none}
  .lbact a{font-size:12.5px;font-weight:800;color:var(--orange);text-decoration:none}
  .lbx{background:none;border:none;color:#b94a3a;font-size:14px;cursor:pointer;padding:4px}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#222;color:#fff;padding:11px 16px;border-radius:11px;font-size:13.5px;font-weight:600;opacity:0;transition:opacity .2s;z-index:60;pointer-events:none;max-width:90%}
  .toast.on{opacity:1}
  .fxcard{background:#fff;border-radius:15px;padding:4px 15px;box-shadow:0 8px 22px rgba(0,0,0,.25);margin-top:4px}
  .fxrow{display:flex;align-items:flex-start;gap:11px;padding:12px 0;border-top:1px solid #f1f1f1}
  .fxrow:first-child{border-top:none}
  .fxmain{flex:1;min-width:0}
  .fxh{font-size:14px;font-weight:800;color:var(--ink);line-height:1.3}
  .fxn{font-size:13px;color:#444;margin-top:3px;line-height:1.4}
  .fxm{font-size:11.5px;color:#8a8a8a;margin-top:4px}
  .fxtag{font-size:9.5px;font-weight:800;letter-spacing:.3px;text-transform:uppercase;background:#FBE9D6;color:#9e5b16;border-radius:6px;padding:2px 7px;vertical-align:middle}
  .fxfix{flex:none;background:var(--green);color:#fff;border:none;border-radius:9px;padding:9px 12px;font-weight:800;font-size:12px;cursor:pointer}
  .fxcount{display:inline-block;background:#C8401F;color:#fff;border-radius:999px;font-size:11px;font-weight:800;padding:1px 8px;margin-left:6px}

  .specrow{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid #f0ede8}
  .specrow:first-child{border-top:none}
  .specl{font-weight:800;font-size:13px;color:#444;flex:none;min-width:34%}
  .specv{font-size:13.5px;color:var(--ink);font-weight:600;flex:1;word-break:break-word}
  .xsm{flex:none;width:24px;height:24px;border-radius:7px;border:1px solid var(--line);background:#faf8f5;color:#b4351f;font-size:15px;font-weight:800;line-height:1;cursor:pointer;padding:0}
  .addgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;margin-bottom:0}
  .addgrid .in{margin-bottom:0}
  .partrow{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-top:1px solid #f0ede8}
  .partrow:first-child{border-top:none}
  .partmain{flex:1;min-width:0}
  .partn{font-weight:800;font-size:14px;color:var(--ink)}
  .partmeta{font-size:12.5px;color:#6f6a60;font-weight:600;margin-top:2px}
  .partnote{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.35}
  .partact{flex:none;display:flex;align-items:center;gap:7px}
  .buylink{font-size:11.5px;font-weight:800;color:#fff;background:var(--orange);border-radius:7px;padding:5px 9px;text-decoration:none;white-space:nowrap}
  .fromfile{font-family:Anton,sans-serif;font-weight:400;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--orange);margin:2px 0 7px}
  .fchips{display:flex;flex-wrap:wrap;gap:7px;margin:16px 0 2px}
  .fchip{background:#fff;border:1.5px solid var(--line);color:#555;border-radius:999px;padding:7px 13px;font-weight:800;font-size:12.5px;cursor:pointer}
  .fchip.on{background:var(--ink);border-color:var(--ink);color:#fff}
  .lkrow{width:100%;display:flex;align-items:center;justify-content:space-between;background:#faf8f5;border:1px solid var(--line);border-radius:11px;padding:12px;font-weight:700;font-size:13.5px;color:var(--ink);cursor:pointer;margin-top:8px}
  .lkrow .ar{color:var(--orange);font-weight:800}
  .cnt{display:inline-block;background:#eee;color:#555;border-radius:7px;padding:1px 8px;font-size:11px;font-weight:800;margin-left:6px}
  .chip.mdl{background:#efe7ff;color:#5b3bb5}
  .filehint{border-left:3px solid var(--orange)}
.svcnote{font-size:11.5px;color:var(--muted);margin-top:4px;line-height:1.35}
.issuecard{border-left:3px solid #C8401F}
.isurow{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--line)}
.isurow:last-of-type{border-bottom:0}
.isutext{flex:1;font-size:13.5px;color:var(--ink);line-height:1.35}
.cnt.warn{background:#FBE4DD;color:#9e2f16}
.cwarn{display:inline-block;background:#FBE4DD;color:#9e2f16;border-radius:7px;padding:1px 8px;font-size:11px;font-weight:800}
.ctop .cname{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.edcard{border:1px solid var(--line);border-radius:12px;padding:10px;margin-top:8px}
.edcard.first{margin-top:0}
.edtop{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
.edn{font-weight:700;font-size:13.5px}
.edgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.edcell{display:flex;align-items:center;gap:6px;min-width:0}
.edcell .edin{flex:1;width:100%;min-width:0}
.edlab,.edu{flex:none;font-size:11px;color:var(--muted);font-weight:700;white-space:nowrap}
.edin{padding:8px 10px;font-size:13px}
.edcard>.edin{margin-top:8px}
/* ---- Desktop / tablet responsive (phone layout above is the base) ---- */
@media (min-width:768px){
  .wrap{max-width:900px}
}
</style>
</head>

window.mReading=function(key,v){withDB(function(db){var m=db.m[key];if(m){var n=nInt(v);if(n){m.reading=n;m.readingOn=isoAgo(0);}}});};
window.mEvery=function(key,v){withDB(function(db){var m=db.m[key];if(m)m.readEvery=v;});};
window.mLogDone=function(key,id){withDB(function(db){var m=db.m[key];if(m){var it=(m.items||[]).find(function(x){return x.id===id;});if(it){m.history=m.history||[];m.history.push({id:it.id,name:it.name,on:isoAgo(0),reading:m.reading,by:"logged here"});if((it.by==="km"||it.by==="hours")&&it.interval){it.dueAt=m.reading+it.interval;}else if(it.by==="time"&&it.interval){var d=new Date();d.setDate(d.getDate()+it.interval);it.dueOn=d.toISOString().slice(0,10);}}}});toast("Logged \u2014 next due moved ahead");};
window.mSnooze=function(key,id,days){var o=snoozeStore();o[key+":"+id]=Date.now()+days*86400000;lsSet("ij_maint_snooze_v1",o);render();};
window.mInterval=function(key,id,v){withDB(function(db){var m=db.m[key];var it=m&&(m.items||[]).find(function(x){return x.id===id;});if(it){var n=nInt(v);if(n)it.interval=n;}});};
window.mItemRm=function(key,id){if(!confirm("Remove this service item?"))return;withDB(function(db){var m=db.m[key];if(m)m.items=(m.items||[]).filter(function(x){return x.id!==id;});});};
window.mItemAdd=function(key){var n=(el("itName").value||"").trim();var by=el("itBy").value;var iv=nInt(el("itInt").value);var ld=nInt(el("itLead").value);if(!n||!iv){toast("Name + interval needed");return;}withDB(function(db){var m=db.m[key];if(m){m.items=m.items||[];m.items.push({id:"x"+Date.now().toString(36),name:n,by:by,interval:iv,lead:isNaN(ld)?0:ld});}});};
window.mRepair=function(key){var name=(el("rpName").value||"").trim();if(!name){toast("Describe the repair/part");return;}var date=el("rpDate").value||isoAgo(0);var rd=nInt(el("rpRead").value);var by=(el("rpBy").value||"").trim();var c=parseFloat(String(el("rpCost").value||"").replace(/[^0-9.]/g,""));withDB(function(db){var m=db.m[key];if(!m)return;m.history=m.history||[];m.history.push({id:"rp"+Date.now().toString(36),name:name,on:date,reading:isNaN(rd)?m.reading:rd,by:by,kind:"repair",cost:isNaN(c)?null:c});});toast("Repair logged");};
window.mMeta=function(key){withDB(function(db){var m=db.m[key];if(!m)return;var lbl=(el("mLabel").value||"").trim();if(lbl)m.label=lbl;if(el("mMake"))m.make=(el("mMake").value||"").trim();if(el("mModel"))m.model=(el("mModel").value||"").trim();if(el("mYear"))m.year=(el("mYear").value||"").trim();if(el("mVin"))m.vin=(el("mVin").value||"").trim();if(el("mPlate"))m.plate=(el("mPlate").value||"").trim();if(el("mSerial"))m.serial=(el("mSerial").value||"").trim();});toast("Details saved");};
window.addMachine=function(){var n=(el("acName").value||"").trim();if(!n){toast("Name the machine");return;}var nk;withDB(function(db){nk="mach:x"+Date.now().toString(36);db.order.push(nk);db.m[nk]={kind:"machine",label:n,make:"",model:"",year:"",unit:"hours",reading:0,readingOn:isoAgo(0),items:clone(STD_MACHINE),history:[]};});go("unit",nk);};
window.addTruck=function(){var n=(el("atName").value||"").trim();var od=nInt(el("atOdo").value);if(!n){toast("Name the vehicle");return;}var nk;withDB(function(db){nk="truck:x"+Date.now().toString(36);db.order.push(nk);db.m[nk]={kind:"truck",label:n,unit:"km",reading:isNaN(od)?0:od,readingOn:isoAgo(0),items:clone(STD_TRUCK),history:[]};});go("unit",nk);};
window.removeUnit=function(key){var m=maintDB().m[key];if(!m)return;var word=(m.kind==="model")?"model file":(m.kind==="machine"?"machine":(m.kind==="trailer"?"trailer":(m.kind==="hooklift"?"hooklift":"truck")));if(!confirm("Remove "+m.label+(m.kind==="model"?" (links will be cleared)":" and all its records")+"? This cannot be undone."))return;withDB(function(db){db.order=db.order.filter(function(k){return k!==key;});delete db.m[key];db.order.forEach(function(k){if(db.m[k].modelRef===key)db.m[k].modelRef=null;});});go("list");};
window.toggleSched=function(){S.sched=!S.sched;render();};
window.mDueAt=function(key,id,v){withDB(function(db){var m=db.m[key];var it=m&&(m.items||[]).find(function(x){return x.id===id;});if(it){var ss=String(v).replace(/[^0-9.]/g,"");if(ss===""){delete it.dueAt;}else{it.dueAt=parseFloat(ss);}}});};
window.mDueOn=function(key,id,v){withDB(function(db){var m=db.m[key];var it=m&&(m.items||[]).find(function(x){return x.id===id;});if(it){if(v){it.dueOn=v;}else{delete it.dueOn;}}});};
window.mNote=function(key,id,v){withDB(function(db){var m=db.m[key];var it=m&&(m.items||[]).find(function(x){return x.id===id;});if(it)it.note=(v||"").trim();});};
window.issueAdd=function(key){var t=(el("isuText").value||"").trim();if(!t){toast("Describe the issue");return;}withDB(function(db){var m=db.m[key];if(m){m.issues=m.issues||[];m.issues.push({id:"i"+Date.now().toString(36),text:t,on:isoAgo(0)});}});toast("Issue added");};
window.issueRm=function(key,id){withDB(function(db){var m=db.m[key];if(m)m.issues=(m.issues||[]).filter(function(x){return x.id!==id;});});};
window.addTrailer=function(){var n=(el("trName").value||"").trim();if(!n){toast("Name the trailer");return;}var nk;withDB(function(db){nk="trail:x"+Date.now().toString(36);db.order.push(nk);db.m[nk]={kind:"trailer",label:n,unit:"none",reading:0,readingOn:isoAgo(0),items:clone(STD_TRAILER),history:[],specs:[],parts:[],modelRef:null,vin:"",plate:"",serial:""};});go("unit",nk);};
window.addHooklift=function(){var n=(el("hkName").value||"").trim();if(!n){toast("Name the hooklift");return;}var nk;withDB(function(db){nk="hook:x"+Date.now().toString(36);db.order.push(nk);db.m[nk]={kind:"hooklift",label:n,unit:"none",reading:0,readingOn:isoAgo(0),items:clone(STD_HOOKLIFT),history:[],specs:[],parts:[],modelRef:(db.m["model:xr5"]?"model:xr5":null),vin:"",plate:"",serial:""};});go("unit",nk);};
window.addModel=function(){var n=(el("mdName").value||"").trim();if(!n){toast("Name the model file");return;}var nk;withDB(function(db){nk="model:x"+Date.now().toString(36);db.order.push(nk);db.m[nk]={kind:"model",label:n,specs:[],parts:[]};});go("unit",nk);};
window.specAdd=function(key){var lab=(el("spLabel").value||"").trim();if(!lab){toast("Add a label");return;}var val=(el("spVal").value||"").trim();withDB(function(db){var e=db.m[key];if(!e)return;e.specs=e.specs||[];e.specs.push({id:"s"+Date.now().toString(36),label:lab,value:val});});toast("Spec saved");};
window.specRm=function(key,id){withDB(function(db){var e=db.m[key];if(e)e.specs=(e.specs||[]).filter(function(x){return x.id!==id;});});};
window.partAdd=function(key){var nm=(el("ptName").value||"").trim();if(!nm){toast("Name the part");return;}withDB(function(db){var e=db.m[key];if(!e)return;e.parts=e.parts||[];e.parts.push({id:"p"+Date.now().toString(36),name:nm,pn:(el("ptPn").value||"").trim(),price:(el("ptPrice").value||"").trim().replace(/^[$]/,""),url:(el("ptUrl").value||"").trim(),note:(el("ptNote").value||"").trim()});});toast("Part saved");};
window.partRm=function(key,id){withDB(function(db){var e=db.m[key];if(e)e.parts=(e.parts||[]).filter(function(x){return x.id!==id;});});};
window.setModel=function(key,mk){withDB(function(db){var m=db.m[key];if(m)m.modelRef=mk||null;});};
window.toggleMotive=function(key){withDB(function(db){var m=db.m[key];if(m)m.motive=!m.motive;});};
window.setFilter=function(t){S.filter=t;render();};

function libGet(){var x=lsGet("ij_maint_library_v1");return Array.isArray(x)?x:[];}
window.libAdd=function(){var t=(el("lbTitle").value||"").trim();if(!t){toast("Add a title");return;}var a=libGet();a.unshift({id:"l"+Date.now().toString(36),title:t,url:(el("lbUrl").value||"").trim(),note:(el("lbNote").value||"").trim(),kind:el("lbKind").value,on:isoAgo(0)});lsSet("ij_maint_library_v1",a);toast("Saved");render();};
window.libRm=function(id){lsSet("ij_maint_library_v1",libGet().filter(function(x){return x.id!==id;}));render();};

window.askPick=function(key){S.key=key;render();};
window.askRun=function(){var q=(el("askIn").value||"").trim();S.askText=q;if(!q){S.askOut="";render();return;}var code=/\b([a-z]{1,4}[- ]?\d{2,5})\b/i.exec(q);var unit=S.key?maintDB().m[S.key]:null;var name=unit?unit.label:"the vehicle";if(code){S.askOut="<b>"+esc(code[1].toUpperCase())+"</b> \u2014 in the live app I\u2019ll pull this code\u2019s meaning, cross-check "+esc(name)+"\u2019s service manual, and list the likely causes plus the parts you keep on the shelf.";}else{S.askOut="In the live app I\u2019ll answer this against "+esc(name)+"\u2019s manual and its service history, step by step.";}render();};

function toast(t){var e=el("toast");if(!e)return;e.textContent=t;e.className="toast on";clearTimeout(toast._t);toast._t=setTimeout(function(){e.className="toast";},1700);}

function badge(state){return state==="due"?'<span class="bdg due">DUE</span>':(state==="close"?'<span class="bdg soon">SOON</span>':'<span class="bdg ok">OK</span>');}
function readChip(m){return readDue(m)?'<span class="chip warn">reading due</span>':'<span class="chip good">up to date</span>';}
function rUnit(m){return m.unit==="hours"?"hrs":(m.unit==="none"?"":"km");}

function unitCard(key,m){
  var issues=(m.items||[]).map(function(it){return {it:it,st:svcStatus(m,it)};}).filter(function(x){return x.st.state!=="ok";});
  issues.sort(function(a,b){return (a.st.state==="due"?0:1)-(b.st.state==="due"?0:1);});
  var sub=issues.length?issues.slice(0,3).map(function(x){return esc(x.it.name);}).join(" \u00b7 "):"All up to date";
  var sub2=m.make?('<div class="cmk">'+esc([m.year,m.make,m.model].filter(Boolean).join(" "))+'</div>'):"";
  return '<button class="card" onclick="go(\'unit\',\''+key+'\')">'+
    '<div class="ctop"><span class="cname">'+esc(m.label)+'</span>'+(m.issues&&m.issues.length?'<span class="cwarn">'+m.issues.length+' issue'+(m.issues.length>1?'s':'')+'</span>':'')+badge(worst(m))+'</div>'+sub2+
    (m.unit==="none"?'<div class="cmeta">tracked by date</div>':'<div class="cmeta">'+Number(m.reading).toLocaleString()+' '+rUnit(m)+' &middot; '+readChip(m)+'</div>')+
    '<div class="cissues '+(issues.length?'':'ok')+'">'+sub+'</div></button>';
}
function fixesResolved(){var r=lsGet("ij_fixes_resolved_v1");return (r&&typeof r==="object")?r:{};}
function openFixes(){var all=lsGet("ij_fixes_v1")||[];var res=fixesResolved();return all.filter(function(f){return f&&f.open!==false&&!(f.id&&res[f.id]);});}
window.mFixDone=function(id){var r=fixesResolved();r[id]=Date.now();lsSet("ij_fixes_resolved_v1",r);toast("Marked fixed");render();};
function vReported(){
  var fx=openFixes();
  if(!fx.length)return '<div class="eyebrow">Reported by the crews</div><div class="fxcard"><div class="fxrow"><div class="fxmain"><div class="fxn" style="color:#8a8a8a">No issues reported right now. When a crew flags something on their walk-around, it shows here.</div></div></div></div>';
  fx.sort(function(a,b){return (a.date<b.date?1:-1);});
  var rows=fx.map(function(f){
    var who=[f.who,f.date].filter(Boolean).map(esc).join(" \u00b7 ");
    var tag=f.source==="walk-around"?' <span class="fxtag">walk-around</span>':'';
    return '<div class="fxrow"><div class="fxmain"><div class="fxh">Truck #'+esc(f.truck)+' \u2014 '+esc(f.item||"Issue")+tag+'</div>'+(f.note?'<div class="fxn">'+esc(f.note)+'</div>':'')+'<div class="fxm">'+who+'</div></div><button class="fxfix" onclick="mFixDone(\''+esc(f.id)+'\')">Mark fixed</button></div>';
  }).join("");
  return '<div class="eyebrow">Reported by the crews <span class="fxcount">'+fx.length+'</span></div><div class="fxcard">'+rows+'</div>';
}
function vList(){
  var db=maintDB();
  function byKind(kd){return db.order.filter(function(k){return db.m[k].kind===kd;});}
  var trucks=byKind("truck"),machines=byKind("machine"),trailers=byKind("trailer"),hooklifts=byKind("hooklift"),models=byKind("model");
  var d=dueCount(),a=alerts().length,soon=a-d,ban;
  if(d)ban='<div class="ban red"><div class="bnum">'+d+'</div><div class="btx"><b>'+d+' service'+(d>1?'s':'')+' due now</b><span>'+(soon?('+ '+soon+' coming up soon'):'tap a vehicle to log it')+'</span></div></div>';
  else if(soon)ban='<div class="ban amber"><div class="bnum">'+soon+'</div><div class="btx"><b>'+soon+' coming up soon</b><span>nothing overdue</span></div></div>';
  else ban='<div class="ban green"><div class="bnum">\u2713</div><div class="btx"><b>Everything\u2019s current</b><span>no services due right now</span></div></div>';
  var f=S.filter||"all";
  function chip(t,lab){return '<button class="fchip'+(f===t?' on':'')+'" onclick="setFilter(\''+t+'\')">'+lab+'</button>';}
  var chips='<div class="fchips">'+chip("all","All")+chip("truck","Trucks")+chip("machine","Machines")+chip("trailer","Trailers")+chip("hooklift","Hooklifts")+chip("model","Model files")+'</div>';
  function sec(t,title,arr,empty){if(f!=="all"&&f!==t)return"";var cards=arr.length?arr.map(function(k){return t==="model"?modelCard(k,db.m[k]):unitCard(k,db.m[k]);}).join(""):'<div class="muted">'+empty+'</div>';return '<div class="eyebrow">'+title+'</div><div class="cards">'+cards+'</div>';}
  return ban+vReported()+
    '<div class="row3"><button class="qbtn" onclick="go(\'add\')">\u2795 Add</button><button class="qbtn" onclick="go(\'library\')">\ud83d\udcd8 Library</button><button class="qbtn" onclick="go(\'ask\')">\ud83d\udcac Ask Claude</button></div>'+
    chips+
    sec("truck","Trucks",trucks,"No trucks yet.")+
    sec("machine","Machines",machines,"No machines yet.")+
    sec("trailer","Trailers",trailers,"No trailers yet \u2014 add one under \u2795 Add.")+
    sec("hooklift","Hooklifts",hooklifts,"No hooklifts yet \u2014 add your Hiab XR5s under \u2795 Add.")+
    sec("model","Shared model files",models,"No model files yet.");
}
function modelCard(key,m){
  var db=maintDB();var n=db.order.filter(function(k){return db.m[k].modelRef===key;}).length;
  var bits=[(m.specs||[]).length+' spec'+((m.specs||[]).length===1?'':'s'),(m.parts||[]).length+' part'+((m.parts||[]).length===1?'':'s'),n+' unit'+(n===1?'':'s')].join(' \u00b7 ');
  return '<button class="card" onclick="go(\'unit\',\''+key+'\')"><div class="ctop"><span class="cname">'+esc(m.label)+'</span><span class="chip mdl">shared</span></div><div class="cissues ok">'+bits+'</div></button>';
}
function motiveSyncMins(key){var h=0;for(var i=0;i<key.length;i++){h=(h*31+key.charCodeAt(i))>>>0;}return 4+(h%176);}
function motiveSyncStr(key){var mn=motiveSyncMins(key);return mn<60?(mn+"m ago"):(Math.round(mn/60)+"h ago");}
function specsHtml(key,list,editable){
  if(!list||!list.length)return editable?'':'<div class="muted2" style="padding:4px 2px">None listed.</div>';
  return list.map(function(sp){
    return '<div class="specrow"><div class="specl">'+esc(sp.label)+'</div><div class="specv">'+(sp.value?esc(sp.value):'<span class="muted2">\u2014</span>')+'</div>'+(editable?'<button class="xsm" onclick="specRm(\''+key+'\',\''+sp.id+'\')">&times;</button>':'')+'</div>';
  }).join("");
}
function partsHtml(key,list,editable){
  if(!list||!list.length)return editable?'':'<div class="muted2" style="padding:4px 2px">None listed.</div>';
  return list.map(function(p){
    var meta=[p.pn?esc(p.pn):'',p.price?('$'+esc(p.price)):''].filter(Boolean).join(' \u00b7 ');
    var buy=p.url?('<a class="buylink" href="'+esc(p.url)+'" target="_blank" rel="noopener">Buy \u2197</a>'):'';
    var note=p.note?('<div class="partnote">'+esc(p.note)+'</div>'):'';
    return '<div class="partrow"><div class="partmain"><div class="partn">'+esc(p.name)+'</div>'+(meta?'<div class="partmeta">'+meta+'</div>':'')+note+'</div><div class="partact">'+buy+(editable?'<button class="xsm" onclick="partRm(\''+key+'\',\''+p.id+'\')">&times;</button>':'')+'</div></div>';
  }).join("");
}
function specsCard(m,key){
  var mdl=m.modelRef?maintDB().m[m.modelRef]:null;
  var inh=(mdl&&mdl.specs&&mdl.specs.length)?('<div class="fromfile">From the '+esc(mdl.label)+' file</div>'+specsHtml(key,mdl.specs,false)+'<div class="hr"></div>'):'';
  return '<div class="card"><div class="lbl">Specs &amp; fluids</div>'+inh+specsHtml(key,m.specs,true)+
    '<div class="addgrid"><input id="spLabel" class="in" placeholder="Spec (e.g. Engine oil)"><input id="spVal" class="in" placeholder="Value (e.g. 15W-40, 12.5 L)"></div><button class="ghost" onclick="specAdd(\''+key+'\')">+ Add spec</button></div>';
}
function partsCard(m,key){
  var mdl=m.modelRef?maintDB().m[m.modelRef]:null;
  var inh=(mdl&&mdl.parts&&mdl.parts.length)?('<div class="fromfile">From the '+esc(mdl.label)+' file</div>'+partsHtml(key,mdl.parts,false)+'<div class="hr"></div>'):'';
  return '<div class="card"><div class="lbl">Parts</div>'+inh+partsHtml(key,m.parts,true)+
    '<div class="hr"></div><div class="sub">Add a part</div><input id="ptName" class="in" placeholder="Part name (e.g. Oil filter)"><div class="grid2"><input id="ptPn" class="in" placeholder="Part #"><input id="ptPrice" class="in" placeholder="Price $"></div><input id="ptUrl" class="in" placeholder="Buy link (optional)"><input id="ptNote" class="in" placeholder="Note (optional)"><button class="wide" onclick="partAdd(\''+key+'\')">+ Add part</button></div>';
}
function modelLinkCard(m,key){
  var db=maintDB();var models=db.order.filter(function(k){return db.m[k].kind==="model";});
  var opts='<option value="">None \u2014 standalone</option>'+models.map(function(k){return '<option value="'+k+'"'+(m.modelRef===k?' selected':'')+'>'+esc(db.m[k].label)+'</option>';}).join("");
  var cur=(m.modelRef&&db.m[m.modelRef])?('<button class="ghost" onclick="go(\'unit\',\''+m.modelRef+'\')">Open the '+esc(db.m[m.modelRef].label)+' file \u2192</button>'):'';
  return '<div class="card"><div class="lbl">Shared model file</div><div class="muted2" style="margin:-4px 0 9px">Link units that take the same parts \u2014 they all inherit this file.</div><select class="in" onchange="setModel(\''+key+'\',this.value)">'+opts+'</select>'+cur+'</div>';
}
function detailsCard(m,key){
  return '<div class="card"><div class="lbl">Details</div><input id="mLabel" class="in" value="'+esc(m.label)+'" placeholder="Name">'+
    '<div class="grid3"><input id="mMake" class="in" value="'+esc(m.make||"")+'" placeholder="Make"><input id="mModel" class="in" value="'+esc(m.model||"")+'" placeholder="Model"><input id="mYear" class="in" value="'+esc(m.year||"")+'" placeholder="Year"></div>'+
    '<div class="grid2"><input id="mVin" class="in" value="'+esc(m.vin||"")+'" placeholder="VIN"><input id="mPlate" class="in" value="'+esc(m.plate||"")+'" placeholder="Plate"></div>'+
    '<input id="mSerial" class="in" value="'+esc(m.serial||"")+'" placeholder="Serial #">'+
    '<button class="wide" onclick="mMeta(\''+key+'\')">Save details</button></div>';
}
function vModel(m,key){
  var db=maintDB();var users=db.order.filter(function(k){return db.m[k].modelRef===key;});
  var ul=users.length?('<div class="card"><div class="lbl">Units on this file <span class="cnt">'+users.length+'</span></div>'+users.map(function(k){return '<button class="lkrow" onclick="go(\'unit\',\''+k+'\')"><span>'+esc(db.m[k].label)+'</span><span class="ar">\u2192</span></button>';}).join("")+'</div>'):'<div class="card"><div class="lbl">Units on this file</div><div class="muted2" style="padding:2px">None yet \u2014 open a truck, machine or hooklift and pick this file under \u201cShared model file.\u201d</div></div>';
  return '<button class="back2" onclick="go(\'list\')">&larr; All vehicles</button>'+
    '<div class="uhead"><h2>'+esc(m.label)+'</h2><span class="chip mdl">shared file</span></div>'+
    '<div class="card filehint"><div class="muted2" style="padding:2px">Fill this in once \u2014 every unit linked to it shows these specs &amp; parts automatically.</div></div>'+
    specsCard(m,key)+partsCard(m,key)+ul+
    '<div class="card"><div class="lbl">Rename</div><input id="mLabel" class="in" value="'+esc(m.label)+'" placeholder="Model name"><button class="wide" onclick="mMeta(\''+key+'\')">Save name</button></div>'+
    '<button class="danger" onclick="removeUnit(\''+key+'\')">Delete this model file</button>';
}
function issuesCard(m,key){
  var has=(m.issues&&m.issues.length);
  var rows=has?m.issues.map(function(x){return '<div class="isurow"><div class="isutext">'+esc(x.text)+'</div><button class="xsm" onclick="issueRm(\''+key+'\',\''+x.id+'\')">&times;</button></div>';}).join(""):'<div class="muted2" style="padding:2px 0 8px">No open issues.</div>';
  return '<div class="card'+(has?' issuecard':'')+'"><div class="lbl">Issues'+(has?' <span class="cnt warn">'+m.issues.length+'</span>':'')+'</div>'+rows+'<input id="isuText" class="in" placeholder="Log an issue (e.g. AC belt squealing)"><button class="ghost" onclick="issueAdd(\''+key+'\')">+ Add issue</button></div>';
}
function vUnit(){
  var db=maintDB(),key=S.key,m=db.m[key];
  if(!m)return '<button class="back2" onclick="go(\'list\')">&larr; Back</button><div class="card"><div class="muted">Not found.</div></div>';
  if(m.kind==="model")return vModel(m,key);
  var ru=rUnit(m);
  var rb;
  if(m.unit==="none"){
    rb='<div class="card"><div class="lbl">Meter</div><div class="muted2" style="padding:2px">No odometer \u2014 service is tracked by date below.</div></div>';
  } else if(m.unit==="hours"){
    rb='<div class="card"><div class="lbl">Hours</div>'+
      '<div class="readrow"><input class="rin" inputmode="numeric" value="'+m.reading+'" onchange="mReading(\''+key+'\',this.value)"><span class="ru">'+ru+'</span></div>'+
      '<div class="readmeta">logged '+fmtAgo(m.readingOn)+'</div>'+
      '<div class="evrow"><span>Read it:</span><button class="seg '+((m.readEvery||'weekly')==='weekly'?'on':'')+'" onclick="mEvery(\''+key+'\',\'weekly\')">Weekly</button><button class="seg '+(m.readEvery==='daily'?'on':'')+'" onclick="mEvery(\''+key+'\',\'daily\')">Daily</button>'+readChip(m)+'</div></div>';
  } else {
    var mon=(m.motive!==false);
    var ml=mon?'<div style="display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;color:#2E7D2E;margin:2px 0 9px"><span style="width:8px;height:8px;border-radius:50%;background:#3CA03C;display:inline-block;box-shadow:0 0 0 3px rgba(60,160,60,.16)"></span>Live from Motive \u00b7 synced '+motiveSyncStr(key)+'</div>':'<div class="muted2" style="margin:2px 0 9px">Manual entry \u2014 this truck isn\u2019t on Motive.</div>';
    rb='<div class="card"><div class="lbl">Odometer</div>'+ml+
      '<div class="readrow"><input class="rin" inputmode="numeric" value="'+m.reading+'" onchange="mReading(\''+key+'\',this.value)"><span class="ru">km</span></div>'+
      '<div class="readmeta">'+(mon?'Auto-updated from the truck \u2014 hand-edit only if a reading looks off.':('logged '+fmtAgo(m.readingOn)))+'</div>'+
      '<button class="seg" style="margin-top:10px" onclick="toggleMotive(\''+key+'\')">'+(mon?'Switch to manual (off Motive)':'Turn Motive on')+'</button></div>';
  }
  var svc=(m.items||[]).map(function(it,i){
    var st=svcStatus(m,it),sn=isSnoozed(key,it.id);
    return '<div class="svc'+(i===0?' first':'')+'"><div class="svctop"><span class="svcn">'+esc(it.name)+'</span>'+badge(st.state)+'</div>'+
      '<div class="svcd">'+esc(st.detail)+(sn?' &middot; <i>snoozed</i>':'')+'</div>'+svcBar(m,it)+(it.note?'<div class="svcnote">'+esc(it.note)+'</div>':'')+
      '<div class="svcbtns"><button class="mini go" onclick="mLogDone(\''+key+'\',\''+it.id+'\')">Mark done</button>'+
      (st.state!=="ok"?'<button class="mini" onclick="mSnooze(\''+key+'\',\''+it.id+'\',7)">Snooze 7d</button><button class="mini" onclick="mSnooze(\''+key+'\',\''+it.id+'\',30)">30d</button>':'')+'</div></div>';
  }).join("");
  var hist=(m.history||[]).slice().sort(function(a,b){return a.on<b.on?1:-1;}).slice(0,12).map(function(h,i){
    var cost=(h.cost!=null)?(' &middot; $'+Number(h.cost).toFixed(2)):'';
    var tag=h.kind==="repair"?'<span class="htag rp">repair</span>':'<span class="htag sv">service</span>';
    var rdg=(m.unit==="none")?'':(' &middot; '+Number(h.reading).toLocaleString()+' '+ru);
    return '<div class="hrow'+(i===0?' first':'')+'">'+tag+'<div class="hmain"><b>'+esc(h.name)+'</b><span>'+esc(h.on)+rdg+(h.by?(' &middot; '+esc(h.by)):'')+cost+'</span></div></div>';
  }).join("")||'<div class="muted">No history yet.</div>';
  var rpf='<div class="sub">Log a repair or part</div><input id="rpName" class="in" placeholder="What was done / part (e.g. New alternator)">'+
    '<div class="grid2"><input id="rpDate" class="in" type="date" value="'+isoAgo(0)+'">'+(m.unit==="none"?'':'<input id="rpRead" class="in" inputmode="numeric" placeholder="'+ru+' now">')+'</div>'+
    '<div class="grid2"><input id="rpBy" class="in" placeholder="Who / shop"><input id="rpCost" class="in" inputmode="decimal" placeholder="Cost $"></div>'+
    '<button class="wide go" onclick="mRepair(\''+key+'\')">Log it</button>';
  var sched='';
  if(S.sched){
    var rows=(m.items||[]).map(function(it,i){
    var ulb=it.by==="time"?"days":(it.by==="hours"?"hrs":"km");
    var duef=it.by==="time"?'<input class="in edin" type="date" value="'+(it.dueOn||"")+'" onchange="mDueOn(\''+key+'\',\''+it.id+'\',this.value)">':'<input class="in edin" inputmode="numeric" placeholder="km / hrs" value="'+(typeof it.dueAt==="number"?it.dueAt:"")+'" onchange="mDueAt(\''+key+'\',\''+it.id+'\',this.value)">';
    return '<div class="edcard'+(i===0?' first':'')+'"><div class="edtop"><div class="edn">'+esc(it.name)+'</div><button class="edx" onclick="mItemRm(\''+key+'\',\''+it.id+'\')">&times;</button></div><div class="edgrid"><div class="edcell"><span class="edlab">every</span><input class="in edin" inputmode="numeric" value="'+it.interval+'" onchange="mInterval(\''+key+'\',\''+it.id+'\',this.value)"><span class="edu">'+ulb+'</span></div><div class="edcell"><span class="edlab">next due</span>'+duef+'</div></div><input class="in edin" placeholder="Note (optional)" value="'+esc(it.note||"")+'" onchange="mNote(\''+key+'\',\''+it.id+'\',this.value)"></div>';
  }).join("");
    var opts=(m.unit==="none")?'<option value="time">days</option>':(m.kind==="machine"?'<option value="hours">hrs</option><option value="km">km</option><option value="time">days</option>':'<option value="km">km</option><option value="hours">hrs</option><option value="time">days</option>');
    sched='<div class="card"><div class="lbl">Service schedule</div>'+rows+'<div class="sub">Add a service</div><input id="itName" class="in" placeholder="Service name"><div class="grid3"><input id="itInt" class="in" inputmode="numeric" placeholder="every"><select id="itBy" class="in">'+opts+'</select><input id="itLead" class="in" inputmode="numeric" placeholder="warn"></div><button class="wide" onclick="mItemAdd(\''+key+'\')">Add service</button></div>';
  }
  var kindword=(m.kind==="machine"?"machine":(m.kind==="trailer"?"trailer":(m.kind==="hooklift"?"hooklift":"vehicle")));
  return '<button class="back2" onclick="go(\'list\')">&larr; All vehicles</button>'+
    '<div class="uhead"><h2>'+esc(m.label)+'</h2>'+badge(worst(m))+'</div>'+issuesCard(m,key)+rb+
    '<div class="card"><div class="lbl">Maintenance</div>'+svc+'<button class="ghost" onclick="toggleSched()">'+(S.sched?'Hide schedule settings':'Adjust intervals / add a service')+'</button></div>'+
    sched+
    specsCard(m,key)+
    partsCard(m,key)+
    modelLinkCard(m,key)+
    detailsCard(m,key)+
    '<div class="card"><div class="lbl">Repairs &amp; history</div>'+rpf+'<div class="hr"></div>'+hist+'</div>'+
    '<button class="danger" onclick="removeUnit(\''+key+'\')">Remove this '+kindword+'</button>';
}
function vAdd(){
  return '<button class="back2" onclick="go(\'list\')">&larr; Back</button>'+
    '<div class="card"><div class="lbl">Add a truck</div><input id="atName" class="in" placeholder="Name (e.g. Truck #8)"><input id="atOdo" class="in" inputmode="numeric" placeholder="Current odometer (km)"><button class="wide go" onclick="addTruck()">Add truck</button><div class="muted2">Standard truck schedule \u2014 oil, fuel + air filters, transmission, diff, greasing. Odometer auto-syncs once Motive is on.</div></div>'+
    '<div class="card"><div class="lbl">Add a machine</div><input id="acName" class="in" placeholder="Name (e.g. Mini loader)"><button class="wide go" onclick="addMachine()">Add machine</button><div class="muted2">Standard machine schedule \u2014 engine oil, hydraulic oil + filters, greasing. Add make / model on the next screen.</div></div>'+
    '<div class="card"><div class="lbl">Add a trailer</div><input id="trName" class="in" placeholder="Name (e.g. Dump trailer)"><button class="wide go" onclick="addTrailer()">Add trailer</button><div class="muted2">Tracked by date \u2014 bearings, brakes, tires, lights, safety / registration.</div></div>'+
    '<div class="card"><div class="lbl">Add a hooklift (Hiab XR5)</div><input id="hkName" class="in" placeholder="Name (e.g. XR5 \u2014 Truck #6)"><button class="wide go" onclick="addHooklift()">Add hooklift</button><div class="muted2">Auto-linked to the Hiab XR5 shared file. Tracks greasing, hydraulic oil + filter, hook &amp; cylinder inspection.</div></div>'+
    '<div class="card"><div class="lbl">Add a shared model file</div><input id="mdName" class="in" placeholder="Name (e.g. Isuzu NPR, Hiab XR5)"><button class="wide go" onclick="addModel()">Add model file</button><div class="muted2">A spec + parts sheet that many units share. Link units to it so they all inherit the same oils and part numbers.</div></div>';
}
function vLibrary(){
  var a=libGet();
  var list=a.length?a.map(function(x,i){
    var icon=x.kind==="video"?"\u25b6\ufe0f":(x.kind==="note"?"\ud83d\udcdd":"\ud83d\udd17");
    var link=x.url?('<a href="'+esc(x.url)+'" target="_blank" rel="noopener">Open</a>'):'';
    var note=x.note?('<div class="lbnote">'+esc(x.note)+'</div>'):'';
    return '<div class="lbrow'+(i===0?' first':'')+'"><div class="lbic">'+icon+'</div><div class="lbmain"><b>'+esc(x.title)+'</b>'+note+'<span class="lbmeta">added '+esc(x.on)+'</span></div><div class="lbact">'+link+'<button class="lbx" onclick="libRm(\''+x.id+'\')">&times;</button></div></div>';
  }).join(""):'<div class="muted">Nothing saved yet. Drop in manuals, how-to videos, or quick notes so the crew can find them fast.</div>';
  return '<button class="back2" onclick="go(\'list\')">&larr; Back</button><div class="uhead"><h2>Library</h2></div>'+
    '<div class="card"><div class="lbl">Save a manual, video or note</div><input id="lbTitle" class="in" placeholder="Title (e.g. Bobcat S650 service manual)"><input id="lbUrl" class="in" placeholder="Link (optional)"><input id="lbNote" class="in" placeholder="Note (optional)"><select id="lbKind" class="in"><option value="link">Link / manual</option><option value="video">Video</option><option value="note">Note</option></select><button class="wide go" onclick="libAdd()">Save</button></div>'+
    '<div class="card"><div class="lbl">Saved</div>'+list+'</div>';
}
function vAsk(){
  var db=maintDB();
  var picks=db.order.map(function(k){return '<button class="pchip '+(S.key===k?'on':'')+'" onclick="askPick(\''+k+'\')">'+esc(db.m[k].label)+'</button>';}).join("");
  var out=S.askOut?('<div class="askout"><div class="askbadge">Prototype preview</div>'+S.askOut+'<div class="asknote">In the full app this reads the truck\u2019s live fault codes and opens the exact manual page \u2014 this preview just shows the shape of the answer.</div></div>'):'';
  return '<button class="back2" onclick="go(\'list\')">&larr; Back</button><div class="uhead"><h2>Ask Claude</h2></div>'+
    '<div class="card"><div class="lbl">About which vehicle?</div><div class="pchips">'+picks+'</div><div class="sub">Fault code or question</div><textarea id="askIn" class="ta" placeholder="e.g. P0420   /   How do I bleed the hydraulics?">'+esc(S.askText)+'</textarea><button class="wide go" onclick="askRun()">Ask</button>'+out+'</div>';
}
function render(){
  if(!app)app=el("app");
  app.innerHTML = S.screen==="unit"?vUnit():(S.screen==="add"?vAdd():(S.screen==="library"?vLibrary():(S.screen==="ask"?vAsk():vList())));
}
render();
})();
</script>
</body>
</html>
